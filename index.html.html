encryption:{label:"Day 17 — Security",content:()=>`<div class="content"><h2>Security — JWT, OAuth 2.0 & Spring Security</h2><p class="tagline">Day 17 · Encryption · HTTPS/TLS · CA · Certificates · Auth · JWT · OAuth 2.0 · RBAC · CORS · CSRF · DDoS · Spring Security</p>

<div class="sec"><h3>Symmetric vs Asymmetric Encryption</h3>
<div class="qa"><div class="q"><span class="qn">Q1</span>Difference between Symmetric and Asymmetric Key Encryption?</div>
<div class="def">Symmetric = ONE shared secret key for both encrypt and decrypt (fast — AES). Asymmetric = TWO mathematically linked keys: Public Key + Private Key (slower — RSA). Symmetric risk: the key must be transmitted; if intercepted all data is compromised.</div>
<table><tr><th></th><th>Symmetric (AES)</th><th>Asymmetric (RSA)</th></tr>
<tr><td>Keys</td><td>One shared secret key</td><td>Public + Private key pair</td></tr>
<tr><td>Speed</td><td>Fast — used for bulk data</td><td>Slow — used for key exchange / signing</td></tr>
<tr><td>Risk</td><td>Key must be shared securely</td><td>Public key can be shared freely</td></tr>
<tr><td>Use case</td><td>Encrypting large data (AES-256)</td><td>TLS handshake, JWT signing, SSH</td></tr></table></div>

<div class="qa"><div class="q"><span class="qn">Q2–Q4</span>Public Key vs Private Key — encryption and decryption rules</div>
<div class="def">Public Key = shared freely with anyone. Private Key = kept secret, NEVER shared. They are mathematically linked — what one encrypts only the other can decrypt.</div>
<div class="flow">
<strong>Rule 1 — Confidentiality:</strong> Encrypt with PUBLIC KEY → Decrypt with PRIVATE KEY<br>
Only the private key owner can read it. Used in secure messaging, HTTPS key exchange.<br><br>
<strong>Rule 2 — Authenticity (Digital Signing):</strong> Sign with PRIVATE KEY → Verify with PUBLIC KEY<br>
Anyone with the public key can verify the message came from the owner. Used in JWT signatures, TLS certificates.
</div></div>

<div class="qa"><div class="q"><span class="qn">Q5</span>Why is Asymmetric Encryption more secure than Symmetric?</div>
<div class="def">With Symmetric, the shared key must be transmitted to the other party — if intercepted, all data is compromised. With Asymmetric, the Public Key is shared openly (no risk), and the Private Key NEVER travels over the network — there is nothing to intercept.</div>
<div class="note">HTTPS uses BOTH: Asymmetric RSA during TLS handshake to safely exchange a session key, then Symmetric AES for actual data (fast). Best of both worlds.</div></div>
</div>

<div class="sec"><h3>HTTPS, TLS & Certificates</h3>
<div class="qa"><div class="q"><span class="qn">Q7–Q8</span>What is HTTPS? Difference between HTTP and HTTPS?</div>
<div class="def">HTTP = plain text, no encryption — anyone on the network can read it. HTTPS = HTTP + TLS. All data is encrypted in transit, server identity is verified, and data integrity is guaranteed.</div>
<table><tr><th></th><th>HTTP</th><th>HTTPS</th></tr>
<tr><td>Port</td><td>80</td><td>443</td></tr>
<tr><td>Encryption</td><td>None — plain text</td><td>TLS encrypted</td></tr>
<tr><td>Data visible?</td><td>Yes — to anyone on network</td><td>No — encrypted end-to-end</td></tr>
<tr><td>Use</td><td>Dev/internal only</td><td>All production apps</td></tr></table></div>

<div class="qa"><div class="q"><span class="qn">Q9</span>What is TLS?</div>
<div class="def">TLS (Transport Layer Security) is the cryptographic protocol powering HTTPS. It provides: (1) encryption of data in transit, (2) server identity verification via certificate, (3) data integrity (tamper detection). TLS replaced the older SSL protocol.</div>
<div class="flow">
<strong>TLS Handshake:</strong><br>
1. Client → Server: "Hello — I support TLS 1.3, here are my cipher suites"<br>
2. Server → Client: Server Certificate (contains server's Public Key, signed by a CA)<br>
3. Client: Verifies certificate against its trusted CA list (built into browser/OS)<br>
4. Client: Generates a random session key, encrypts it with Server's Public Key → sends to server<br>
5. Server: Decrypts session key using its Private Key<br>
6. Both now share the same session key → use symmetric AES for all remaining communication
</div></div>

<div class="qa"><div class="q"><span class="qn">Q10–Q13</span>What is a Certificate Authority (CA)? Root, Intermediate, Server Certificates?</div>
<div class="def">CA = trusted third party that digitally signs certificates to prove they are legitimate. Browsers/OS come pre-loaded with trusted Root CAs. Certificate chain: Root CA → signs → Intermediate CA → signs → Server Certificate.</div>
<div class="g3">
<div class="box blue"><h4>Root Certificate</h4><ul><li>Self-signed by Root CA</li><li>Pre-installed in browsers/OS</li><li>Highest trust — offline for security</li><li>Examples: DigiCert, Let's Encrypt, Comodo</li></ul></div>
<div class="box green"><h4>Intermediate Certificate</h4><ul><li>Signed by Root CA</li><li>Root CA rarely signs things directly</li><li>Bridges Root → Server cert</li><li>Can be revoked without affecting Root</li></ul></div>
<div class="box amber"><h4>Server Certificate</h4><ul><li>Signed by Intermediate CA</li><li>Tied to your domain (e.g. myapp.com)</li><li>Contains server's Public Key</li><li>Has expiry date (renew annually)</li></ul></div>
</div>
<div class="tip">How to secure a Spring Boot app: configure server.ssl.key-store in application.properties pointing to a .p12/.jks keystore. In AWS: use ACM (Certificate Manager) — free TLS certs, auto-renewed, attach to ALB or CloudFront.</div></div>
</div>

<div class="sec"><h3>Authentication vs Authorization</h3>
<div class="qa"><div class="q"><span class="qn">Q14–Q15</span>What is Authentication? What is Authorization? Difference?</div>
<div class="def">Authentication = WHO are you? Verifying identity (login — username/password, JWT, OAuth). Authorization = WHAT are you allowed to do? Checking permissions after identity is confirmed (RBAC, @PreAuthorize).</div>
<table><tr><th></th><th>Authentication</th><th>Authorization</th></tr>
<tr><td>Question</td><td>Who are you?</td><td>What can you do?</td></tr>
<tr><td>When</td><td>First — at login</td><td>After authentication passes</td></tr>
<tr><td>Failure code</td><td>401 Unauthorized</td><td>403 Forbidden</td></tr>
<tr><td>Mechanism</td><td>JWT, session, OAuth token</td><td>Roles, permissions, RBAC</td></tr>
<tr><td>Spring</td><td>AuthenticationManager + UserDetailsService</td><td>@PreAuthorize, SecurityConfig rules</td></tr></table></div>
</div>

<div class="sec"><h3>JWT, ID Token, Access Token & Bearer Token</h3>
<div class="qa"><div class="q"><span class="qn">Q16–Q22</span>What is JWT? Its 3 parts? How is signature generated? What is its purpose?</div>
<div class="def">JWT (JSON Web Token) = compact self-contained token with 3 Base64URL-encoded parts separated by dots: header.payload.signature. Self-contained means the server does NOT need a database lookup to verify the token — the signature proves authenticity.</div>
<pre><code>// STRUCTURE: header.payload.signature

// Part 1 — Header (Base64URL encoded):
{"alg":"RS256","typ":"JWT"}          // algorithm used to sign + token type

// Part 2 — Payload (Base64URL encoded — NOT encrypted, anyone can decode!):
{"sub":"user123","roles":["ADMIN"],"exp":1699003600,"iat":1699000000}

// Part 3 — Signature:
// Generated by: RSA_Sign(privateKey, Base64URL(header) + "." + Base64URL(payload))
// Step 1: Concatenate: base64url(header) + "." + base64url(payload)
// Step 2: Hash it with SHA-256
// Step 3: Sign the hash with the server's Private Key → this is the signature

// VALIDATION on every request:
// 1. Decode header + payload (anyone can do this)
// 2. Recalculate: hash(base64url(header) + "." + base64url(payload))
// 3. Decrypt the signature using the server's PUBLIC KEY
// 4. If hash matches decrypted signature → token is authentic + untampered → ACCEPTED
// 5. If payload was modified → hash mismatch → REJECTED</code></pre>
<div class="warn">JWT payload is Base64URL encoded — ANYONE can decode and read it. Never put passwords, SSNs, credit cards, or sensitive PII in the payload. Only non-sensitive claims: user ID, roles, expiry timestamp.</div></div>

<div class="qa"><div class="q"><span class="qn">Q16–Q23</span>What is an ID Token vs Access Token? What is a Bearer Token?</div>
<div class="def">ID Token = JWT about WHO you are (identity: name, email, sub/userId). Returned by OAuth 2.0/OIDC after login. Access Token = credential proving WHAT you can access (used to call protected APIs). Bearer Token = HTTP header format for sending a token — "Bearer " + the token string.</div>
<div class="flow">
<strong>ID Token:</strong> "Here is who the user is" — contains user profile claims (name, email, sub)<br>
<strong>Access Token:</strong> "Here is what the user can access" — contains scopes and permissions<br>
<strong>Bearer Token header:</strong> Authorization: Bearer eyJhbGciOiJSUzI1NiJ9...<br>
Your JwtAuthFilter strips "Bearer " (7 chars) from the header to get the raw token
</div></div>
</div>

<div class="sec"><h3>OAuth 2.0</h3>
<div class="qa"><div class="q"><span class="qn">Q24–Q31</span>What is OAuth 2.0? Why is it used? Full Authorization Code login flow?</div>
<div class="def">OAuth 2.0 = authorization framework that lets third-party apps access user resources WITHOUT the user sharing their password with that app. User logs in via Google/GitHub — their password stays with Google, your app never sees it.</div>
<div class="flow">
<strong>1.</strong> User clicks "Login with Google" → Browser redirected to Google's auth server<br>
&nbsp;&nbsp;&nbsp;URL: google.com/oauth2/auth?client_id=abc&amp;redirect_uri=myapp.com/callback&amp;response_type=code<br><br>
<strong>2.</strong> User sees Google's own login page → enters Google credentials<br>
&nbsp;&nbsp;&nbsp;Why? Your app NEVER sees the user's Google password<br><br>
<strong>3.</strong> User grants consent → Google redirects to your redirect_uri with a one-time authorization_code<br><br>
<strong>4.</strong> Frontend sends the authorization_code to YOUR backend<br>
&nbsp;&nbsp;&nbsp;Why backend? Next step needs client_secret — must NEVER be in browser JavaScript<br><br>
<strong>5.</strong> Backend sends to Google: authorization_code + client_id + client_secret<br>
&nbsp;&nbsp;&nbsp;Google returns: access_token + id_token (+ optional refresh_token)<br><br>
<strong>6.</strong> Backend validates id_token → extracts user info → creates your own app JWT → returns to frontend<br>
&nbsp;&nbsp;&nbsp;Frontend stores app JWT → sends as Bearer token on every API call
</div>
<div class="note">access_token = call Google APIs on user's behalf. id_token = JWT with user's identity (email, name). refresh_token = get a new access_token after it expires without re-login.</div></div>
</div>

<div class="sec"><h3>Role-Based Access Control (RBAC)</h3>
<div class="qa"><div class="q"><span class="qn">Q32</span>What is RBAC?</div>
<div class="def">RBAC assigns permissions to roles (not individual users). Users are assigned roles. The role determines what endpoints/resources they can access. Example roles: ADMIN, MANAGER, USER, READ_ONLY. Easier to manage than per-user permissions — change a role, all role members are updated.</div>
<pre><code>// JWT payload with role:
{"sub":"user123","roles":["ROLE_ADMIN"],"exp":1699003600}

// Spring Security URL-level RBAC in SecurityConfig:
.requestMatchers("/api/admin/**").hasRole("ADMIN")       // 403 if not ADMIN
.requestMatchers("/api/users/**").hasAnyRole("USER","ADMIN")
.requestMatchers("/api/public/**").permitAll()

// Method-level RBAC:
@PreAuthorize("hasRole('ADMIN')")
public void deleteUser(Long id) { ... }

@PreAuthorize("hasAnyRole('ADMIN','MANAGER')")
public List&lt;User&gt; getAllUsers() { ... }</code></pre></div>
</div>

<div class="sec"><h3>CORS</h3>
<div class="qa"><div class="q"><span class="qn">Q33–Q35</span>What is CORS? Why does it occur? How to enable in Spring Boot?</div>
<div class="def">CORS (Cross-Origin Resource Sharing) = browser security policy blocking JavaScript from making AJAX requests to a DIFFERENT origin (different domain/port/protocol). It is a BROWSER restriction only — Postman and curl are never affected by CORS.</div>
<div class="flow">
<strong>Example:</strong> React app on localhost:3000 calls Spring Boot on localhost:8080<br>
Browser sees different ports → blocks the request → CORS error in browser console<br><br>
<strong>Server must include in response headers:</strong><br>
Access-Control-Allow-Origin: http://localhost:3000<br>
Access-Control-Allow-Methods: GET, POST, PUT, DELETE<br>
Access-Control-Allow-Headers: Authorization, Content-Type
</div>
<pre><code>// Fix 1: @CrossOrigin on controller (quick but not global):
@CrossOrigin(origins = "http://localhost:3000")
@RestController public class MyController { ... }

// Fix 2: Global CORS config in SecurityConfig (recommended for production):
@Bean
public CorsConfigurationSource corsConfigurationSource() {
    CorsConfiguration config = new CorsConfiguration();
    config.setAllowedOrigins(List.of("https://myapp.com", "http://localhost:3000"));
    config.setAllowedMethods(List.of("GET","POST","PUT","DELETE","OPTIONS"));
    config.setAllowedHeaders(List.of("*"));
    config.setAllowCredentials(true);
    UrlBasedCorsConfigurationSource source = new UrlBasedCorsConfigurationSource();
    source.registerCorsConfiguration("/**", config);
    return source;
}</code></pre></div>
</div>

<div class="sec"><h3>CSRF</h3>
<div class="qa"><div class="q"><span class="qn">Q36–Q38</span>What is CSRF? How does the attack work? How to prevent it?</div>
<div class="def">CSRF (Cross-Site Request Forgery) = malicious website tricks your browser into sending a request to a legitimate site using your existing session cookie — without your knowledge. The browser automatically attaches cookies to matching domain requests.</div>
<div class="flow">
<strong>CSRF Attack Flow:</strong><br>
1. User logs in to bank.com → browser stores session cookie for bank.com<br>
2. User visits evil.com while still logged into bank.com<br>
3. evil.com contains: &lt;form action="https://bank.com/transfer" method="POST"&gt; → auto-submits<br>
4. Browser sends POST to bank.com WITH the bank.com session cookie attached automatically<br>
5. bank.com sees valid session cookie → executes the transfer — ATTACK SUCCEEDS!<br><br>
<strong>Prevention methods:</strong><br>
1. CSRF Token: server issues random token → client must include it in every mutating request → evil.com cannot read it (same-origin policy blocks cross-origin reads)<br>
2. JWT Bearer tokens: IMMUNE to CSRF — browsers NEVER auto-send Authorization headers to other sites<br>
3. SameSite=Strict on cookies: browser won't send cookie in any cross-site request
</div>
<pre><code>// Spring Security — JWT apps disable CSRF (JWT is CSRF-immune):
http.csrf(csrf -> csrf.disable());  // safe because JWT is in Authorization header, not cookie

// Session-based apps: keep CSRF enabled (Spring Security default)</code></pre></div>
</div>

<div class="sec"><h3>DDoS Attacks</h3>
<div class="qa"><div class="q"><span class="qn">Q39–Q40</span>What is a DDoS attack? How to protect applications?</div>
<div class="def">DDoS (Distributed Denial of Service) = flooding a server with massive traffic from thousands of machines simultaneously to exhaust CPU/memory/bandwidth and make the service unavailable to real users.</div>
<div class="g2">
<div class="box red"><h4>AWS DDoS Protection</h4><ul><li>AWS Shield Standard — free, auto-protects all AWS resources</li><li>AWS Shield Advanced — paid, 24/7 DRT response team, cost protection</li><li>WAF (Web App Firewall) — block malicious IPs and request patterns</li><li>CloudFront + Route53 — absorb traffic at global edge locations</li></ul></div>
<div class="box blue"><h4>Application-Level Protection</h4><ul><li>Rate limiting at API Gateway (e.g. 1000 req/min per IP)</li><li>CAPTCHA for suspicious traffic bursts</li><li>IP allow/block lists</li><li>Auto Scaling — handle spikes without crashing</li><li>CDN — serve static content at edge, protect origin server</li></ul></div>
</div></div>
</div>

<div class="sec"><h3>Spring Security Implementation</h3>
<div class="qa"><div class="q"><span class="qn">Q41–Q43</span>What is UserDetails? What is UserDetailsService? Custom implementation?</div>
<div class="def">UserDetails = Spring Security interface representing the authenticated user (username, password, roles, account flags). UserDetailsService = interface with one method loadUserByUsername() — Spring calls this during authentication to fetch user from your DB.</div>
<pre><code>// Step 1: User entity implements UserDetails:
@Entity public class User implements UserDetails {
    @Id Long id;
    String username;
    String password;   // BCrypt hashed — NEVER store plain text!
    String role;

    @Override public Collection&lt;? extends GrantedAuthority&gt; getAuthorities() {
        return List.of(new SimpleGrantedAuthority("ROLE_" + role));
    }
    @Override public boolean isAccountNonExpired()     { return true; }
    @Override public boolean isAccountNonLocked()      { return true; }
    @Override public boolean isCredentialsNonExpired() { return true; }
    @Override public boolean isEnabled()               { return true; }
}

// Step 2: Custom UserDetailsService — loads user from DB:
@Service @RequiredArgsConstructor
public class CustomUserDetailsService implements UserDetailsService {
    private final UserRepository userRepo;

    @Override
    public UserDetails loadUserByUsername(String username) throws UsernameNotFoundException {
        return userRepo.findByUsername(username)
            .orElseThrow(() -> new UsernameNotFoundException("User not found: " + username));
    }
}</code></pre></div>

<div class="qa"><div class="q"><span class="qn">Q44–Q48</span>What is JWT Filter? How does it validate tokens? What is SecurityContext? How to save login identity?</div>
<div class="def">JWT Filter = a OncePerRequestFilter that intercepts every HTTP request, extracts the JWT from the Authorization header, validates it, and saves the authenticated user into the SecurityContext — a thread-local store Spring checks for the current request's auth state.</div>
<pre><code>// JWT Auth Filter — runs once per every incoming request:
@Component public class JwtAuthFilter extends OncePerRequestFilter {
    @Autowired JwtService jwtService;
    @Autowired CustomUserDetailsService userDetailsService;

    @Override
    protected void doFilterInternal(HttpServletRequest req, HttpServletResponse res,
                                    FilterChain chain) throws ServletException, IOException {
        String authHeader = req.getHeader("Authorization");
        // Skip if no token (public endpoints like /auth/login):
        if (authHeader == null || !authHeader.startsWith("Bearer ")) {
            chain.doFilter(req, res); return;
        }

        String token    = authHeader.substring(7);                   // strip "Bearer "
        String username = jwtService.extractUsername(token);         // decode payload → get sub

        // Only authenticate if not already authenticated for this request:
        if (username != null && SecurityContextHolder.getContext().getAuthentication() == null) {
            UserDetails ud = userDetailsService.loadUserByUsername(username);

            if (jwtService.validateToken(token, ud)) {   // verify signature + check expiry
                // Save to SecurityContext — Spring now knows this request is authenticated:
                UsernamePasswordAuthenticationToken auth =
                    new UsernamePasswordAuthenticationToken(ud, null, ud.getAuthorities());
                auth.setDetails(new WebAuthenticationDetailsSource().buildDetails(req));
                SecurityContextHolder.getContext().setAuthentication(auth); // SAVE TO CONTEXT
            }
        }
        chain.doFilter(req, res); // pass request on to the controller
    }
}

// Access the logged-in user anywhere in your code:
Authentication auth = SecurityContextHolder.getContext().getAuthentication();
String username = auth.getName();                            // get username
Collection&lt;?&gt; roles = auth.getAuthorities();                // get roles</code></pre></div>

<div class="qa"><div class="q"><span class="qn">Q49–Q50</span>What is @PreAuthorize vs @PostAuthorize?</div>
<div class="def">@PreAuthorize = checks permission BEFORE the method executes — returns 403 immediately if false (most common, most efficient). @PostAuthorize = checks permission AFTER the method runs using the return value — use when you need to verify the returned object belongs to the requesting user.</div>
<pre><code>// @PreAuthorize — evaluates BEFORE method body runs:
@PreAuthorize("hasRole('ADMIN')")
public void deleteUser(Long id) { ... }          // 403 if not ADMIN — method never runs

@PreAuthorize("hasAnyRole('ADMIN', 'MANAGER')")
public List&lt;User&gt; getAllUsers() { ... }

@PreAuthorize("#userId == authentication.principal.id") // user can only update themselves
public User updateUser(Long userId, UserDTO dto) { ... }

// @PostAuthorize — runs method FIRST, then checks return value:
@PostAuthorize("returnObject.username == authentication.principal.username")
public User getUserById(Long id) { ... }  // runs DB query, THEN checks if result is caller's own

// Enable method security in SecurityConfig:
@Configuration
@EnableMethodSecurity   // required for @PreAuthorize and @PostAuthorize to work
public class SecurityConfig extends WebSecurityConfigurerAdapter { ... }</code></pre>
<div class="note">@PreAuthorize is preferred — it prevents the method from running at all (no wasted DB call). @PostAuthorize is for cases where the authorization decision depends on data only available AFTER the method runs.</div></div>
</div></div>`},

cap:{label:"Days 18–19 — Distributed & Kafka",content:()=>`<div class="content"><h2>Distributed Databases & Kafka</h2><p class="tagline">Days 18–19 · CAP · Clustering · Cassandra · MongoDB · Message Queue · Kafka · CDC · SAGA</p>

<div class="sec"><h3>CAP Theorem</h3>
<div class="qa"><div class="q"><span class="qn">Q1</span>What is CAP Theorem?</div>
<div class="def">CAP states that a distributed system can only guarantee 2 of these 3 properties simultaneously: Consistency, Availability, Partition Tolerance. Since network partitions always happen in reality, you must choose between C and A when a partition occurs.</div></div>
<div class="qa"><div class="q"><span class="qn">Q2</span>What is Consistency in CAP?</div>
<div class="def">Every read receives the most recent write or an error. All nodes see the same data at the same time. If you write to node A, reading from node B immediately must return the same value — or return an error rather than stale data.</div></div>
<div class="qa"><div class="q"><span class="qn">Q3</span>What is Availability in CAP?</div>
<div class="def">Every request receives a non-error response — but the data might not be the most recent. The system keeps serving traffic even if some nodes are out of sync. Prioritizes uptime over data freshness.</div></div>
<div class="qa"><div class="q"><span class="qn">Q4</span>What is Partition Tolerance in CAP?</div>
<div class="def">The system continues operating even when network partitions occur (nodes cannot communicate). In real distributed systems, Partition Tolerance is MANDATORY — networks always fail eventually. So the real choice is only: C or A when a partition happens.</div></div>
<div class="qa"><div class="q"><span class="qn">Q5–Q6</span>What is CP? What is AP?</div>
<table><tr><th></th><th>CP — Consistency + Partition Tolerance</th><th>AP — Availability + Partition Tolerance</th></tr>
<tr><td>On partition</td><td>Returns error rather than stale data</td><td>Returns possibly stale data — stays up</td></tr>
<tr><td>Examples</td><td>HBase, Zookeeper, etcd, MongoDB (default)</td><td>Cassandra, DynamoDB, CouchDB, DNS</td></tr>
<tr><td>Use case</td><td>Financial systems, config stores</td><td>Social feeds, shopping carts, analytics</td></tr></table></div>
<div class="qa"><div class="q"><span class="qn">Q7</span>What is Eventual Consistency?</div>
<div class="def">Given enough time with no new writes, ALL replicas will converge to the same value. AP systems tolerate temporary staleness — a read right after a write might return old data, but after replication propagates (usually milliseconds), all nodes agree. Used by Cassandra, DynamoDB, DNS.</div>
<div class="flow">Write name="Alice" to Node A → Node B still shows "Bob" (replication lag)<br>
100ms later → Node B also shows "Alice" → Eventually consistent</div></div>
<div class="qa"><div class="q"><span class="qn">Q8</span>What is BASE?</div>
<div class="def">NoSQL alternative to ACID. Basically Available (system always responds), Soft state (data may be in flux), Eventually consistent (converges over time). Trades strong consistency for availability and horizontal scalability.</div>
<table><tr><th></th><th>ACID (SQL)</th><th>BASE (NoSQL)</th></tr>
<tr><td>Consistency</td><td>Strong — always consistent</td><td>Eventual — converges over time</td></tr>
<tr><td>Focus</td><td>Correctness &amp; transactions</td><td>Availability &amp; performance</td></tr>
<tr><td>Examples</td><td>MySQL, PostgreSQL, Oracle</td><td>Cassandra, DynamoDB, MongoDB</td></tr></table></div>
</div>

<div class="sec"><h3>Database Clustering Models</h3>
<div class="qa"><div class="q"><span class="qn">Q9–Q12</span>Single Leader / Primary-Secondary / Leader-Follower / Master-Slave — all the same thing?</div>
<div class="def">Yes — all names for the same pattern: ONE node (leader/primary/master) accepts ALL writes. Other nodes (followers/secondaries/slaves) replicate asynchronously and serve reads. All writes must go to the leader only.</div>
<div class="flow"><strong>Write:</strong> Client → Leader (only node that accepts writes) → replicates → Follower 1, Follower 2, Follower 3<br>
<strong>Read:</strong> Client → any Follower (fast, may be slightly stale) OR Leader (always latest)</div></div>
<div class="qa"><div class="q"><span class="qn">Q13</span>Why is reading from follower better for performance?</div>
<div class="def">Distributes read traffic across multiple nodes instead of hammering the single leader with both reads and writes. In read-heavy apps (social media, e-commerce), 90%+ of traffic is reads — followers absorb that load. Leader stays free for writes and replication coordination. More followers = more read throughput.</div></div>
<div class="qa"><div class="q"><span class="qn">Q14</span>Why can follower reads return non-strong consistent data?</div>
<div class="def">Replication is asynchronous — there is a replication lag (typically milliseconds to seconds). A follower read right after a write to the leader may return the old value before that write has replicated. This is the classic "read-your-writes" consistency problem.</div></div>
<div class="qa"><div class="q"><span class="qn">Q15</span>Why does reading from the leader always return the newest update?</div>
<div class="def">All writes go to the leader first and are immediately available there. The leader is always the source of truth — it has the latest version of every record before any replication happens. Reading from leader = zero replication lag.</div></div>
<div class="qa"><div class="q"><span class="qn">Q16–Q18</span>What is Write Acknowledgment? Leader-only vs Leader+Followers?</div>
<table><tr><th>ACK Setting</th><th>Who confirms</th><th>Risk if leader crashes after ACK</th><th>Speed</th></tr>
<tr><td>ACK = 0 (none)</td><td>Nobody — fire and forget</td><td>Write may be completely lost</td><td>Fastest</td></tr>
<tr><td>ACK = 1 (leader only)</td><td>Leader writes to local log, confirms</td><td>Data lost if leader crashes before replicating</td><td>Fast</td></tr>
<tr><td>ACK = all (leader + followers)</td><td>Leader waits for ALL replicas to confirm</td><td>No data loss — survived on all replicas</td><td>Slowest</td></tr></table></div>
<div class="qa"><div class="q"><span class="qn">Q19</span>What is Multi-Leader Cluster?</div>
<div class="def">Multiple nodes accept writes simultaneously. Each leader replicates to other leaders and followers. Used for multi-datacenter setups — each datacenter has its own leader for low-latency local writes. Main risk: write conflicts (two leaders update same record simultaneously). Needs conflict resolution: last-write-wins (LWW), CRDTs, or application-level merge logic.</div></div>
<div class="qa"><div class="q"><span class="qn">Q20</span>What is Leaderless Architecture?</div>
<div class="def">ANY node accepts reads and writes (no dedicated leader). Client writes to W nodes simultaneously. Reads from R nodes, returns most recent version. No single point of failure. Used by Cassandra, DynamoDB. Consistency guaranteed through quorum: W + R &gt; RF. Node failure handled by hinted handoff and read repair.</div></div>
</div>

<div class="sec"><h3>Replica Factor &amp; Quorum</h3>
<div class="qa"><div class="q"><span class="qn">Q21–Q25</span>Replica Factor, Write Consistency, Read Consistency, RC=1, RC=2, R+W &gt; RF</div>
<div class="def">Replica Factor (RF) = how many copies of each data item exist. Write Consistency (W) = how many nodes must confirm a write. Read Consistency (R) = how many nodes must respond to a read.</div>
<pre><code>// RF=3: data stored on 3 nodes (A, B, C)

// RC=1: read from any 1 node → fast but possibly stale (returns first response)
// RC=2: read from 2 nodes → compare timestamps, return newest → more consistent, slower

// QUORUM: R + W &gt; RF guarantees STRONG consistency
RF=3, W=2, R=2 → W+R = 4 &gt; RF=3
→ At least 1 node is in BOTH the write set AND the read set
→ That overlapping node definitely has the latest write
→ STRONG consistency guaranteed

RF=3, W=1, R=1 → W+R = 2, NOT &gt; RF=3
→ Read node may have missed the latest write
→ EVENTUAL consistency only

// Balanced quorum formula: W = R = floor(RF/2) + 1
// RF=3 → W=2, R=2 (quorum) — good balance of performance and consistency</code></pre></div>
</div>

<div class="sec"><h3>Cassandra Internals</h3>
<div class="qa"><div class="q"><span class="qn">Q26</span>What is Sequential IO? Why does Cassandra use it?</div>
<div class="def">Sequential IO = reading/writing disk blocks in consecutive order (disk head moves linearly — very fast). Random IO = jumping to different disk locations (slow). Cassandra is designed for sequential IO: SSTables are immutable append-only files, writes always go to end of commit log — never update in place.</div></div>
<div class="qa"><div class="q"><span class="qn">Q27</span>What is Memtable?</div>
<div class="def">Memtable = in-memory sorted write buffer (like a sorted TreeMap). Writes land in Commit Log first (durability), then Memtable (speed). Reads check Memtable first — it has the freshest data. When Memtable reaches threshold size, it flushes to disk as an immutable SSTable.</div></div>
<div class="qa"><div class="q"><span class="qn">Q28–Q29</span>What is SSTable? Why is it immutable?</div>
<div class="def">SSTable (Sorted String Table) = sorted, immutable file on disk. Once written it is NEVER modified. Updates create new SSTables; deletes create tombstone markers. Compaction periodically merges SSTables and removes obsolete data. Immutability enables: sequential writes (fast), no locking needed, reliable Bloom filter.</div></div>
<div class="qa"><div class="q"><span class="qn">Q30</span>What is Commit Log?</div>
<div class="def">Append-only write-ahead log. Every write goes to Commit Log BEFORE Memtable. If Cassandra crashes before a Memtable flush, Commit Log replays all writes on restart (crash recovery). Once data is safely flushed to SSTable, the Commit Log segment is purged.</div></div>
<div class="qa"><div class="q"><span class="qn">Q31</span>Cassandra Write Flow</div>
<div class="flow">
<strong>1</strong> Client → any node (coordinator) → coordinator finds replica nodes via consistent hashing on partition key<br>
<strong>2</strong> Each replica: Write to Commit Log (append, sequential IO — crash recovery)<br>
<strong>3</strong> Each replica: Write to Memtable (in-memory, sorted)<br>
<strong>4</strong> Acknowledge to client once W replicas confirm (based on Write Consistency setting)<br>
<strong>5</strong> When Memtable full → flush to disk as immutable SSTable<br>
<strong>6</strong> Periodic Compaction: merge multiple SSTables, remove tombstones, reclaim space
</div></div>
<div class="qa"><div class="q"><span class="qn">Q32</span>Cassandra Read Flow</div>
<div class="flow">
<strong>1</strong> Client → coordinator → routes to R replica nodes<br>
<strong>2</strong> Each node: Check Memtable first (most recent writes — fastest)<br>
<strong>3</strong> For each SSTable: check Bloom Filter → if "DEFINITELY NOT here" → skip this SSTable entirely<br>
<strong>4</strong> For remaining SSTables: use index (in RAM) to find approximate disk offset → read from disk<br>
<strong>5</strong> Merge results from Memtable + all SSTables by timestamp → return most recent version<br>
<strong>6</strong> Coordinator compares results from R replicas → returns newest to client
</div></div>
<div class="qa"><div class="q"><span class="qn">Q33–Q35</span>What is Bloom Filter? How does it work? Why used in Cassandra?</div>
<div class="def">Bloom Filter = probabilistic data structure. Answers: "Is this key DEFINITELY NOT in this SSTable?" with 100% accuracy. May have false positives but ZERO false negatives.</div>
<pre><code>// How it works:
// Setup: bit array of N bits (all 0s). K different hash functions.
// INSERT key: run K hash functions → get K bit positions → set all to 1
// LOOKUP key: run K hash functions → check all K bit positions
//   → any bit is 0 → key DEFINITELY NOT in this SSTable → SKIP disk read (saves IO!)
//   → all bits are 1 → key MIGHT be in SSTable (false positive possible) → read disk

// Why ZERO false negatives:
// If key was inserted, those specific bit positions were set to 1.
// If all K positions are still 1, key may be here. If ANY is 0, key was never inserted.

// Cassandra: each SSTable has its own Bloom Filter kept in RAM.
// On read: check Bloom Filter first → skip most SSTables → only read relevant ones
// Dramatically reduces disk IO — critical for read performance</code></pre></div>
</div>

<div class="sec"><h3>MongoDB Sharding</h3>
<div class="qa"><div class="q"><span class="qn">Q36</span>What is mongos?</div>
<div class="def">mongos = MongoDB's query router. Clients connect to mongos, not directly to shards. mongos reads shard metadata from Config Server, determines which shard(s) hold the requested data, routes the query, and merges results. Stateless — can run multiple mongos instances for HA.</div></div>
<div class="qa"><div class="q"><span class="qn">Q37</span>What is Config Service in MongoDB?</div>
<div class="def">Config Server = special replica set (3 members) storing cluster metadata: which chunks of data live on which shard, shard topology, balancer state. mongos caches this to route queries. Must always be a replica set — if config server goes down, mongos cannot route queries (reads may still work from cache).</div></div>
<div class="qa"><div class="q"><span class="qn">Q38</span>What is Sharding in MongoDB?</div>
<div class="def">Sharding = horizontally partitioning data across multiple servers (shards). Each shard holds a subset of the data. Enables horizontal scaling beyond what one server can handle. Data is split into chunks and distributed across shards based on the shard key.</div></div>
<div class="qa"><div class="q"><span class="qn">Q39–Q40</span>Primary node vs Secondary node in a MongoDB shard?</div>
<div class="def">Each shard is itself a replica set. Primary = accepts all writes for that shard. Secondaries = replicate from primary, serve reads. If primary fails, secondaries elect a new primary automatically (raft consensus). This provides HA within each shard.</div></div>
<div class="qa"><div class="q"><span class="qn">Q41–Q45</span>Partition Key, Sharding Key, Sorted Key, Clustered Key — what are they?</div>
<table><tr><th>Term</th><th>Definition</th><th>Purpose</th></tr>
<tr><td>Partition Key</td><td>Field used to distribute data across shards (Cassandra/DynamoDB). hash(partitionKey) % numShards = shard index</td><td>Determines which node/shard holds the data</td></tr>
<tr><td>Sharding Key</td><td>MongoDB equivalent of partition key. Chosen field on which MongoDB splits and distributes chunks</td><td>Controls data distribution across shards</td></tr>
<tr><td>Sorted Key (Sort Key)</td><td>Secondary key within a partition (DynamoDB: partition key + sort key = primary key). Data within one partition is sorted by this key</td><td>Efficient range queries within a partition</td></tr>
<tr><td>Clustered Key</td><td>Key by which data is physically stored in sorted order on disk within each shard. The primary index IS the data — no separate lookup needed</td><td>Fast range scans; used as the index on each shard</td></tr></table>
<div class="note">Why clustered key = index column per shard: data is stored physically sorted by the clustered key, so range queries on that key are pure sequential disk reads — no separate index lookup needed. Extremely fast for range scans.</div></div>
</div>

<div class="sec"><h3>Message Queue Concepts (Day 19)</h3>
<div class="qa"><div class="q"><span class="qn">Q1</span>What is a Message Queue?</div>
<div class="def">A Message Queue is a form of asynchronous service-to-service communication. The producer sends messages to a queue; the consumer reads from the queue at its own pace. The queue acts as a buffer — decouples producers and consumers, handles backpressure, enables retry on failure.</div></div>
<div class="qa"><div class="q"><span class="qn">Q2–Q5</span>Queue model vs Pub-Sub model?</div>
<table><tr><th></th><th>Queue Model (Point-to-Point)</th><th>Pub-Sub Model (Publish-Subscribe)</th></tr>
<tr><td>Delivery</td><td>Message delivered to ONE consumer only</td><td>Message delivered to ALL subscribers</td></tr>
<tr><td>Use case</td><td>Task distribution — one worker processes each task</td><td>Event broadcasting — multiple services react to same event</td></tr>
<tr><td>Examples</td><td>SQS Standard, RabbitMQ Queue</td><td>SNS, Kafka (with separate consumer groups)</td></tr>
<tr><td>In Kafka</td><td>All consumers in SAME consumer group</td><td>Each service has its OWN consumer group</td></tr></table></div>
</div>

<div class="sec"><h3>Kafka — Deep Dive</h3>
<div class="qa"><div class="q"><span class="qn">Q7–Q11</span>Topic, Partition, Offset, Consumer Group, Standby Consumer</div>
<pre><code>// TOPIC: named logical channel for a category of messages (e.g. "order-events")
// PARTITION: each topic split into N ordered, append-only, immutable logs
//   → messages within a partition are strictly ordered by offset
//   → different partitions processed in parallel (no order guarantee ACROSS partitions)
// OFFSET: integer position of a message within a partition (starts at 0, monotonically increases)
//   → consumer tracks its own offset per partition — tells Kafka "I've read up to here"
// CONSUMER GROUP: logical group of consumers sharing the work of consuming a topic
//   → each partition assigned to exactly ONE consumer in the group (at a time)
//   → if group has 3 consumers and topic has 6 partitions → each consumer gets 2 partitions
// STANDBY CONSUMER: extra consumer in a group with NO partitions assigned
//   → sits idle waiting — if active consumer fails, standby immediately takes its partitions
//   → eliminates rebalance delay for that consumer's partitions</code></pre></div>
<div class="qa"><div class="q"><span class="qn">Q12</span>How does hashing decide partition index?</div>
<div class="def">Kafka hashes the message key to determine which partition gets the message: partitionIndex = hash(messageKey) % numPartitions. Same key → always same partition → ORDER guaranteed for all messages with that key. No key → round-robin across partitions (load balanced but no order).</div></div>
<div class="qa"><div class="q"><span class="qn">Q13</span>How to ensure message order in Kafka?</div>
<div class="def">Use a message key so all related messages hash to the same partition. Order is guaranteed within a partition. Example: use orderId as key — all events for order #123 go to the same partition, consumed in order. If you need global order across all messages, use a topic with 1 partition (kills parallelism).</div></div>
<div class="qa"><div class="q"><span class="qn">Q14</span>What is Rebalance in Kafka?</div>
<div class="def">Rebalance = Kafka redistributing partition assignments across consumers in a group. Triggered when: consumer joins/leaves the group, consumer crashes, new partitions added. During rebalance, consumption is PAUSED — all consumers stop. After rebalance, partitions redistributed. Minimize rebalances: use standby consumers, tune session.timeout.ms and heartbeat.interval.ms.</div></div>
<div class="qa"><div class="q"><span class="qn">Q15</span>How do we create Pub-Sub in Kafka?</div>
<div class="def">Give each consuming application its OWN consumer group. Kafka delivers every message to EVERY consumer group. Example: order-events topic → group "email-service" gets all messages AND group "inventory-service" gets all messages independently. Each group maintains its own offset.</div></div>
<div class="qa"><div class="q"><span class="qn">Q16–Q18</span>What is a Broker? Leader Partition vs Follower Partition?</div>
<div class="def">Broker = a Kafka server/node. A cluster has multiple brokers. Each partition has one Leader replica (on one broker) and multiple Follower replicas (on other brokers). Producers write to the Leader only. Followers replicate from the Leader. If a Leader broker dies, a Follower is elected as the new Leader automatically.</div></div>
<div class="qa"><div class="q"><span class="qn">Q19–Q21</span>Producer ACK = 0, ACK = 1, ACK = All?</div>
<table><tr><th>ACK Level</th><th>Meaning</th><th>Risk</th><th>Speed</th></tr>
<tr><td>acks=0</td><td>Fire and forget — no confirmation waited for</td><td>Message may be lost silently</td><td>Fastest</td></tr>
<tr><td>acks=1</td><td>Leader confirms after writing to its own log</td><td>Lost if leader crashes before replicating</td><td>Fast</td></tr>
<tr><td>acks=all (-1)</td><td>Leader waits for ALL in-sync replicas (ISR) to confirm</td><td>No data loss — survives any single broker failure</td><td>Slowest</td></tr></table></div>
<div class="qa"><div class="q"><span class="qn">Q22–Q26</span>Consumer ACK, Exactly-Once, At-Least-Once, At-Most-Once delivery?</div>
<table><tr><th>Delivery Guarantee</th><th>How offset is committed</th><th>Risk</th><th>Duplicate?</th></tr>
<tr><td>At-Most-Once</td><td>Commit offset BEFORE processing. Crash after commit = message lost, never reprocessed</td><td>Data loss possible</td><td>No</td></tr>
<tr><td>At-Least-Once</td><td>Process THEN commit offset. Crash during processing = reprocess same message</td><td>Duplicates possible</td><td>Yes — make consumer idempotent!</td></tr>
<tr><td>Exactly-Once</td><td>Kafka Transactions: atomic produce + commit offset in one transaction</td><td>Complex, slower</td><td>No</td></tr></table>
<div class="flow"><strong>At-Least-Once flow:</strong> Consumer reads msg → processes (writes to DB) → CRASH before offset commit → Kafka redelivers same msg → consumer processes again → DUPLICATE write to DB (must handle with idempotent writes or deduplication)</div></div>
</div>

<div class="sec"><h3>CDC &amp; Outbox Pattern</h3>
<div class="qa"><div class="q"><span class="qn">Q27–Q32</span>What is CDC? Outbox Pattern? Why same transaction? How CDC pushes to MQ?</div>
<div class="def">CDC (Change Data Capture) = tracking every insert/update/delete in a database and streaming those changes to other systems. Tools: Debezium (reads DB transaction log), AWS DMS. Outbox Pattern = a reliable way to atomically publish events to a message queue alongside a database write.</div>
<pre><code>// OUTBOX PATTERN TRANSACTION FLOW:
BEGIN TRANSACTION
  INSERT INTO orders (id, amount, status) VALUES (101, 500, 'CREATED')   -- business data
  INSERT INTO outbox (event_type, payload, status) VALUES ('ORDER_CREATED', '{"id":101}', 'PENDING')
COMMIT  -- BOTH committed in ONE ACID local transaction → atomicity guaranteed

// WHY same transaction?
// Without outbox: save order → crash before publishing → order saved but event never sent
// With outbox: if crash happens, BOTH are rolled back → no partial state
// If commit succeeds, BOTH exist → CDC will find the outbox record and publish it

// CDC SERVICE (Debezium) flow:
// 1. Reads outbox table changes from DB transaction log (binlog/WAL) — not the table itself
// 2. Publishes the payload to Kafka topic
// 3. Marks outbox record as PUBLISHED (separate DB transaction)
// 4. Audit flow: CloudWatch/ELK monitors the outbox table for STUCK records (not published in time)</code></pre>
<div class="note">DB transaction (commit order + outbox) and MQ transaction (publish to Kafka) are SEPARATE transactions. The outbox pattern bridges them — the outbox record is the "contract" that CDC will eventually publish it.</div></div>
</div>

<div class="sec"><h3>SAGA Pattern</h3>
<div class="qa"><div class="q"><span class="qn">Q33–Q39</span>What is SAGA? Why used? Rollback queue, compensation, exception handling?</div>
<div class="def">SAGA = a sequence of local transactions across multiple microservices, each publishing an event/message that triggers the next step. If any step fails, compensation transactions undo previous steps. Solves distributed transaction problem without a global 2PC lock.</div>
<div class="flow">
<strong>Happy Path:</strong><br>
Order Service: CREATE order → publish "ORDER_CREATED" to Kafka<br>
Payment Service: reads "ORDER_CREATED" → DEDUCT balance → publish "PAYMENT_DONE"<br>
Inventory Service: reads "PAYMENT_DONE" → RESERVE stock → publish "ORDER_CONFIRMED"<br><br>
<strong>Failure Path (DB2 / Payment fails):</strong><br>
Payment Service: DEDUCT fails (insufficient funds) → publish "PAYMENT_FAILED" to rollback queue<br>
Order Service: reads "PAYMENT_FAILED" → CANCEL order (compensation transaction)<br><br>
<strong>Failure Path (DB3 / Inventory fails):</strong><br>
Inventory Service: RESERVE fails → publish "STOCK_FAILED" to rollback queue<br>
Payment Service: reads "STOCK_FAILED" → REFUND balance (compensation transaction)<br>
Order Service: reads "STOCK_FAILED" → CANCEL order (compensation transaction)
</div>
<pre><code>// ROLLBACK QUEUE: a dedicated Kafka topic (e.g. "saga-rollback-events")
// When any step fails, it publishes a failure event to the rollback queue
// Each previous service subscribes to rollback queue and undoes its action

// COMPENSATION TRANSACTION: the "undo" of a previous successful action
// Not a true DB rollback (data was already committed) — it's a new forward transaction
// Example: Payment deducted $500 → compensation = credit $500 back

// EXCEPTION HANDLING FLOW:
// 1. Step fails → publish failure event with correlation ID and reason
// 2. Orchestrator (or each service) reads failure event
// 3. Each affected service runs its compensation in reverse order
// 4. Final state: all previous actions undone → system back to consistent state
// 5. Alert/notify user of failure with reason</code></pre>
<div class="tip">Two SAGA types: Choreography (event-driven, each service reacts to events — no central coordinator, harder to debug) and Orchestration (a central Saga Orchestrator tells each service what to do and handles compensation — easier to trace, single point of control).</div></div>
</div></div>`},

microservices:{label:"Days 20–21 — Microservices & AWS",content:()=>`<div class="content"><h2>Microservices &amp; AWS</h2><p class="tagline">Days 20–21 · Scaling · Architecture · Monitors · API Gateway · Discovery · Config · Circuit Breaker · AWS Deep Dive</p>

<div class="sec"><h3>Scaling &amp; Architecture</h3>
<div class="qa"><div class="q"><span class="qn">Q1–Q2</span>Vertical Scaling vs Horizontal Scaling?</div>
<table><tr><th></th><th>Vertical Scaling (Scale Up)</th><th>Horizontal Scaling (Scale Out)</th></tr>
<tr><td>Approach</td><td>Add more CPU/RAM to existing server</td><td>Add more servers (instances)</td></tr>
<tr><td>Limit</td><td>Hardware cap — eventually can't add more</td><td>Nearly unlimited — keep adding nodes</td></tr>
<tr><td>Cost</td><td>Expensive per unit</td><td>Cheaper commodity hardware</td></tr>
<tr><td>Downtime</td><td>Requires restart</td><td>No downtime — add nodes live</td></tr>
<tr><td>Use for</td><td>Databases (harder to distribute), quick fix</td><td>Stateless services, microservices, web tier</td></tr></table></div>
<div class="qa"><div class="q"><span class="qn">Q3</span>What is a Load Balancer?</div>
<div class="def">Load Balancer distributes incoming traffic across multiple server instances. Prevents any single server from being overwhelmed. Types: ALB (Layer 7 — HTTP/HTTPS, path-based routing), NLB (Layer 4 — TCP/UDP, ultra-low latency), CLB (classic, legacy). AWS ALB sits in the public subnet, routes to EC2/ECS in private subnet.</div></div>
<div class="qa"><div class="q"><span class="qn">Q4–Q9</span>Monolith pros/cons vs Microservices pros/cons</div>
<div class="g2">
<div class="box blue"><h4>Monolithic — Pros</h4><ul><li>Simple to develop and test locally</li><li>No network calls between components</li><li>Easy debugging — single process, single log</li><li>One deployment unit — simple CI/CD</li><li>No distributed transaction complexity</li></ul></div>
<div class="box red"><h4>Monolithic — Cons</h4><ul><li>Scale the entire app even if only one part is busy</li><li>One bug/crash can take down everything</li><li>Teams step on each other — tight coupling</li><li>Tech stack locked for whole app</li><li>Slow deploys as codebase grows</li></ul></div>
</div>
<div class="g2">
<div class="box green"><h4>Microservices — Pros</h4><ul><li>Independent scaling (scale only the hot service)</li><li>Fault isolation — one service fails, others continue</li><li>Independent deploys — no coordination needed</li><li>Each service chooses its own tech/language/DB</li><li>Small teams own small services — autonomy</li></ul></div>
<div class="box amber"><h4>Microservices — Cons</h4><ul><li>Network latency between services</li><li>Distributed transactions are hard (need SAGA)</li><li>Complex monitoring — logs spread across many services</li><li>Service discovery, config management overhead</li><li>More infrastructure to manage</li></ul></div>
</div></div>
</div>

<div class="sec"><h3>Monitoring in Microservices</h3>
<div class="qa"><div class="q"><span class="qn">Q10–Q15</span>Application monitors, latency, APM, DB, MQ, log monitors?</div>
<div class="g2">
<div class="box blue"><h4>Application Monitors</h4><ul><li>Request count per service per endpoint</li><li>Error rate (4xx, 5xx) per service</li><li>JVM metrics: heap used, GC pause time, thread count</li><li>CPU / memory usage per pod/container</li><li>Restart count (OOMKilled, crash loops)</li></ul></div>
<div class="box purple"><h4>Latency Monitors</h4><ul><li>p50, p95, p99 response times per endpoint</li><li>Slow endpoints alert when p99 &gt; threshold</li><li>End-to-end trace latency (X-Ray, Jaeger)</li><li>Alert on sudden latency spike (regression)</li></ul></div>
</div>
<div class="g2">
<div class="box green"><h4>APM / DB Monitors</h4><ul><li>APM (Datadog, New Relic): traces individual requests across all services</li><li>DB: slow query log, connection pool utilization, replication lag</li><li>DB: CPU, IOPS, storage % used, long-running queries</li><li>Query performance: index hit rate, full table scans</li></ul></div>
<div class="box amber"><h4>MQ &amp; Log Monitors</h4><ul><li>MQ: consumer lag (messages not yet consumed — means consumers are behind)</li><li>MQ: dead letter queue (DLQ) message count — indicates processing failures</li><li>Logs: centralized in CloudWatch / ELK Stack (Elasticsearch + Logstash + Kibana)</li><li>Log monitors: ERROR count, exception frequency, security events</li></ul></div>
</div></div>
</div>

<div class="sec"><h3>API Gateway</h3>
<div class="qa"><div class="q"><span class="qn">Q16–Q23</span>API Gateway — centralized entry, routing, JWT, logging, global unique ID, correlation ID, trace ID</div>
<div class="def">API Gateway = single entry point for all client requests. Handles cross-cutting concerns so individual microservices don't have to.</div>
<div class="flow">
Client Request → API Gateway →<br>
1. <strong>Centralized Entry:</strong> All traffic enters one place — simplifies client (one URL, not 50 service URLs)<br>
2. <strong>JWT Validation:</strong> Redirect to security service / Cognito to verify token before forwarding<br>
3. <strong>Generate Global Unique ID:</strong> Assign a UUID/snowflake ID to this request (used for distributed tracing)<br>
4. <strong>Log Request:</strong> Log method, path, user, timestamp, correlation ID to CloudWatch/ELK<br>
5. <strong>Rate Limiting:</strong> Enforce per-client throttling (prevent DDoS / abuse)<br>
6. <strong>Route:</strong> Forward to correct microservice based on path pattern<br>
→ /api/orders/** → Order Service<br>
→ /api/users/** → User Service
</div>
<pre><code>// Global Unique ID structure (Snowflake-like):
// [timestamp 41 bits][datacenter 5 bits][machine 5 bits][sequence 12 bits]
// Guarantees: globally unique across all machines, time-sortable, no DB needed to generate

// Correlation ID: ties together ALL log entries for ONE user request across multiple services
//   OrderService log: correlationId=abc123, "Order created"
//   PaymentService log: correlationId=abc123, "Payment processed"
//   → Search correlationId=abc123 in CloudWatch → see full request journey

// Trace ID: same concept — used by distributed tracing tools (X-Ray, Zipkin, Jaeger)
//   to visualize the full call graph (service A → B → C) with timing for each hop</code></pre></div>
</div>

<div class="sec"><h3>Centralized Security</h3>
<div class="qa"><div class="q"><span class="qn">Q24–Q29</span>Cognito, Lambda Authorizer, Spring Security with security providers, public key JWT verification</div>
<div class="def">Centralized security service handles authentication once — API Gateway validates tokens before requests reach microservices. Three options: AWS Cognito (managed), Lambda Authorizer (custom), or a dedicated Spring Security service.</div>
<div class="flow">
<strong>AWS Cognito flow:</strong><br>
User login → Cognito User Pool → returns JWT (id_token + access_token)<br>
Client sends Bearer JWT → API Gateway → Cognito Authorizer validates JWT signature → passes claims to service<br><br>
<strong>Lambda Authorizer flow:</strong><br>
Client sends Bearer JWT → API Gateway → triggers Lambda Authorizer function<br>
Lambda validates JWT (signature, expiry, claims) → returns IAM Allow/Deny policy<br>
API Gateway enforces the policy → forwards or rejects request<br><br>
<strong>Spring Security + external security provider:</strong><br>
JWT contains issuer URL → Spring Security fetches public key from issuer's JWKS endpoint<br>
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://cognito.../jwks.json<br>
Spring verifies JWT signature using fetched public key — no shared secret needed<br>
Scope (e.g. "orders:write") extracted from JWT claims → used in @PreAuthorize("hasAuthority('orders:write')")
</div></div>
</div>

<div class="sec"><h3>Discovery Service</h3>
<div class="qa"><div class="q"><span class="qn">Q30–Q35</span>Discovery Service, Eureka, Ribbon, AWS Cloud Map — registration, discovery flow</div>
<div class="def">Discovery Service = a registry where services register their IP/port at startup. Other services query the registry to find them — no hardcoded IP addresses. Enables dynamic scaling (IPs change when new instances start/stop).</div>
<div class="flow">
<strong>Service Registration:</strong><br>
OrderService starts → registers IP:8081 with Discovery Service (Eureka/Cloud Map)<br>
PaymentService starts → registers IP:8082<br>
Each service sends periodic heartbeat → Discovery Service marks as HEALTHY<br>
Service shuts down → heartbeat stops → marked DOWN after timeout<br><br>
<strong>Service Discovery (how serviceA finds serviceB):</strong><br>
OrderService needs to call PaymentService → asks Discovery Service: "where is payment-service?"<br>
Discovery Service returns list of healthy PaymentService instances: [IP:8082, IP:8083]<br>
Ribbon (client-side load balancer) picks one instance (round-robin/weighted)<br>
OrderService makes HTTP call to selected IP:port directly<br><br>
<strong>Why register IP and port:</strong><br>
IP changes with each container restart/scale event — cannot hardcode.<br>
Port may differ if multiple instances on same host. Registry is the single source of truth.
</div>
<div class="note">AWS Cloud Map = AWS-managed service discovery. Works with ECS/EKS — instances auto-register on startup, auto-deregister on shutdown. No need to run Eureka server yourself.</div></div>
</div>

<div class="sec"><h3>Config Service</h3>
<div class="qa"><div class="q"><span class="qn">Q36–Q42</span>Spring Cloud Config, AppConfig, SecretManager — why use config service, runtime reload, encrypted properties</div>
<div class="def">Config Service = centralized store for all application configuration. Services fetch their config from Config Server at startup instead of bundling it in the jar. Changes to config don't require redeployment.</div>
<div class="flow">
<strong>Spring Cloud Config flow:</strong><br>
Git repo stores: application.yml, order-service.yml, payment-service.yml<br>
Config Server reads from Git → exposes via HTTP: /order-service/prod<br>
Spring Boot client (bootstrap.yml): spring.cloud.config.uri=http://config-server:8888<br>
On startup: service fetches config → injects into @Value and @ConfigurationProperties beans<br><br>
<strong>Runtime reload WITHOUT redeployment:</strong><br>
Push config change to Git → call POST /actuator/refresh on Config Server<br>
Config Server re-reads Git → pushes update via Spring Cloud Bus (Kafka/RabbitMQ)<br>
All services receive the refresh event → @RefreshScope beans re-initialized with new values<br><br>
<strong>Sensitive properties (DB passwords, API keys):</strong><br>
AWS SecretManager: store secret → service fetches at runtime (never in code/Git)<br>
Spring Cloud Config: encrypt property values in Git: {cipher}AQI8K3... → Config Server decrypts before serving<br>
AppConfig: AWS managed, supports rollback, version history, per-environment overrides
</div></div>
</div>

<div class="sec"><h3>Circuit Breaker</h3>
<div class="qa"><div class="q"><span class="qn">Q43–Q50</span>Hystrix/Resilience4j, states, failure detection, fallback, health check</div>
<div class="def">Circuit Breaker prevents cascading failures — if serviceB is down, don't keep calling it and exhausting threads. Instead, fast-fail and return a fallback response. Named after an electrical circuit breaker.</div>
<table><tr><th>State</th><th>Behavior</th><th>Transition</th></tr>
<tr><td>CLOSED (normal)</td><td>All requests pass through to serviceB. Monitors failure rate.</td><td>→ OPEN when failure% exceeds threshold (e.g. 50% of last 10 calls fail)</td></tr>
<tr><td>OPEN (tripped)</td><td>ALL requests immediately return fallback — serviceB never called. Fast-fail.</td><td>→ HALF-OPEN after wait duration (e.g. 30 seconds)</td></tr>
<tr><td>HALF-OPEN (testing)</td><td>Allow a limited number of test requests through to serviceB.</td><td>→ CLOSED if test requests succeed. → OPEN again if they fail.</td></tr></table>
<pre><code>// Resilience4j annotation:
@CircuitBreaker(name="paymentService", fallbackMethod="paymentFallback")
public PaymentResult processPayment(Order order) {
    return paymentClient.charge(order);  // calls PaymentService
}
// Fallback runs when circuit is OPEN or call throws exception:
public PaymentResult paymentFallback(Order order, Exception ex) {
    log.warn("Payment service down, queuing for retry: {}", ex.getMessage());
    retryQueue.add(order);              // queue for later processing
    return PaymentResult.PENDING;       // return graceful degraded response
}

// Configuration:
resilience4j.circuitbreaker.instances.paymentService:
  failureRateThreshold: 50             # open if 50% of calls fail
  waitDurationInOpenState: 30s         # stay open 30s before testing
  permittedNumberOfCallsInHalfOpenState: 3  # send 3 test requests
  slidingWindowSize: 10                # evaluate last 10 calls</code></pre>
<div class="note">Health check in Circuit Breaker: during HALF-OPEN, it sends probe requests. Success rate of probes decides if serviceB has recovered. Hystrix is deprecated — use Resilience4j in modern Spring Boot apps.</div></div>
</div>

<div class="sec"><h3>AWS — Deep Dive (Day 21)</h3>
<div class="qa"><div class="q"><span class="qn">AWS1–2</span>Region, AZ, Fault Tolerance — Active-Active vs Active-Passive, Warm Standby, Pilot Light</div>
<table><tr><th>Strategy</th><th>Description</th><th>RTO/Cost</th></tr>
<tr><td>Active-Active</td><td>Traffic served from multiple regions simultaneously. Both regions handle real traffic. Instant failover.</td><td>Lowest RTO, highest cost</td></tr>
<tr><td>Active-Passive</td><td>Primary region handles all traffic. Secondary region on standby. Failover via Route53 health check.</td><td>Minutes RTO, medium cost</td></tr>
<tr><td>Warm Standby</td><td>Secondary region running at reduced capacity (small instances). Scale up on failover.</td><td>Minutes RTO, lower cost</td></tr>
<tr><td>Pilot Light</td><td>Only core DB/data replicated to secondary. Everything else off. Spin up compute on disaster.</td><td>Hours RTO, lowest cost</td></tr></table></div>
<div class="qa"><div class="q"><span class="qn">AWS3–5</span>IAM, IAM Role, IAM Policy</div>
<div class="def">IAM = Identity and Access Management. IAM Policy = JSON document defining allowed/denied actions on resources. IAM Role = an identity with attached policies, assumed temporarily by AWS services (EC2, Lambda) or users. NEVER embed static access keys in EC2/Lambda — always use IAM Roles for temporary credentials.</div>
<pre><code>// IAM Policy example (allow Lambda to read S3):
{
  "Effect": "Allow",
  "Action": ["s3:GetObject", "s3:ListBucket"],
  "Resource": ["arn:aws:s3:::my-bucket", "arn:aws:s3:::my-bucket/*"]
}
// Attach this policy to a Role → attach Role to Lambda → Lambda can read S3 automatically</code></pre></div>
<div class="qa"><div class="q"><span class="qn">AWS6–13</span>VPC, NACL, Subnets, Internet Gateway, Route Table, VPC Endpoint</div>
<div class="flow">
<strong>VPC:</strong> Virtual Private Cloud — your own isolated network in AWS. CIDR block (e.g. 10.0.0.0/16)<br><br>
<strong>Public Subnet:</strong> Has route to Internet Gateway. Resources here get public IPs. ALB, NAT Gateway live here.<br>
<strong>Private Subnet:</strong> No direct internet access. EC2, RDS, ECS tasks live here. Access internet via NAT Gateway.<br><br>
<strong>Internet Gateway:</strong> Allows public subnet resources to communicate with internet. Attach to VPC, add route in route table.<br>
<strong>Route Table:</strong> Rules for directing traffic. Public subnet: 0.0.0.0/0 → Internet Gateway. Private subnet: 0.0.0.0/0 → NAT Gateway.<br><br>
<strong>NACL (Network ACL):</strong> Subnet-level firewall. Stateless — must explicitly allow both inbound AND outbound. Supports ALLOW and DENY rules. Rules evaluated in order (lowest number first).<br>
<strong>Security Group:</strong> Instance-level firewall. Stateful — allow inbound automatically allows response outbound. Only ALLOW rules (no deny). Attached to EC2/RDS/Lambda.<br><br>
<strong>VPC Endpoint:</strong> Private connection from VPC to AWS services (S3, DynamoDB) without internet. Traffic stays within AWS network — more secure, no data transfer cost over internet.
</div></div>
<div class="qa"><div class="q"><span class="qn">AWS14–18</span>EC2 Instance Types, On-Demand, Reserved, Scheduled, Spot, ASG</div>
<table><tr><th>Type</th><th>Description</th><th>Use case</th></tr>
<tr><td>On-Demand</td><td>Pay per second, no commitment</td><td>Unpredictable workloads, dev/test</td></tr>
<tr><td>Reserved</td><td>1-3 year commitment, up to 72% discount</td><td>Steady-state production workloads</td></tr>
<tr><td>Scheduled</td><td>Reserved for specific recurring windows (e.g. Mon 9am-5pm)</td><td>Batch jobs, scheduled reports</td></tr>
<tr><td>Spot</td><td>Bid for unused capacity, up to 90% discount. Can be interrupted with 2-min notice.</td><td>Fault-tolerant batch jobs, ML training</td></tr></table>
<div class="def">Auto Scaling Group (ASG): Automatically adjusts EC2 instance count based on metrics (CPU &gt; 70% → add instance; CPU &lt; 30% → remove). Define min/max/desired count. Works with ALB — new instances auto-registered.</div></div>
<div class="qa"><div class="q"><span class="qn">AWS19–22</span>Lambda — max time, cold start, limits</div>
<div class="def">Lambda = serverless function. AWS manages all infrastructure. You pay per invocation + duration only.</div>
<table><tr><th>Limit</th><th>Value</th></tr>
<tr><td>Maximum execution time</td><td>15 minutes</td></tr>
<tr><td>Memory</td><td>128 MB – 10,240 MB (CPU scales with memory)</td></tr>
<tr><td>Disk (/tmp)</td><td>512 MB – 10 GB (ephemeral)</td></tr>
<tr><td>Code package size</td><td>50 MB zipped, 250 MB unzipped</td></tr>
<tr><td>Layer size</td><td>250 MB total across all layers</td></tr>
<tr><td>Concurrent executions</td><td>1,000 per region (soft limit — can increase)</td></tr></table>
<div class="def">Cold Start = when Lambda is invoked after being idle, AWS must provision a new container (JVM init for Java). Takes 1-5 seconds. Mitigation: provisioned concurrency (keep containers warm), use smaller runtimes (GraalVM native), Lambda SnapStart (Java).</div></div>
<div class="qa"><div class="q"><span class="qn">AWS23–25</span>ALB vs NLB — Layer 7 vs Layer 4</div>
<table><tr><th></th><th>ALB (Application Load Balancer)</th><th>NLB (Network Load Balancer)</th></tr>
<tr><td>OSI Layer</td><td>Layer 7 (HTTP/HTTPS) — reads request content</td><td>Layer 4 (TCP/UDP) — only sees IP + port</td></tr>
<tr><td>Routing</td><td>Path-based (/api/orders → service A), host-based, header-based</td><td>Port-based only</td></tr>
<tr><td>Performance</td><td>Slower (parses HTTP)</td><td>Ultra-low latency, millions of req/sec</td></tr>
<tr><td>Use case</td><td>Microservices, REST APIs, WebSocket</td><td>Gaming, IoT, financial trading, real-time</td></tr></table></div>
<div class="qa"><div class="q"><span class="qn">AWS26–31</span>CloudWatch, EventBridge, CloudTrail, X-Ray</div>
<div class="g2">
<div class="box blue"><h4>CloudWatch</h4><ul><li>Logs: centralized log storage from all AWS services</li><li>Metrics: CPU, memory, custom app metrics</li><li>Alerts: SNS notification when metric crosses threshold</li><li>Log Insights: query logs with SQL-like syntax</li></ul></div>
<div class="box purple"><h4>CloudTrail + X-Ray</h4><ul><li>CloudTrail: records every AWS API call (who did what, when). Used for security audits, compliance</li><li>X-Ray: distributed tracing — visualizes call graph across services with timing</li><li>EventBridge: serverless event bus — route events from AWS services or apps to targets (Lambda, SQS)</li><li>AWS Cloud Map: service discovery registry for microservices</li></ul></div>
</div></div>
<div class="qa"><div class="q"><span class="qn">AWS32–35</span>S3 — immutability, versioning, encryption, lifecycle, cross-region replication, Glacier</div>
<pre><code>// S3: object storage. 11 nines durability (99.999999999%). Objects stored across 3+ AZs.
// IMMUTABLE: objects cannot be modified in place — only overwrite (creates new version) or delete
// Why? Ensures data integrity, enables audit trail, prevents ransomware from encrypting backups

// Built-in index: S3 uses prefix as index key. Spread prefixes for performance:
// BAD:  2024-01-01/file1, 2024-01-01/file2 → all same prefix → hot partition
// GOOD: random-prefix/2024-01-01/file1 → distributed across S3 partitions

// VERSIONING: enable on bucket → every overwrite creates a new version → can restore any version
// ENCRYPTION options:
//   SSE-S3: AWS manages key (simplest)
//   SSE-KMS: customer manages key via KMS (auditable, key rotation control)
//   SSE-C: customer provides key in request header (key never stored by AWS)

// LIFECYCLE: auto-transition objects between storage classes based on age
//   0-30 days: S3 Standard → 30-90 days: S3-IA (Infrequent Access) → 90+ days: Glacier

// CROSS-REGION REPLICATION (CRR): async replication to another region bucket
//   Use case: disaster recovery, lower latency for global users

// GLACIER — archival storage (very cheap, slow retrieval):
//   Expedited: 1-5 minutes   (most expensive retrieval)
//   Standard: 3-5 hours
//   Bulk: 5-12 hours         (cheapest retrieval)</code></pre></div>
<div class="qa"><div class="q"><span class="qn">AWS36–40</span>RDS, Aurora, DynamoDB, ElastiCache</div>
<table><tr><th>Service</th><th>Key Facts</th></tr>
<tr><td>RDS</td><td>Managed SQL: MySQL, PostgreSQL, Oracle, SQL Server, MariaDB. Multi-AZ = synchronous standby for HA failover (not for reads). Read Replicas = async copies for read scaling (different AZ/region).</td></tr>
<tr><td>Aurora</td><td>AWS-built MySQL/PostgreSQL compatible. 5x faster. 6 copies of data across 3 AZs. Up to 15 read replicas. Storage auto-scales 10GB → 128TB. More expensive but better performance and HA than standard RDS.</td></tr>
<tr><td>DynamoDB</td><td>Serverless NoSQL. Primary key = partition key (required) + sort key (optional). GSI (Global Secondary Index) = separate internal table with different key — enables queries on non-primary-key attributes. Single-digit ms latency at any scale.</td></tr>
<tr><td>ElastiCache Redis</td><td>In-memory cache. Rich data types (strings, lists, sets, hashes, sorted sets). Persistence (RDB/AOF). Pub-sub. Cluster mode for horizontal scaling. Use for session storage, leaderboards, rate limiting.</td></tr>
<tr><td>ElastiCache Memcached</td><td>Simple key-value cache. Multi-threaded. No persistence, no replication. Use for simple high-performance caching.</td></tr></table></div>
<div class="qa"><div class="q"><span class="qn">AWS41–42</span>SQS, SNS — FIFO vs Standard, SNS fan-out</div>
<table><tr><th></th><th>SQS Standard</th><th>SQS FIFO</th></tr>
<tr><td>Order</td><td>Best-effort ordering</td><td>Strict FIFO — exactly once ordering</td></tr>
<tr><td>Delivery</td><td>At-least-once (rare duplicates)</td><td>Exactly-once processing</td></tr>
<tr><td>Throughput</td><td>Unlimited</td><td>300 msg/s (3000 with batching)</td></tr>
<tr><td>Use case</td><td>Email notifications, async tasks</td><td>Financial transactions, order processing</td></tr></table>
<div class="def">SNS = Pub-Sub fan-out. Publish one message → delivered simultaneously to all subscribers (SQS queues, Lambda, email, SMS, HTTP). Pattern: SNS → multiple SQS queues → each queue feeds a different service.</div>
<div class="def">Visibility Timeout in SQS: when a consumer reads a message, it becomes invisible to other consumers for the timeout period. If consumer processes successfully, it deletes the message. If it crashes, message becomes visible again for retry.</div></div>
<div class="qa"><div class="q"><span class="qn">AWS43–44</span>Route53, CloudFront/CDN, VPN vs Direct Connect</div>
<table><tr><th>Service</th><th>Details</th></tr>
<tr><td>Route53</td><td>AWS DNS service. Routes users to endpoints (ALB, S3, CloudFront). Health checks — auto-failover to healthy region. Routing policies: Simple, Weighted, Latency-based, Failover, Geolocation.</td></tr>
<tr><td>CloudFront / CDN</td><td>CDN = Content Delivery Network. Caches content at 400+ edge locations globally. User request goes to nearest edge location (low latency) instead of origin. Works with S3 (static assets), ALB (dynamic). Edge location = AWS datacenter close to users.</td></tr>
<tr><td>VPN</td><td>Encrypted tunnel over public internet. Easy/fast to set up. Variable latency. Good for backup/dev.</td></tr>
<tr><td>Direct Connect</td><td>Dedicated private fiber from your datacenter to AWS. 1Gbps-100Gbps. Consistent low latency. No internet. More expensive. Good for large-scale data transfer or latency-sensitive workloads.</td></tr></table></div>
<div class="qa"><div class="q"><span class="qn">AWS45</span>Secret Manager</div>
<div class="def">AWS Secrets Manager stores and auto-rotates sensitive credentials (DB passwords, API keys, certificates). Services fetch secrets at runtime via AWS SDK — never hardcoded in code or config files. Auto-rotation: Lambda function runs on schedule, generates new password, updates DB, updates secret — zero downtime. CloudTrail audits every secret access.</div></div>
</div></div>`},
