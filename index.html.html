<div class="sec"><h3>Redis</h3>
<div class="qa"><div class="q"><span class="qn">Q1–Q5</span>What is Redis? Advantages? Why high-performance? What data to store?</div>
<div class="def">Redis = Remote Dictionary Server. In-memory key-value store. All data in RAM → sub-millisecond reads/writes. Single-threaded command execution (no lock contention). Non-blocking IO via event loop (similar to Node.js). Supports rich data types: String, Hash, List, Set, Sorted Set (ZSet), Bitmap, HyperLogLog, Stream.</div>
<div class="g2">
<div class="box green"><h4>What to store in Redis</h4><ul><li>Frequently accessed data (hot user profiles, product catalog)</li><li>Session data (user login state — fast auth on every request)</li><li>Computed aggregates (leaderboards, counters, dashboards)</li><li>Temporary/ephemeral data with TTL (OTP codes, rate limit counters)</li><li>Pub-sub messaging (real-time notifications)</li></ul></div>
<div class="box red"><h4>Disadvantages / Cache Consistency</h4><ul><li>Data loss on restart (unless persistence enabled)</li><li>Memory-limited — cannot store terabytes</li><li>Cache inconsistency: DB updated but cache still holds stale value</li><li>Cache stampede: many requests miss cache simultaneously → DB overloaded</li><li>Complexity: invalidation logic, TTL tuning, cluster setup</li></ul></div>
</div></div>

<div class="qa"><div class="q"><span class="qn">Q6–Q13</span>Cache Aside pattern — read flow, write flow, why remove cache before DB update?</div>
<pre><code>// CACHE ASIDE (Lazy Loading) — most common pattern:

// READ FLOW:
// 1. App checks Redis: GET user:123
// 2. Cache HIT → return data immediately (fast path, no DB)
// 3. Cache MISS → query DB → store in Redis with TTL → return data
public User getUser(Long id) {
    String key = "user:" + id;
    User cached = redis.get(key);
    if (cached != null) return cached;           // cache hit
    User user = db.findById(id);                 // cache miss — go to DB
    redis.setex(key, 3600, user);                // store for 1 hour
    return user;
}

// WRITE FLOW — invalidate BEFORE or AFTER?
// WRONG: update DB → update cache (race condition: another thread may read stale between the two)
// CORRECT: update DB → DELETE cache key (next read will fetch fresh from DB)
public User updateUser(User user) {
    db.save(user);                               // write to DB first
    redis.del("user:" + user.getId());           // invalidate cache
    return user;
}

// WHY delete cache instead of update cache?
// Updating cache on write creates race condition:
// Thread A: update DB → update cache with new value
// Thread B: reads old DB value (between A's DB write and cache write) → overwrites with stale!
// Delete = next read fetches fresh from DB = always correct

// CACHE MISS STORM (Thundering Herd):
// Many requests miss simultaneously → all hit DB at once → DB overloaded
// Fix: "Cache Warming" on startup, or mutex lock on cache key:
String lockKey = "lock:user:" + id;
if (redis.setnx(lockKey, "1", 5)) {  // only 1 thread queries DB
    User user = db.findById(id);
    redis.setex("user:" + id, 3600, user);
    redis.del(lockKey);
} else {
    Thread.sleep(50); return getUser(id); // retry after lock released
}</code></pre></div>

<div class="qa"><div class="q"><span class="qn">Q14–Q15</span>TTL in Redis? Read-Through vs Write-Through?</div>
<table><tr><th></th><th>Cache Aside</th><th>Read-Through</th><th>Write-Through</th></tr>
<tr><td>Who populates cache</td><td>Application code</td><td>Cache layer auto-fetches from DB on miss</td><td>Every write goes to cache AND DB together</td></tr>
<tr><td>Consistency</td><td>Eventual (invalidate + re-populate)</td><td>Good — transparent to app</td><td>Strong — cache always in sync</td></tr>
<tr><td>Write latency</td><td>Fast</td><td>Fast</td><td>Slower (wait for both)</td></tr>
<tr><td>Complexity</td><td>App manages invalidation</td><td>Cache provider handles it</td><td>Cache provider handles it</td></tr></table>
<div class="def">TTL (Time To Live) = expiry seconds. Redis auto-deletes key after TTL. Use short TTL (seconds-minutes) for rapidly changing data (prices, inventory). Long TTL (hours) for stable data (user profiles). No TTL + event-driven invalidation = highest consistency.</div></div>

<div class="qa"><div class="q"><span class="qn">Q16–Q19</span>Redis Cluster — hash slots, data distribution, leaders, followers</div>
<pre><code>// Redis Cluster: horizontal scaling — splits data across multiple nodes
// 16,384 hash slots total → distributed across N nodes
// Each node owns a RANGE of slots:
//   Node A: slots 0–5460
//   Node B: slots 5461–10922
//   Node C: slots 10923–16383

// Which slot for a key?
// slot = CRC16(key) % 16384 → deterministic, always same slot for same key
// Client routes request to the node owning that slot

// Each node = 1 primary (leader) + 1-N replicas (followers)
// Leader: handles reads AND writes for its slots
// Follower: replicates from leader → used if leader fails (automatic failover)
//           CAN serve reads (enable read-from-replica for lower primary load)

// Cluster benefits:
// Scale out: add new node → rebalance slots across more nodes
// HA: if one node fails → replica promoted automatically
// No downtime: slot migration is live (cluster handles in background)

// Spring Boot + Redis Cluster:
spring.data.redis.cluster.nodes=node1:6379,node2:6379,node3:6379
spring.data.redis.cluster.max-redirects=3</code></pre></div>
</div>

<div class="sec"><h3>Git Branching Strategy</h3>
<div class="qa"><div class="q"><span class="qn">Q20–Q28</span>Branches — Main, Release, Development, Feature, environments, PR flow</div>
<div class="flow">
<strong>Branch → Environment mapping:</strong><br>
feature/* → local dev / feature env (isolated, per-developer)<br>
development → DEV environment (shared, integration testing)<br>
release/* → STAGING / QA environment (pre-production, regression testing)<br>
main/master → PRODUCTION (live, customer-facing)<br><br>
<strong>Code flow:</strong><br>
1. Developer cuts feature branch from development: git checkout -b feature/order-api<br>
2. Commits work to feature branch (small, atomic commits)<br>
3. Opens Pull Request (PR): feature → development<br>
4. PR triggers CI pipeline: build + tests + SonarQube + coverage check<br>
5. Code review (min 2 approvers) + PR comments resolved<br>
6. Merge to development → auto-deploy to DEV<br>
7. When ready for release: cut release/1.5.0 branch from development<br>
8. QA tests on STAGING → bug fixes go into release branch directly<br>
9. Merge release → main → deploy to PROD + tag: v1.5.0<br>
10. Merge release → development (to keep bug fixes in dev)
</div>
<pre><code>// Why feature branches?
// Isolate work — other devs not affected by in-progress features
// Easy code review — one PR = one feature
// Easy rollback — revert one PR if feature has issues

// Pull Request (PR):
// Triggers automated checks (CI pipeline)
// Required: 2+ approver reviews before merge
// Branch protection: cannot merge without approvals + passing checks

// Difference: development vs release branch
// Development: integrated, potentially unstable, new features being added daily
// Release: frozen (no new features), only bug fixes, being hardened for production</code></pre></div>
</div>

<div class="sec"><h3>CI/CD Pipeline</h3>
<div class="qa"><div class="q"><span class="qn">Q29–Q45</span>Full CI/CD pipeline — stages, testing, SonarQube, Docker, ECR, ECS deployment</div>
<div class="flow">
<strong>Full Pipeline:</strong><br>
PR Raised → Code Review → Merge to dev branch →<br>
<strong>CI Stage:</strong> Pull code → Build (mvn compile) → Unit Tests (JUnit) → Integration Tests (Testcontainers)<br>
→ Code Coverage (JaCoCo — fail if &lt;80%) → SonarQube (security + quality scan)<br>
→ OWASP Dependency Check (known CVE vulnerabilities in libraries)<br>
<strong>Package Stage:</strong> mvn package → Build Docker image → Push to ECR<br>
→ ECR image scan (Trivy — OS and library CVE check)<br>
<strong>Deploy Stage:</strong> Update ECS task definition → Rolling or blue-green deploy → Health check<br>
→ Smoke tests → notify Slack/Teams
</div>
<pre><code>// Unit Test: test one class in isolation with Mockito (no DB, no network)
// Integration Test: test multiple components together — use Testcontainers for real DB
// SonarQube: static analysis — finds: code smells, duplications, security hotspots, coverage gaps
//   Read SonarQube report: Quality Gate = Pass/Fail threshold
//   Critical findings: SQL injection, hardcoded passwords, unhandled exceptions
// JaCoCo: measures what % of code is executed by tests
//   Reports: line coverage, branch coverage, missed code paths

// Sanity check: quick smoke test after deploy — hit /health + critical endpoints
// Verify: login works, create order works, key happy paths pass

// Dockerfile for Spring Boot:
FROM eclipse-temurin:21-jre-alpine    // use slim JRE, not full JDK
WORKDIR /app
COPY target/app.jar app.jar
EXPOSE 8080
ENTRYPOINT ["java","-jar","-XX:+UseG1GC","-Xmx512m","app.jar"]
// Build: docker build -t my-app:1.0 .
// Push to ECR: docker push 123.dkr.ecr.us-east-1.amazonaws.com/my-app:1.0

// Tools:
// Jenkins: self-hosted CI/CD, Groovy pipelines, full control
// AWS CodeBuild: managed, integrates with ECR/ECS/CodeDeploy, no server to maintain
// GitLab CI/CD: built into GitLab, .gitlab-ci.yml, good for monorepo
// GitHub Actions: .github/workflows/*.yml, great for GitHub repos</code></pre></div>
</div>

<div class="sec"><h3>Docker</h3>
<div class="qa"><div class="q"><span class="qn">Q46–Q56</span>Dockerfile, image, container, architecture, why containerize</div>
<div class="g2">
<div class="box blue"><h4>Key Concepts</h4><ul><li><strong>Dockerfile:</strong> text script with build instructions (FROM, RUN, COPY, EXPOSE, ENTRYPOINT)</li><li><strong>Docker Image:</strong> read-only snapshot built from Dockerfile. Layered (each instruction = layer). Push/pull from registry.</li><li><strong>Container:</strong> running instance of an image. Writable layer on top of image. Isolated process.</li><li><strong>Registry:</strong> Amazon ECR, Docker Hub — store and version images</li></ul></div>
<div class="box green"><h4>Why Containerize?</h4><ul><li>"Works on my machine" problem solved — image includes OS libs</li><li>Consistent: dev/staging/prod all run identical image</li><li>Fast start (seconds vs minutes for VMs)</li><li>Lightweight: share OS kernel (vs VM has full OS)</li><li>Easy rollback: deploy previous image tag</li><li>Microservice fit: each service = own container</li></ul></div>
</div>
<pre><code>// Dockerfile instructions explained:
FROM eclipse-temurin:21-jre-alpine   // Base image — start FROM here (Alpine = tiny Linux)
WORKDIR /app                          // Set working directory inside container
COPY target/app.jar app.jar           // COPY host file → container filesystem
EXPOSE 8080                           // Document which port app listens on (doesn't publish it)
ENTRYPOINT ["java","-jar","app.jar"]  // Command that runs when container starts

// ENTRYPOINT vs CMD:
// ENTRYPOINT: fixed command — cannot be overridden by docker run args (use for main process)
// CMD: default args — CAN be overridden: docker run myimage java -jar other.jar

// Multi-stage build (reduce image size):
FROM maven:3.9-eclipse-temurin-21 AS builder  // Stage 1: build
WORKDIR /app
COPY pom.xml .
RUN mvn dependency:go-offline              // cache dependencies layer
COPY src ./src
RUN mvn package -DskipTests

FROM eclipse-temurin:21-jre-alpine         // Stage 2: runtime (no Maven/JDK!)
COPY --from=builder /app/target/app.jar app.jar
ENTRYPOINT ["java","-jar","app.jar"]
// Result: final image is ONLY JRE + jar (~180MB vs ~800MB with Maven)

// Image vs Container:
// Image = class (blueprint), Container = object (running instance)
// docker build → creates image
// docker run → creates + starts container FROM image
// docker stop → stops container (image unchanged)
// Multiple containers can run from same image simultaneously</code></pre></div>
</div>

<div class="sec"><h3>Amazon ECS</h3>
<div class="qa"><div class="q"><span class="qn">Q57–Q68</span>ECS, task definition, EC2 vs Fargate, ALB, scaling, CloudWatch</div>
<div class="def">ECS (Elastic Container Service) = AWS-managed container orchestration. Runs Docker containers without managing Kubernetes. Two launch types: EC2 (you manage the EC2 instances) or Fargate (AWS manages compute — serverless containers).</div>
<table><tr><th></th><th>EC2 Launch Type</th><th>Fargate Launch Type</th></tr>
<tr><td>Infrastructure</td><td>You provision/manage EC2 instances</td><td>AWS manages all — no EC2 to manage</td></tr>
<tr><td>Cost</td><td>Cheaper for sustained high usage</td><td>Pay per vCPU/memory per second — good for variable workloads</td></tr>
<tr><td>Control</td><td>Can SSH, customize AMI</td><td>No server access (serverless)</td></tr>
<tr><td>Scaling</td><td>Must scale EC2 cluster AND tasks</td><td>Just scale tasks — Fargate handles compute</td></tr>
<tr><td>Why serverless?</td><td>N/A</td><td>No servers to patch/manage/provision — just define CPU+RAM, Fargate runs it</td></tr></table>
<pre><code>// TASK DEFINITION — blueprint for a container (like a class/template):
{
  "family": "order-service",
  "cpu": "512",                        // 0.5 vCPU
  "memory": "1024",                    // 1 GB RAM
  "containerDefinitions": [{
    "name": "order-service",
    "image": "123.dkr.ecr.us-east-1.amazonaws.com/order-service:1.0",  // ECR image
    "portMappings": [{"containerPort": 8080}],
    "environment": [{"name": "SPRING_PROFILES_ACTIVE","value": "prod"}],
    "secrets": [{"name": "DB_PASSWORD","valueFrom": "arn:aws:secretsmanager:..."}],
    "logConfiguration": {
      "logDriver": "awslogs",          // send logs to CloudWatch
      "options": {"awslogs-group": "/ecs/order-service"}
    },
    "healthCheck": {
      "command": ["CMD-SHELL","curl -f http://localhost:8080/actuator/health || exit 1"],
      "interval": 30, "timeout": 5, "retries": 3
    }
  }]
}

// ECS SERVICE — runs N copies (tasks) of a task definition:
// Maintains desired count (auto-restart failed tasks)
// Integrates with ALB for load balancing + health checks
// Auto-registers new tasks in ALB target group

// HORIZONTAL SCALING in ECS:
// Target tracking: if avg CPU > 70% → add tasks; if < 30% → remove tasks
// Scale in: min=1, desired=2, max=10
// Works with Fargate: just spawn more tasks — no EC2 needed

// AWS Cloud Map: service discovery for ECS
// ECS task registers IP:port in Cloud Map on startup
// Other services query Cloud Map: "where is order-service?" → get IP list

// CloudWatch in ECS:
// Container logs → CloudWatch Logs (awslogs driver)
// Metrics: CPU/memory per task, ALB request count, 5xx errors
// Alarms: trigger SNS notification or scale action</code></pre></div>
</div>

<div class="sec"><h3>Agile &amp; Scrum</h3>
<div class="qa"><div class="q"><span class="qn">Q69–Q85</span>Agile vs Scrum, sprint, story points, ceremonies, team roles</div>
<table><tr><th></th><th>Agile</th><th>Scrum</th></tr>
<tr><td>What</td><td>Methodology/mindset — iterative, flexible delivery</td><td>Framework that IMPLEMENTS Agile — specific rules, roles, ceremonies</td></tr>
<tr><td>Scope</td><td>Broad philosophy</td><td>Specific process with sprints, backlogs, ceremonies</td></tr>
<tr><td>Team roles</td><td>Flexible</td><td>Scrum Master, Product Owner, Dev Team</td></tr></table>
<pre><code>// KEY CONCEPTS:
// BACKLOG: prioritized list of all features/bugs/tasks (Product Backlog)
// SPRINT: time-boxed iteration (usually 2 weeks) to deliver working software
// Why 2 weeks? Short enough for fast feedback, long enough to complete meaningful work
// STORY POINTS: relative effort estimate (1=trivial, 2=easy, 3=medium, 5=complex, 8=hard, 13=very hard)
//   Teams calibrate: "a story point 3 takes our team about 1 day" (varies by team)
// JIRA: tracks tickets (user stories, bugs, tasks) — columns: Backlog/To Do/In Progress/In Review/Done

// CEREMONIES:
// Sprint Planning (start of sprint): team reviews backlog, selects items, estimates, commits to sprint goal
// Daily Standup (every day, 15 min): what did I do yesterday? what today? any blockers?
// Backlog Refinement (mid-sprint): PO + dev discuss upcoming stories, add detail, estimate
// Demo/Review (end of sprint): show working software to stakeholders, get feedback
// Retrospective (end of sprint): what went well? what to improve? team process discussion

// TEAM ROLES:
// Scrum Master: facilitates ceremonies, removes blockers, coaches team on Scrum
// Product Owner: owns backlog priority, defines requirements (user stories), accepts work
// QA: writes test cases, verifies acceptance criteria, regression testing
// BA (Business Analyst): gathers requirements, writes user stories, bridges business + dev
// DevOps: maintains CI/CD pipeline, infra, monitoring, supports deployment
// Manager: removes organizational blockers, handles resourcing, shields team from politics
// Full Stack Dev: implements features across frontend + backend layers
// Ideal team size: 5-9 people (small enough to communicate easily, large enough for coverage)</code></pre></div>
</div>

<div class="sec"><h3>LLM &amp; AI Concepts</h3>
<div class="qa"><div class="q"><span class="qn">Q86–Q95</span>LLM, token prediction, seed, temperature, deterministic vs stochastic</div>
<div class="def">LLM (Large Language Model) = a neural network trained on massive text datasets. Predicts the most probable next token given the context. Does NOT "understand" — it computes probability distributions over vocabulary.</div>
<pre><code>// TOKEN: the smallest unit an LLM processes (roughly 4 chars or 0.75 words)
// "Hello world" = 2 tokens. "unbelievable" = 1-3 tokens depending on model.
// Why tokens matter: LLMs charge per token, have context window limits (e.g. 128K tokens)

// NEXT TOKEN PREDICTION:
// Input: "The sky is"
// LLM computes probability for every token in vocabulary:
//   "blue"  → 35%
//   "clear" → 18%
//   "dark"  → 12%
//   ...
// Selects next token based on TEMPERATURE setting

// TEMPERATURE:
// Controls randomness of token selection
// temp=0.0: always pick highest probability token (deterministic, repetitive, factual)
// temp=0.7: weighted random from top tokens (balanced — good for general use)
// temp=1.0: sample proportionally to probabilities (creative, varied)
// temp=2.0: very random, often incoherent (experimental)

// SEED:
// Fixed random number for the sampling process
// Same prompt + same seed + same temperature = EXACTLY same output (reproducible)
// Different seed = different output (even with same prompt + temperature)
// Use seed for: debugging, A/B testing, reproducible experiments

// DETERMINISTIC: temp=0 or temp=0 + fixed seed → same output every time (use for factual Q&amp;A)
// STOCHASTIC: temp&gt;0 without fixed seed → varies each run (use for creative content, brainstorming)

// LLM Architecture Flow:
// User Request → API Gateway → Stream Lambda (auth, throttle, streaming setup)
// → HTTP/SSE to LLM endpoint (Bedrock, OpenAI, etc.)
// → LLM generates tokens one by one → streamed back to client (Server-Sent Events)
// Why Lambda before LLM? Add auth, logging, prompt injection guard, cost tracking, caching</code></pre></div>
</div>

<div class="sec"><h3>MCP &amp; LangChain</h3>
<div class="qa"><div class="q"><span class="qn">Q96–Q103</span>MCP — resources, routing; LangChain — chain vs graph</div>
<pre><code>// MCP (Model Context Protocol): standardized protocol for LLM agents to access external tools/data
// Agent declares RESOURCES it can access:
//   - DB: query order history
//   - API: call inventory service
//   - S3: read PDF documents
//   - File system: read local files

// MCP ROUTING — how does it decide which resource to use?
// 1. User asks: "What is the status of order #123?"
// 2. LLM analyzes intent → determines it needs order data
// 3. MCP routes to DB resource: SELECT * FROM orders WHERE id=123
// 4. Result returned to LLM as context
// 5. LLM generates response using both training knowledge + fetched data

// Example:
// "Fetch logs for Lambda xyz from last hour" → MCP routes to S3/CloudWatch
// "Get order #123 details" → MCP routes to OrderDB
// "What is the weather today?" → MCP routes to Weather API

// LANGCHAIN: framework for building LLM-powered applications
// Chain: linear sequence of steps (prompt → LLM → output → next prompt → LLM → ...)
//   Input → [PromptTemplate → LLM → OutputParser] → Output
//   Good for: simple Q&amp;A, summarization, single-path workflows

// LangGraph: directed graph of steps (can loop, branch, have conditional edges)
//   Node = processing step. Edge = transition (can be conditional).
//   Good for: agents that need to decide "try again" or "ask for clarification" or "use tool"

// Chain vs Graph:
// Chain: A → B → C (linear, predictable, no loops)
// Graph: A → B, A → C (branch), C → A (loop back if condition), complex agent logic</code></pre></div>
</div>

<div class="sec"><h3>RAG — Retrieval Augmented Generation</h3>
<div class="qa"><div class="q"><span class="qn">Q104–Q120</span>RAG, Vector DB, Embeddings, Chunking, Retrieval, Reranking, Hybrid Search</div>
<div class="def">RAG = technique to give LLMs access to your private/recent data without retraining. Retrieve relevant context from your knowledge base, inject it into the prompt, LLM generates grounded answer. Solves: hallucination, stale knowledge cutoff, private data.</div>
<pre><code>// RAG ARCHITECTURE — STORAGE PHASE (one-time, or on document update):
// 1. Load documents (PDFs, Confluence pages, Notion docs, DB records)
// 2. CHUNK: split into smaller pieces (chunk = a paragraph or section)
// 3. EMBED: convert each chunk to a dense vector (e.g. 1536-dim float array)
//    Embedding model maps semantic meaning to numerical space
//    Similar meaning → similar vectors (close in vector space)
// 4. Store: vectors + metadata + chunk text in Vector DB (OpenSearch, Pinecone, pgvector)

// WHY CHUNKS? LLMs have context window limits. A 500-page PDF won't fit — chunk it.
// WHY OVERLAP? Chunks with overlap (e.g. 200 chars overlap) prevent context loss at chunk boundaries
//   Without overlap: "the query returns..." / "...NULL rows" — split loses the connection

// CHUNKING STRATEGIES:
// Fixed token chunking: split every N tokens (simple, ignores content structure)
// Subtitle/section-based: split at headers (H1/H2) — preserves semantic units
// Semantic chunking: use embedding similarity to find natural break points in meaning

// RETRIEVAL PHASE (per user query):
// 1. User query → embed with SAME model → query vector
// 2. Vector DB: find Top-K most similar chunks (cosine similarity / dot product)
// 3. Return top K chunks as context
// 4. Build prompt: "Answer based on context: [chunks]. User question: [query]"
// 5. LLM generates answer grounded in retrieved chunks

// SEARCH TYPES:
// Keyword search: match exact words → BM25 algorithm → fast, misses synonyms
// Semantic search: match meaning via vectors → catches paraphrases, synonyms, conceptual similarity
// Hybrid search: combine both scores (RRF — Reciprocal Rank Fusion)
//   hybrid_score = alpha * semantic_score + (1-alpha) * keyword_score
//   Best: catches both exact matches AND conceptual matches

// IMPROVING RAG ACCURACY:
// Reranking: after Top-K retrieval, use a cross-encoder model to re-score pairs (query, chunk)
//   First pass: fast ANN retrieval (get Top-50) → Second pass: reranker picks best 5
//   Cross-encoder reads BOTH query and chunk together → much more accurate relevance
// Better chunking: use semantic chunking → more coherent chunks
// Prompt engineering: instruct LLM to only answer from provided context
// Cache: store (query_embedding → top_chunks) pairs — same query hits cache
// Top-K: K=3-5 is typical. Too few = miss relevant info. Too many = dilutes context, costs tokens</code></pre></div>
</div>

<div class="sec"><h3>OpenSearch &amp; ElasticSearch</h3>
<div class="qa"><div class="q"><span class="qn">Q121–Q130</span>OpenSearch, ElasticSearch internals, inverted index, semantic + hybrid search</div>
<pre><code>// ELASTICSEARCH / OPENSEARCH (AWS fork of Elasticsearch):
// Distributed search engine built on Apache Lucene
// Stores documents as JSON, builds inverted index for fast full-text search

// INVERTED INDEX — how it enables fast search:
// Forward: document → list of words (document has these words)
// Inverted: word → list of document IDs (these documents contain this word)
//
// Index build:
//   Doc1: "Java Spring Boot tutorial"
//   Doc2: "Spring security JWT guide"
// Inverted index:
//   "java"     → [Doc1]
//   "spring"   → [Doc1, Doc2]
//   "boot"     → [Doc1]
//   "security" → [Doc2]
//   "jwt"      → [Doc2]
//
// Query "spring jwt" → intersect [Doc1,Doc2] ∩ [Doc2] → Doc2 — INSTANT!

// DOCUMENT INDEXING:
// POST /products/_doc/1  {"name":"Nike Air Max","price":120,"category":"shoes"}
// Elasticsearch: analyze text → tokenize → build inverted index entry per token
// Analyzers: lowercase, remove stop words, stem (running → run)

// WHY FAST: inverted index is pre-computed at index time, not query time

// OPENSEARCH HYBRID SEARCH (in RAG systems):
// k-NN (vector) search: store embeddings → cosine similarity → semantic results
// BM25 (keyword) search: inverted index → exact + TF-IDF scored results
// Hybrid query: combines both with normalization + RRF
GET /knowledge-base/_search {
  "query": {
    "hybrid": {
      "queries": [
        {"match": {"content": "kafka consumer group"}},    // keyword
        {"knn": {"embedding": {"vector": [...], "k": 10}}} // semantic
      ]
    }
  }
}</code></pre></div>
</div>

<div class="sec"><h3>AI Agent Architecture &amp; AWS Bedrock</h3>
<div class="qa"><div class="q"><span class="qn">Q131–Q145</span>AI Agent, LLM+RAG+MCP, Bedrock, Foundation Models, Guardrails, Evaluation</div>
<pre><code>// AI AGENT ARCHITECTURE:
// An agent = LLM + tools + memory + decision loop
// Can autonomously decide what tools to call, in what order, based on user goal

// FULL FLOW combining LLM + RAG + MCP:
// User: "Summarize recent support tickets about payment failures"
// Agent:
//   1. Understands intent → decides to use MCP tool: query_support_db
//   2. MCP queries DB: SELECT * FROM tickets WHERE category='payment' AND date > NOW()-7DAYS
//   3. Results passed to RAG: embed query → find similar KB articles (solutions)
//   4. Merge: DB results (raw tickets) + RAG results (relevant KB context)
//   5. LLM generates: structured summary + recommended actions
// Hardcoded config: which tools available, max iterations, output format, guardrails

// AWS BEDROCK:
// Fully managed service to access Foundation Models (FMs) via API
// No need to host models — AWS handles compute, scaling, updates

// AVAILABLE FOUNDATION MODELS:
// Amazon Titan (AWS), Anthropic Claude (Sonnet/Opus/Haiku),
// Meta Llama 3, Mistral AI, Cohere, AI21 Jurassic, Stability AI (images)

// BEDROCK KNOWLEDGE BASE:
// Managed RAG — upload docs to S3, Bedrock handles chunking + embedding + storage in OpenSearch
// Automatic sync: update S3 → Bedrock re-indexes automatically
// Integrates with Claude for grounded Q&amp;A

// BEDROCK GUARDRAILS (content safety layer):
// Topic filtering: block off-topic questions (e.g. block financial advice for a cooking bot)
// Content filtering: block harmful content (violence, hate speech) — configurable thresholds
// PII detection + masking: detect SSN/credit card → replace with [MASKED] before sending to LLM
//   or REDACT (remove entirely) to prevent LLM from seeing sensitive data
// Grounding score: measures how much the response is based on retrieved context (0-1)
// Faithfulness score: measures if the response contradicts the retrieved context
// Both scores prevent hallucination in RAG systems

// BEDROCK EVALUATION JOB:
// Automated benchmark of model outputs against human-labeled "golden" answers
// Metrics: accuracy, ROUGE score, BERTScore, human preference
// Why: compare models (Claude vs Titan) for your specific use case
//      track quality over time as you update prompts or knowledge base</code></pre></div>
</div></div>`},

<p class="tagline">Real questions from Vanguard · BNY Mellon · Walmart 1st &amp; 2nd Round — detailed answers, code, topic references</p>

<div class="tip" style="margin-bottom:18px;">How to use this section: each company block has real questions asked. The answer explains the concept, gives code, and references which Day covers it in depth. Read through before your interview — focus on answers you'd struggle to say out loud.</div>

<div class="sec"><h3 style="background:#1e293b;color:#f1f5f9;padding:10px 14px;border-radius:7px;">🏦 Vanguard Interview — 04/28/2026</h3>

<div class="qa"><div class="q"><span class="qn">V1</span>What is @Autowired? How does it work? Why do we need DI?</div>
<div class="def">@Autowired tells Spring to inject a dependency automatically — Spring looks in its ApplicationContext for a bean matching the type and injects it. DI (Dependency Injection) means objects receive their dependencies from outside rather than creating them with new. IoC (Inversion of Control) means Spring owns object creation, not you.</div>
<pre><code>// WITHOUT DI — tight coupling, hard to test:
public class OrderService {
    private PaymentService paymentService = new PaymentService(); // hardcoded, can't mock
}

// WITH DI — loose coupling, easy to test:
@Service
public class OrderService {
    private final PaymentService paymentService;
    public OrderService(PaymentService paymentService) { // Spring injects this
        this.paymentService = paymentService;
    }
}
// In tests: just pass new MockPaymentService() — no Spring needed!

// WHY DI?
// 1. Loose coupling — change PaymentService impl without touching OrderService
// 2. Testability — inject mocks easily
// 3. Single Responsibility — OrderService only handles orders, not creating its deps
// 4. Lifecycle management — Spring handles singleton, scope, init/destroy</code></pre>
<div class="note">Reference → Day 7-9: Spring IoC &amp; DI</div></div>

<div class="qa"><div class="q"><span class="qn">V2</span>Constructor vs Field vs Setter Injection — which to use and why?</div>
<table><tr><th></th><th>Constructor</th><th>Field (@Autowired)</th><th>Setter</th></tr>
<tr><td>Immutability</td><td>✅ Can make final</td><td>❌ Cannot be final</td><td>❌ Mutable after creation</td></tr>
<tr><td>Testability</td><td>✅ No Spring needed in tests</td><td>❌ Need reflection/Spring</td><td>✅ Call setter directly</td></tr>
<tr><td>Required deps</td><td>✅ Explicit — missing dep = won't start</td><td>❌ Silent null if missing</td><td>❌ Optional only</td></tr>
<tr><td>Circular dep</td><td>❌ Fails fast at startup</td><td>⚠️ Spring handles but hides design smell</td><td>✅ Can resolve circular</td></tr>
<tr><td>Recommendation</td><td>✅ ALWAYS prefer</td><td>❌ Avoid in production</td><td>Use only for optional deps</td></tr></table></div>

<div class="qa"><div class="q"><span class="qn">V3</span>@Qualifier — when and how to use it?</div>
<div class="def">When two beans implement the same interface, Spring doesn't know which to inject → NoUniqueBeanDefinitionException. @Qualifier specifies exactly which bean by name. @Primary marks the default when no @Qualifier is specified.</div>
<pre><code>interface NotificationService { void send(String msg); }

@Service("emailNotification")
public class EmailNotificationService implements NotificationService { ... }

@Service("smsNotification")
public class SmsNotificationService implements NotificationService { ... }

// Inject specific one:
@Service public class AlertService {
    public AlertService(@Qualifier("smsNotification") NotificationService ns) { ... }
}

// Or use @Primary for default:
@Service @Primary public class EmailNotificationService implements NotificationService { ... }
// Now EmailNotification is injected unless @Qualifier specifies otherwise</code></pre></div>

<div class="qa"><div class="q"><span class="qn">V4</span>@Bean vs @Component vs @Service vs @Repository vs @Controller — differences?</div>
<table><tr><th>Annotation</th><th>Where</th><th>Key difference</th></tr>
<tr><td>@Component</td><td>Any class</td><td>Generic Spring-managed bean. Parent of @Service, @Repository, @Controller.</td></tr>
<tr><td>@Service</td><td>Business logic class</td><td>Same as @Component but signals business layer. No extra Spring behavior.</td></tr>
<tr><td>@Repository</td><td>Data access class</td><td>Same + TRANSLATES persistence exceptions to Spring DataAccessException (catches vendor-specific SQLExceptions).</td></tr>
<tr><td>@Controller</td><td>Web layer class</td><td>Handles HTTP requests. Works with @RequestMapping. Returns view names.</td></tr>
<tr><td>@RestController</td><td>REST API class</td><td>@Controller + @ResponseBody on all methods. Returns JSON/XML directly.</td></tr>
<tr><td>@Bean</td><td>Inside @Configuration method</td><td>Manually declare a bean — use when you can't add @Component (third-party class, needs custom init).</td></tr></table>
<pre><code>@Configuration
public class AppConfig {
    @Bean // manually create a bean you don't own
    public ObjectMapper objectMapper() {
        return new ObjectMapper().configure(FAIL_ON_UNKNOWN_PROPERTIES, false);
    }
}</code></pre></div>

<div class="qa"><div class="q"><span class="qn">V5</span>What is Loose Coupling? Why is it important?</div>
<div class="def">Loose coupling = components know as little as possible about each other. They interact through interfaces/abstractions, not concrete implementations. Change one component without breaking others. DI enforces loose coupling — inject the interface, not the class.</div>
<pre><code>// TIGHT coupling — OrderService knows exactly which PaymentService:
public class OrderService {
    StripePaymentService stripe = new StripePaymentService(); // locked to Stripe forever
}

// LOOSE coupling — depends on interface:
public class OrderService {
    private final PaymentService paymentService; // could be Stripe, PayPal, Mock — doesn't care
    public OrderService(PaymentService paymentService) { this.paymentService = paymentService; }
}
// Switch from Stripe to PayPal: change 1 line in Spring config → OrderService unchanged</code></pre></div>

<div class="qa"><div class="q"><span class="qn">V6</span>How do you secure a Spring Boot application? Full security flow?</div>
<div class="flow">
<strong>Authentication:</strong> User sends username + password to POST /auth/login<br>
→ AuthenticationManager → UserDetailsService.loadUserByUsername() → BCrypt verify password<br>
→ If valid: generate JWT (signed with private key) → return to client<br><br>
<strong>Authorization:</strong> Client sends Bearer JWT in Authorization header on every request<br>
→ JwtAuthFilter: extract token → verify signature with public key → check expiry<br>
→ Set SecurityContext with user + roles → controller method runs<br>
→ @PreAuthorize("hasRole('ADMIN')") → 403 if role mismatch<br><br>
<strong>At rest:</strong> RDS encrypted (KMS), S3 SSE-KMS, Secret Manager for credentials<br>
<strong>In transit:</strong> HTTPS/TLS — all traffic encrypted end to end<br>
<strong>Infrastructure:</strong> VPC + private subnets, Security Groups, IAM Roles (no static keys)
</div>
<div class="note">Reference → Day 17: Full Spring Security + JWT + OAuth 2.0</div></div>

<div class="qa"><div class="q"><span class="qn">V7</span>JWT — 3 parts, how frontend &amp; backend secure it, HTTPS/TLS flow</div>
<pre><code>// JWT = header.payload.signature (Base64URL encoded, dot-separated)
// Header: {"alg":"RS256","typ":"JWT"}
// Payload: {"sub":"user123","roles":["ADMIN"],"exp":1699003600}  ← NOT encrypted, anyone can read!
// Signature: RSA_Sign(privateKey, base64(header)+"."+base64(payload))

// VALIDATION:
// Server recalculates hash of header+payload
// Decrypts signature using PUBLIC KEY
// If match → authentic + untampered → accept
// If payload modified → hash mismatch → REJECTED

// Frontend security:
// Store JWT in memory (safest) or httpOnly cookie (safe from XSS, immune to CSRF with SameSite)
// NEVER store in localStorage — vulnerable to XSS attacks
// Send as: Authorization: Bearer eyJhbGc...

// Backend security:
// Validate on every request in OncePerRequestFilter
// Check expiry (exp claim)
// Verify signature with public key — no DB lookup needed!

// TLS flow (how HTTPS protects JWT in transit):
// 1. Browser → Server: "Hello, support TLS 1.3"
// 2. Server → Browser: Certificate (contains server's Public Key, signed by CA)
// 3. Browser: Verify cert against trusted CAs (built into browser)
// 4. Browser: Generate session key → encrypt with server's Public Key → send
// 5. Server: Decrypt session key with Private Key
// 6. Both: Now use symmetric AES for all data — JWT travels encrypted</code></pre></div>

<div class="qa"><div class="q"><span class="qn">V8</span>What is Java 8 Stream API? Why use it instead of for-loop?</div>
<div class="def">Stream API = functional-style pipeline for processing collections. Intermediate operations (lazy, return Stream) + Terminal operations (eager, trigger pipeline, return result). Parallel streams use ForkJoinPool for multi-core processing.</div>
<pre><code>// INTERMEDIATE (lazy — nothing runs until terminal called):
.filter(e -> e.getSalary() > 50000)    // keep matching elements
.map(e -> e.getName())                  // transform element (1:1)
.flatMap(e -> e.getProjects().stream()) // transform + flatten (1:many → flat)
.distinct()                             // remove duplicates
.sorted(Comparator.comparing(Employee::getName))
.limit(10)                              // take first 10
.skip(5)                                // skip first 5

// TERMINAL (triggers the pipeline):
.collect(Collectors.toList())          // gather to list
.collect(Collectors.groupingBy(Employee::getDept))  // group by dept → Map
.collect(Collectors.joining(", "))     // join strings
.forEach(System.out::println)          // consume each
.count()                               // count elements
.findFirst()                           // first element as Optional
.anyMatch(e -> e.getSalary() > 100000) // boolean check
.reduce(0, Integer::sum)               // accumulate to single value

// WHY STREAM over for-loop?
// 1. Readability — declarative (WHAT to do, not HOW)
// 2. Lazy evaluation — filter().map().findFirst() stops at first match, doesn't process all
// 3. Parallel — just change stream() to parallelStream() for multi-core
// 4. Composable — chain operations cleanly
// WHEN for-loop is better: simple iterations, index needed, early exit with complex logic

// parallelStream() — uses ForkJoinPool.commonPool() (all CPUs):
// Use for: CPU-intensive tasks, large datasets (>10K elements)
// Avoid for: small collections (parallel overhead > benefit), IO-bound tasks, shared mutable state</code></pre></div>

<div class="qa"><div class="q"><span class="qn">V9</span>Abstract class — can it have a constructor? Why?</div>
<div class="def">YES. Abstract class CAN and often MUST have a constructor. When a subclass is instantiated, the parent constructor runs first via super() to initialize inherited fields. The abstract class is never directly instantiated (new AbstractClass() fails), but its constructor IS called when a concrete subclass is created.</div>
<pre><code>abstract class Shape {
    String color;
    Shape(String color) {      // abstract class constructor
        this.color = color;    // initializes inherited field
    }
    abstract double area();
}

class Circle extends Shape {
    double radius;
    Circle(String color, double radius) {
        super(color);          // MUST call parent constructor first!
        this.radius = radius;
    }
    double area() { return Math.PI * radius * radius; }
}

// new Shape("red")  → ❌ COMPILE ERROR — cannot instantiate abstract class
// new Circle("red", 5.0) → ✅ calls Shape("red") then Circle(...)
</code></pre></div>

<div class="qa"><div class="q"><span class="qn">V10</span>OOM Error — what do you do?</div>
<div class="def">OutOfMemoryError = JVM Heap is full, GC cannot free enough space. Immediate steps depend on root cause.</div>
<pre><code>// Step 1: Don't just restart — root cause first!
// Step 2: Enable heap dump on OOM (add JVM flag):
-XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp/heapdump.hprof

// Step 3: Analyze heap dump with Eclipse MAT or JProfiler:
// → Find objects taking most memory
// → Find GC roots preventing collection (memory leak)
// → Common leaks: static collections growing unboundedly, unclosed streams/connections,
//   Hibernate session caches, ThreadLocal not cleaned up

// Step 4: Based on findings:
// Memory leak → fix the code (close resources, clear caches, remove static references)
// Legitimate usage → increase heap: -Xmx4g (max heap), -Xms2g (initial heap)
// Old Gen filling → tune GC: -XX:+UseG1GC (better for large heaps)
// Young Gen too small → -XX:NewRatio=2 (50% young gen)
// Soft/Weak references → use for caches: GC collects WeakReference when memory low

// jstat -gcutil &lt;pid&gt; 1000   ← monitor GC in real time
// jmap -histo:live &lt;pid&gt;     ← see live object histogram without full dump</code></pre></div>

<div class="qa"><div class="q"><span class="qn">V11</span>Stack vs Heap in JVM</div>
<table><tr><th></th><th>Stack</th><th>Heap</th></tr>
<tr><td>Stores</td><td>Method frames, local variables, primitives, object references</td><td>ALL objects (new), String Pool (Java 7+)</td></tr>
<tr><td>Scope</td><td>Per-thread — each thread has its own stack</td><td>Shared across ALL threads</td></tr>
<tr><td>Lifetime</td><td>Auto-freed when method returns</td><td>GC managed — freed when no references</td></tr>
<tr><td>Size</td><td>Small (default ~512KB-1MB per thread)</td><td>Large (configurable -Xmx)</td></tr>
<tr><td>Error</td><td>StackOverflowError (infinite recursion)</td><td>OutOfMemoryError (heap full)</td></tr>
<tr><td>Structure</td><td>LIFO — push frame on call, pop on return</td><td>Young Gen (Eden+S0+S1) + Old Gen + Metaspace</td></tr></table></div>

<div class="qa"><div class="q"><span class="qn">V12</span>Checked vs Unchecked Exceptions — key difference + examples</div>
<table><tr><th></th><th>Checked (Compile-time)</th><th>Unchecked (Runtime)</th></tr>
<tr><td>Must handle?</td><td>YES — try-catch or throws declaration required</td><td>NO — optional</td></tr>
<tr><td>When thrown</td><td>Predictable external failures (IO, network, DB)</td><td>Programming errors, logic bugs</td></tr>
<tr><td>Examples</td><td>IOException, FileNotFoundException, SQLException, ClassNotFoundException, InterruptedException</td><td>NullPointerException, ArrayIndexOutOfBoundsException, IllegalArgumentException, ClassCastException</td></tr>
<tr><td>Spring @Transactional</td><td>Does NOT rollback by default</td><td>Always rollbacks</td></tr></table></div>

<div class="qa"><div class="q"><span class="qn">V13</span>SQL: SELECT * FROM users WHERE age != NULL — what's wrong?</div>
<div class="def">This returns ZERO rows — always! NULL comparison with != (or =) NEVER evaluates to true. NULL means "unknown" — unknown != unknown is also unknown, not true. Must use IS NULL or IS NOT NULL.</div>
<pre><code>-- WRONG — always returns 0 rows:
SELECT * FROM users WHERE age != NULL;
SELECT * FROM users WHERE age = NULL;

-- CORRECT:
SELECT * FROM users WHERE age IS NOT NULL;  -- rows where age has a value
SELECT * FROM users WHERE age IS NULL;      -- rows where age is missing

-- Does "age != 10" return rows where age IS NULL?
SELECT * FROM users WHERE age != 10;
-- NO! NULL rows are excluded — NULL != 10 = UNKNOWN (not true)
-- To include NULLs: WHERE age != 10 OR age IS NULL</code></pre></div>

<div class="qa"><div class="q"><span class="qn">V14</span>Can we JOIN in DynamoDB? Partition Key vs Sort Key?</div>
<div class="def">NO JOINS in DynamoDB. It is a key-value NoSQL database — no relational operations. To "join," fetch separately and merge in application code, or denormalize (store related data together).</div>
<pre><code>// DynamoDB Primary Key:
// Option 1: Partition Key alone (simple PK)
//   userId → finds the item
// Option 2: Partition Key + Sort Key (composite PK)
//   userId (partition) + timestamp (sort) → finds exact item
//   Can query: all items for userId where timestamp BETWEEN 2024-01-01 AND 2024-12-31

// HOW IT WORKS:
// Partition Key: hash(partitionKey) → determines physical partition/node (distribution)
// Sort Key: within one partition, items sorted by sort key → enables range queries

// GSI (Global Secondary Index) = a separate internal copy of the table with different keys
// Allows querying by non-primary-key attributes
// Example: query orders by status (not the primary key userId)
// GSI is eventually consistent — there is a small replication lag</code></pre></div>

<div class="qa"><div class="q"><span class="qn">V15</span>Message Queue experience — Kafka vs SQS, Dead Letter Queue</div>
<pre><code>// KAFKA vs SQS:
// Kafka: persistent log, replay messages, consumer groups, high throughput, ordering per partition
//        used for event streaming, CDC, audit logs, real-time analytics
// SQS Standard: at-least-once, best-effort order, AWS managed, simpler setup
//   FIFO: exactly-once, strict order, 3000 msg/s
//        used for task queues, decoupling services, serverless triggers

// DEAD LETTER QUEUE (DLQ):
// When a message fails processing N times (maxReceiveCount), SQS moves it to DLQ
// DLQ captures failed messages so you can inspect, debug, and replay them
// MONITOR the DLQ — messages in DLQ = processing errors in your system!
// CloudWatch alarm: DLQ ApproximateNumberOfMessages &gt; 0 → alert on-call

// SQS vs SNS:
// SQS: queue — 1 message → 1 consumer
// SNS: pub-sub — 1 message → ALL subscribers simultaneously
// Pattern: SNS topic → multiple SQS queues (fan-out)
//   order-created SNS → SQS for email-service + SQS for inventory-service + SQS for analytics</code></pre></div>
</div>

<div class="qa"><div class="q"><span class="qn">V16</span>Spring Security — filter chains, classes used, features, annotations?</div>
<pre><code>// SPRING SECURITY FILTER CHAIN — ordered list of filters applied to every request:
// UsernamePasswordAuthenticationFilter (handles login form POST)
// OncePerRequestFilter (custom — your JwtAuthFilter extends this)
// ExceptionTranslationFilter (catches auth exceptions → 401/403)
// FilterSecurityInterceptor (enforces @PreAuthorize rules)

// KEY CLASSES:
// SecurityFilterChain: configured in @Configuration class — defines rules
// UserDetailsService: interface — loadUserByUsername() — load user from DB
// UserDetails: interface — represents the authenticated user (username, password, roles)
// UsernamePasswordAuthenticationToken: holds authenticated principal + authorities
// SecurityContextHolder: thread-local storage for the current auth state
// AuthenticationManager: delegates to AuthenticationProvider to verify credentials
// BCryptPasswordEncoder: hash passwords for storage (never store plain text!)

// FULL SecurityConfig:
@Configuration @EnableWebSecurity @EnableMethodSecurity
public class SecurityConfig {
    @Bean
    public SecurityFilterChain filterChain(HttpSecurity http) throws Exception {
        return http
            .csrf(csrf -> csrf.disable())                    // JWT is CSRF-immune
            .sessionManagement(s -> s.sessionCreationPolicy(STATELESS)) // no session
            .authorizeHttpRequests(auth -> auth
                .requestMatchers("/auth/**").permitAll()     // public endpoints
                .requestMatchers("/api/admin/**").hasRole("ADMIN")
                .anyRequest().authenticated()                // everything else: must auth
            )
            .addFilterBefore(jwtAuthFilter, UsernamePasswordAuthenticationFilter.class)
            .build();
    }
    @Bean
    public AuthenticationManager authManager(AuthenticationConfiguration config) throws Exception {
        return config.getAuthenticationManager();
    }
    @Bean
    public BCryptPasswordEncoder passwordEncoder() { return new BCryptPasswordEncoder(); }
}

// /auth/login endpoint flow:
// POST /auth/login {username, password}
// → AuthController → authManager.authenticate(new UsernamePasswordAuthenticationToken(u,p))
// → UserDetailsService.loadUserByUsername(u) → BCrypt.checkpw(p, storedHash)
// → If valid: jwtService.generateToken(userDetails) → return {"token": "eyJ..."}
// → Client stores token → sends as Authorization: Bearer eyJ... on future requests</code></pre></div>

<div class="qa"><div class="q"><span class="qn">V17</span>CORS, CSRF, Log injection, SQL injection — with code examples?</div>
<pre><code>// CORS — cross-origin AJAX blocked by browser (Postman not affected):
// Fix in Spring Boot:
@Bean CorsConfigurationSource corsConfigurationSource() {
    CorsConfiguration c = new CorsConfiguration();
    c.setAllowedOrigins(List.of("https://myapp.com"));
    c.setAllowedMethods(List.of("GET","POST","PUT","DELETE","OPTIONS"));
    c.setAllowedHeaders(List.of("*"));
    c.setAllowCredentials(true);
    UrlBasedCorsConfigurationSource s = new UrlBasedCorsConfigurationSource();
    s.registerCorsConfiguration("/**", c);
    return s;
}

// SQL INJECTION — NEVER concatenate user input into SQL:
// VULNERABLE:
String sql = "SELECT * FROM users WHERE name='" + userInput + "'";
// Attack: userInput = "'; DROP TABLE users; --"
// Executes: SELECT * FROM users WHERE name=''; DROP TABLE users; --

// SAFE — always use parameterized queries:
PreparedStatement ps = conn.prepareStatement("SELECT * FROM users WHERE name=?");
ps.setString(1, userInput);  // parameter, never concatenated

// Spring Data JPA — also safe (uses PreparedStatement internally):
@Query("SELECT u FROM User u WHERE u.name = :name")  // JPQL named param — SAFE
List&lt;User&gt; findByName(@Param("name") String name);
// NEVER: @Query("SELECT u FROM User u WHERE u.name = '" + name + "'")  // DANGEROUS!

// LOG INJECTION — attacker injects newlines to fake log entries:
// Input: "admin\nINFO: User admin granted ADMIN role"
// VULNERABLE: log.info("User logged in: " + username); → injects fake log line
// SAFE: log.info("User logged in: {}", username.replaceAll("[\r\n]", "_"));
// Or use structured logging (JSON) — newlines don't affect structure

// CSRF — protect state-changing endpoints:
// JWT apps: disable CSRF (JWT in header, not cookie — browsers can't auto-send)
// Session-based apps: keep CSRF enabled (default in Spring Security)
// Spring auto-generates CSRF token → must include in forms as hidden field or X-CSRF-Token header</code></pre></div>

<div class="qa"><div class="q"><span class="qn">V18</span>Encrypt data at rest — how to implement?</div>
<pre><code>// LEVELS OF ENCRYPTION AT REST:

// 1. DB level (RDS/Aurora):
//   Enable "Encryption at rest" when creating RDS instance (KMS key)
//   All data, backups, snapshots, logs are encrypted
//   Transparent to app — no code change needed

// 2. S3:
//   SSE-S3: AWS-managed key (simplest, free)
//   SSE-KMS: your KMS key → auditable access, key rotation, access policies
//   SSE-C: you provide key in request header (key never stored by AWS)
//   Default encryption: apply SSE-S3 or SSE-KMS to ALL objects in bucket by default

// 3. Column-level encryption (most granular):
//   Encrypt sensitive columns (SSN, credit card) before storing in DB
//   Only app can decrypt — even DBA sees ciphertext
@Service public class EncryptionService {
    @Value("${encryption.key-arn}") String keyArn;
    AWSKMS kmsClient = AWSKMSClientBuilder.defaultClient();

    public String encrypt(String plaintext) {
        EncryptRequest req = new EncryptRequest()
            .withKeyId(keyArn)
            .withPlaintext(ByteBuffer.wrap(plaintext.getBytes()));
        return Base64.encode(kmsClient.encrypt(req).getCiphertextBlob().array());
    }
    public String decrypt(String ciphertext) {
        DecryptRequest req = new DecryptRequest()
            .withCiphertextBlob(ByteBuffer.wrap(Base64.decode(ciphertext)));
        return new String(kmsClient.decrypt(req).getPlaintext().array());
    }
}

// 4. Secret Manager: never store DB passwords in code/config files
//   @Value("${spring.datasource.password}") — use Secret Manager instead
String password = secretsManager.getSecretValue(
    new GetSecretValueRequest().withSecretId("prod/myapp/db-password")
).getSecretString();</code></pre></div>

<div class="qa"><div class="q"><span class="qn">V19</span>Performance improvement — full strategy?</div>
<div class="flow">
<strong>1. Caching:</strong> Redis for hot data (user sessions, product catalog, computed results)<br>
Local cache (Caffeine) for static lookup data (country codes, config)<br><br>
<strong>2. DB performance:</strong><br>
Add missing indexes (check slow query log, EXPLAIN plan — look for Seq Scan)<br>
Fix N+1: use JOIN FETCH or @EntityGraph<br>
Connection pooling: tune HikariCP maxPoolSize<br>
Read replicas for read-heavy workloads<br><br>
<strong>3. JVM/Code:</strong><br>
Algorithm complexity (O(n²) → O(n log n) with better data structure)<br>
Object pooling for expensive objects (DB connections, HTTP clients)<br>
StringBuilder instead of String concatenation in loops<br>
Lazy loading (@Transactional with readOnly=true skips dirty checking)<br><br>
<strong>4. Concurrency:</strong><br>
Thread pool for parallel independent tasks<br>
CompletableFuture to run multiple service calls in parallel<br>
parallelStream() for CPU-intensive collection processing<br><br>
<strong>5. Infrastructure:</strong><br>
Horizontal scaling: Auto Scaling Group / ECS service scaling<br>
CDN: serve static assets from CloudFront edge<br>
Async: move non-critical work to message queue (email, notifications)<br>
Change GC: -XX:+UseG1GC for large heap, -XX:+UseZGC for low-latency
</div></div>
</div>

<div class="sec"><h3 style="background:#1e293b;color:#f1f5f9;padding:10px 14px;border-radius:7px;">🏛️ BNY Mellon Interview</h3>

<div class="qa"><div class="q"><span class="qn">BNY1</span>How do you use AI in daily development? Pros &amp; cons?</div>
<div class="g2">
<div class="box green"><h4>How I use AI</h4><ul><li>Generate boilerplate (DTOs, tests, CRUD)</li><li>Code review — catch issues I missed</li><li>Read &amp; explain legacy code quickly</li><li>Refactor suggestions (clean code)</li><li>Documentation generation</li><li>Design patterns research</li><li>Debug — paste stack trace, get explanation</li></ul></div>
<div class="box amber"><h4>Pros vs Cons</h4><ul><li>✅ Learn faster — best teacher on demand</li><li>✅ Faster release cycles</li><li>✅ Junior devs produce senior-quality code</li><li>❌ Over-complex generated code</li><li>❌ Hard to debug AI-generated logic</li><li>❌ Hard to do code review of AI code</li><li>❌ May introduce subtle bugs / hallucinate</li><li>❌ Makes devs dependent — degrades fundamentals</li></ul></div>
</div></div>

<div class="qa"><div class="q"><span class="qn">BNY2</span>Million requests — how to design for scale, availability &amp; geo-distribution?</div>
<div class="flow">
<strong>Scalability (handle million requests):</strong><br>
Horizontal scaling: Auto Scaling Group (EC2) or ECS → scale out on CPU/request count<br>
CDN (CloudFront): serve static content at edge — remove load from origin<br>
Caching layer: ElastiCache (Redis) → cache hot data, avoid DB hit for every request<br>
Message Queue: Kafka/SQS → absorb burst traffic, async processing, decouple services<br><br>
<strong>Availability + Fault Tolerance (multi-region):</strong><br>
Active-Active: Route53 latency routing → serve from closest region → instant failover<br>
Active-Passive: primary region + standby (failover via Route53 health check)<br>
Warm Standby: reduced capacity in secondary → scale up on failover<br>
Pilot Light: only DB replicated → spin up compute on disaster<br><br>
<strong>Multi-region infra:</strong><br>
RDS cross-region read replica / Aurora Global Database (sync &lt;1s)<br>
S3 Cross-Region Replication (CRR)<br>
DynamoDB Global Tables (multi-region active-active)<br>
DB replication: async (eventually consistent) preferred — sync adds latency to writes
</div></div>

<div class="qa"><div class="q"><span class="qn">BNY3</span>Confidential data — how to secure it? Prevent DBA from seeing SSN?</div>
<pre><code>// NEVER store plain SSN:
// Option 1: Hash SSN (one-way, for matching/verification only):
String hashed = BCrypt.hashpw(ssn, BCrypt.gensalt(12));  // bcrypt is slow — designed for this
// Store hashed SSN, verify with BCrypt.checkpw(inputSsn, hashed)

// Option 2: Store only last 4 digits:
String lastFour = ssn.substring(ssn.length() - 4); // "xxx-xx-6789" → store "6789"

// Option 3: Encrypt at rest (reversible — needed if you must recover full SSN):
// AWS KMS: key management, audited, access-controlled
// Developers/DBAs: can see ciphertext in DB, cannot decrypt without KMS key access
// Separate KMS key access from DBA access → DBA sees encrypted gibberish

// PREVENTING DBA ACCESS:
// Column-level encryption: encrypt SSN before storing, only app can decrypt via KMS
// AWS CloudTrail: records every decryption request (who accessed SSN when)
// VPC Endpoint + KMS policy: only specific Lambda/EC2 IAM roles can use the key
// Data masking in RDS: AWS Macie detects PII in S3 / CloudTrail alerts

// HASH ALGORITHMS:
// SHA-256: fast, not for passwords (use bcrypt/argon2 for passwords — slow by design)
// bcrypt: includes salt, slow, best for passwords
// MD5: broken (collision attacks), NEVER use for security
// HMAC-SHA256: for message authentication (JWT signature)</code></pre></div>

<div class="qa"><div class="q"><span class="qn">BNY4</span>SLI, SLO, SLA — explain the difference</div>
<table><tr><th>Term</th><th>What it is</th><th>Example</th></tr>
<tr><td>SLI (Service Level Indicator)</td><td>A metric you measure — the raw number</td><td>% of requests completing in &lt;200ms over last 30 days</td></tr>
<tr><td>SLO (Service Level Objective)</td><td>Your internal target for the SLI</td><td>99.9% of requests must complete in &lt;200ms</td></tr>
<tr><td>SLA (Service Level Agreement)</td><td>Contractual commitment to customers — breach = penalty</td><td>99.5% uptime guaranteed; breach → service credits</td></tr></table>
<div class="tip">SLO is stricter than SLA — you give yourself buffer. If SLO = 99.9% and you breach it, you have time to fix before SLA breach. Error Budget = 1 - SLO = 0.1% of requests can fail — use this budget to balance reliability vs feature velocity.</div></div>

<div class="qa"><div class="q"><span class="qn">BNY5</span>CI/CD pipeline — what do you consider? Full pipeline design</div>
<div class="flow">
<strong>1. Code → PR raised:</strong> Code review required (min 2 approvers) + branch protection rules<br><br>
<strong>2. Build stage:</strong> mvn compile / gradle build → fail fast on compile errors<br><br>
<strong>3. Test stage:</strong> Unit tests (JUnit + Mockito) + Integration tests (Testcontainers) → must pass<br>
Code coverage check (JaCoCo): fail if coverage &lt; 80%<br><br>
<strong>4. Security/quality stage:</strong> SonarQube — static analysis, security vulnerabilities, code smells<br>
Dependency vulnerability scan (OWASP Dependency-Check, Snyk) → reject known CVEs<br><br>
<strong>5. Package stage:</strong> Build Docker image → push to Amazon ECR<br>
Image scan (ECR image scanning / Trivy) → check for OS/lib vulnerabilities<br><br>
<strong>6. Deploy to Dev/Staging:</strong> ECS rolling update or blue-green deploy → run smoke tests<br><br>
<strong>7. Deploy to Prod:</strong> Manual approval gate → blue-green deploy → health check<br>
Rollback plan: keep previous task definition → revert ECS service to old image in minutes<br><br>
<strong>Key considerations:</strong> rollback strategy, secrets never in code (use SecretManager/Vault),<br>
immutable infra (never SSH to prod), infrastructure as code (Terraform), canary releases
</div></div>
</div>

<div class="sec"><h3 style="background:#1e293b;color:#f1f5f9;padding:10px 14px;border-radius:7px;">🛒 Walmart — 1st Round</h3>

<div class="qa"><div class="q"><span class="qn">WM1-1</span>REST vs Message Queue — sync vs async communication?</div>
<table><tr><th></th><th>REST (HTTP)</th><th>Message Queue (Kafka/SQS)</th></tr>
<tr><td>Communication</td><td>Synchronous — caller waits for response</td><td>Asynchronous — fire and forget</td></tr>
<tr><td>Coupling</td><td>Tight — consumer must be UP when producer calls</td><td>Loose — consumer can be down, message waits</td></tr>
<tr><td>Use case</td><td>Real-time queries, CRUD, user-facing APIs</td><td>Long processing, notifications, event streaming</td></tr>
<tr><td>Error handling</td><td>Immediate response — retry logic in caller</td><td>DLQ for failed messages, retry automatically</td></tr>
<tr><td>Throughput</td><td>Limited by consumer's capacity</td><td>Queue absorbs bursts — consumer processes at own pace</td></tr></table>
<div class="tip">Use REST when: you need an immediate answer (user login, get order status). Use MQ when: the work can happen later (send email, process payment, resize image).</div></div>

<div class="qa"><div class="q"><span class="qn">WM1-2</span>try/catch/finally — what does finally do?</div>
<pre><code>// finally ALWAYS runs — even if exception thrown, even if return in try/catch
// Use for: release resources, close connections, unlock locks

try {
    Connection conn = getConnection();
    PreparedStatement ps = conn.prepareStatement(sql);
    return ps.executeQuery(); // even with this return...
} catch (SQLException e) {
    log.error("DB error", e);
    throw new RuntimeException(e);
} finally {
    conn.close(); // ...finally STILL runs! Always close resources here.
}

// Modern approach — try-with-resources (auto-close, cleaner):
try (Connection conn = ds.getConnection();
     PreparedStatement ps = conn.prepareStatement(sql)) {
    return ps.executeQuery();
} // conn and ps auto-closed here — even on exception

// GOTCHA: if finally has a return statement, it OVERRIDES try/catch return:
try { return "try"; } finally { return "finally"; } // returns "finally" — avoid this!</code></pre></div>

<div class="qa"><div class="q"><span class="qn">WM1-3</span>What is Elasticsearch? Inverted Index? Prometheus + Actuator?</div>
<pre><code>// ELASTICSEARCH: distributed search engine. Uses inverted index for full-text search.

// INVERTED INDEX (like a book's index):
// Forward index: document → list of words
// Inverted index: word → list of documents containing it
//
// Documents:
//   Doc1: "The quick brown fox"

<div class="qa"><div class="q"><span class="qn">WM1-4 CODING</span>Check if two strings are Anagrams + Group Anagrams</div>
<pre><code>// ANAGRAM CHECK — O(n) time, O(1) space (256 ASCII chars):
public boolean isAnagram(String a, String b) {
    if (a == null || b == null) throw new IllegalArgumentException("Input cannot be null");
    if (a.length() != b.length()) return false;

    int[] freq = new int[256]; // frequency array for all ASCII chars
    for (int i = 0; i &lt; a.length(); i++) {
        freq[a.charAt(i)]++;   // increment for chars in a
        freq[b.charAt(i)]--;   // decrement for chars in b
    }
    for (int count : freq) {
        if (count != 0) return false; // mismatch → not anagram
    }
    return true;
}
// isAnagram("abc", "cba") → true
// isAnagram("aaa", "aba") → false
// isAnagram("A", "a")     → false (case-sensitive; toLowerCase() if needed)

// GROUP ANAGRAMS — O(n * k log k) where k = avg word length:
public List&lt;List&lt;String&gt;&gt; groupAnagrams(String[] words) {
    Map&lt;String, List&lt;String&gt;&gt; map = new HashMap&lt;&gt;();

    for (String word : words) {
        char[] chars = word.toCharArray();
        Arrays.sort(chars);                    // "tea" → "aet", "eat" → "aet" → same key!
        String key = String.valueOf(chars);
        map.computeIfAbsent(key, k -&gt; new ArrayList&lt;&gt;()).add(word);
    }
    return new ArrayList&lt;&gt;(map.values());
}
// Input:  ["tea", "eat", "aaa", "ab", "ba"]
// Output: [["tea","eat"], ["aaa"], ["ab","ba"]]

// ALTERNATIVE KEY: frequency array as string key — O(n*k) time, avoids sorting:
char[] freq = new char[26];
for (char c : word.toCharArray()) freq[c - 'a']++;
String key = String.valueOf(freq); // unique for each anagram group</code></pre></div>

<div class="sec"><h3 style="background:#1e293b;color:#f1f5f9;padding:10px 14px;border-radius:7px;">🛒 Walmart — 2nd Round</h3>

<div class="qa"><div class="q"><span class="qn">WM2-1</span>1000 TPS — how to make system fast? Design the cache layer?</div>
<div class="flow">
<strong>Multi-layer caching strategy:</strong><br>
L1 — Local cache per service instance (Caffeine/Guava): ultra-fast, no network, limited size<br>
→ Good for: static reference data (country codes, configs, rarely-changing lookups)<br><br>
L2 — Distributed cache (Redis/ElastiCache): shared across all instances, medium latency (~1ms)<br>
→ Good for: user sessions, hot product data, computed aggregates<br><br>
L3 — DB Read Replicas: distributed read load, ~10ms<br>
→ For: complex queries that miss cache<br><br>
<strong>Cache Aside pattern (most common):</strong><br>
Read: check cache → if miss: query DB, write to cache, return<br>
Write: update DB → INVALIDATE (delete) cache key → next read fetches fresh<br><br>
<strong>TTL strategy:</strong><br>
Short TTL (30s-5min): frequently changing data (inventory count, prices)<br>
Long TTL (1hr-24hr): stable reference data (user profile, product description)<br>
No TTL + event-driven invalidation: highest consistency (use CDC to invalidate on DB change)
</div>
<pre><code>// Spring Boot + Redis Cache:
@Service public class ProductService {
    @Cacheable(value = "products", key = "#id")  // read-through cache
    public Product getProduct(Long id) { return repo.findById(id).orElseThrow(); }

    @CacheEvict(value = "products", key = "#product.id")  // invalidate on update
    public Product updateProduct(Product product) { return repo.save(product); }
}
// application.properties:
// spring.cache.type=redis
// spring.data.redis.host=my-redis-cluster.cache.amazonaws.com</code></pre></div>

<div class="qa"><div class="q"><span class="qn">WM2-2</span>Cache-DB consistency — Facebook/Instagram timeline problem?</div>
<div class="def">Famous users (celebrities) create a fan-out write problem: 1 post → push to 50M followers' feeds = 50M cache writes. Two strategies: Push (write to each follower's feed cache at post time — fast read, slow write for famous users) vs Pull (read from DB + follow list at view time — slow read, instant write). Hybrid: push for regular users, pull for celebrities.</div>
<pre><code>// Consistency between cache and DB — 3 approaches:

// 1. Write-Invalidate (Cache Aside):
//    Update DB → delete cache key → next read repopulates from DB
//    Pro: simple, always fresh after miss. Con: cache miss storm if many readers hit DB simultaneously
//    FIX for miss storm: use mutex/lock on cache key during DB fetch + populate

// 2. Write-Through:
//    Write to cache AND DB in same operation → always in sync
//    Pro: reads always hit cache. Con: latency for writes (wait for both)

// 3. Event-driven invalidation (best for complex systems):
//    DB updated → Debezium CDC → Kafka event → consumer invalidates/updates cache
//    Eventually consistent but highly scalable — decoupled

// Which to choose?
// Strong consistency needed (financial) → Write-Through or Write-Invalidate
// High availability + eventual consistency OK → Event-driven invalidation</code></pre></div>

<div class="qa"><div class="q"><span class="qn">WM2-3</span>REST API design — POST vs PUT, re-submit problem, merge POST+PUT?</div>
<pre><code>// POST vs PUT:
// POST — CREATE new resource, NOT idempotent (call twice = two resources created)
//   POST /users → creates new user, returns 201 + Location header
// PUT — REPLACE entire resource, IDEMPOTENT (call twice = same result)
//   PUT /users/123 → replace user 123 completely, returns 200 or 204
// PATCH — PARTIAL update, NOT idempotent (technically)
//   PATCH /users/123 → update only supplied fields

// RE-SUBMIT PROBLEM (accidental duplicate):
// Frontend accidentally re-submits 20 users → detect and prevent duplicates
// Solution 1: Idempotency Key
//   Frontend generates UUID per submit → sends in header: X-Idempotency-Key: uuid-abc
//   Backend checks Redis: key exists? → return cached response (don't process again)
//   Redis key TTL: 24 hours
// Solution 2: Unique constraint in DB (e.g. email unique) → duplicate = 409 Conflict
// Solution 3: Frontend disables submit button after click (UX fix)

// Can we merge POST and PUT?
// Technically yes (upsert pattern), but bad design:
//   POST /users → create if not exists, update if exists (using unique key like email)
//   Breaks REST semantics — consumers can't rely on status codes (201 vs 200)
//   Makes API harder to reason about
// Better: keep separate — POST for create, PUT for update</code></pre></div>

<div class="qa"><div class="q"><span class="qn">WM2-4</span>Slow API response — debugging flow?</div>
<div class="flow">
<strong>Step 1 — Isolate the layer:</strong><br>
Check API Gateway/ALB latency vs service latency → is slowness in network or app?<br>
Check CloudWatch: p99 latency for the specific endpoint<br><br>
<strong>Step 2 — Check app-level:</strong><br>
JVM GC pauses? → check CloudWatch JVM metrics or jstat -gcutil<br>
Thread pool exhausted? → check Hikari connection pool wait time metric<br>
CPU bound? → check EC2/ECS CPU utilization<br><br>
<strong>Step 3 — Check DB (most common culprit):</strong><br>
Enable slow query log: queries &gt; 1s<br>
EXPLAIN / EXPLAIN ANALYZE on the slow query → look for Seq Scan (missing index!)<br>
Check for full table scans, missing joins, N+1 queries<br>
Check connection pool: maxPoolSize too small → requests queuing<br><br>
<strong>Step 4 — Fix:</strong><br>
Add index on filtered/sorted column → Seq Scan → Index Scan (100x faster)<br>
Add JOIN FETCH to fix N+1 → 101 queries → 1 query<br>
Add Redis cache for hot data → bypass DB entirely<br>
Increase connection pool size → reduce waiting<br>
Add read replica → offload reads from primary
</div></div>

<div class="qa"><div class="q"><span class="qn">WM2-5</span>Payment system design — MQ + aggregator, circuit breaker with slow ramp-up?</div>
<pre><code>// AGGREGATOR PATTERN — batch payments to avoid over-triggering banking API:
// Don't call bank API for every payment immediately
// Instead:
// 1. Payment request → publish to Kafka "payment-requests" topic
// 2. Aggregator service consumes in micro-batches (e.g. every 5s or every 100 messages)
// 3. Aggregator groups by currency/bank → makes single batch API call per group
// 4. Bank API called once per batch → far fewer API calls

@Scheduled(fixedDelay = 5000)  // every 5 seconds
public void processBatch() {
    List&lt;Payment&gt; batch = kafkaConsumer.poll(100); // poll up to 100 messages
    Map&lt;String, List&lt;Payment&gt;&gt; byBank = batch.stream()
        .collect(Collectors.groupingBy(Payment::getBankCode));
    byBank.forEach((bank, payments) -&gt; bankApiClient.processBatch(bank, payments));
}

// CIRCUIT BREAKER — slow ramp-up for HALF-OPEN:
// Problem: after 10min open, first 1-2 requests fail → circuit re-opens immediately
// Why: service may be partially recovered — needs gradual traffic ramp

// Solution: configure HALF-OPEN with slow ramp-up:
resilience4j.circuitbreaker.instances.bankApi:
  permittedNumberOfCallsInHalfOpenState: 5   # test with 5 calls, not 1
  slowCallRateThreshold: 50                   # consider slow calls as failures too
  slowCallDurationThreshold: 3s
  waitDurationInOpenState: 60s
  maxWaitDurationInHalfOpenState: 30s         # stay in half-open up to 30s to gather data
// With 5 test calls, 1-2 failures = 40% failure rate → below 50% threshold → stays CLOSED
// Before: 1 call fails = 100% failure → re-opens immediately</code></pre></div>

<div class="qa"><div class="q"><span class="qn">WM2-6</span>Pagination in Spring Boot REST API?</div>
<pre><code>// Spring Data Pageable:
@GetMapping("/users")
public Page&lt;User&gt; getUsers(
    @RequestParam(defaultValue = "0") int page,
    @RequestParam(defaultValue = "20") int size,
    @RequestParam(defaultValue = "createdAt,desc") String sort) {

    Pageable pageable = PageRequest.of(page, size, Sort.by(dir, sortParams[0]));

}
// GET /users?page=0&amp;size=20&amp;sort=salary,desc
// Response includes: content[], totalElements, totalPages, pageNumber, pageSize

// Cursor-based pagination (better for large/live data — avoids offset drift):
// Use last-seen ID or timestamp as cursor:
// GET /users?after=user-id-123&amp;limit=20
@Query("SELECT u FROM User u WHERE u.id &gt; :cursor ORDER BY u.id ASC LIMIT :limit")
List&lt;User&gt; findAfterCursor(@Param("cursor") Long cursor, @Param("limit") int limit);
// Advantages: consistent results even if data changes, no OFFSET performance issue</code></pre></div>

<div class="qa"><div class="q"><span class="qn">WM2-7</span>Fetch data from TWO databases in one API response?</div>
<pre><code>// Scenario: User service (MySQL) + Order service (MongoDB) → return combined UserOrderDTO

// Option 1: Sequential fetch (simple, slower):
@GetMapping("/users/{id}/orders")
public UserOrderDTO getUserWithOrders(@PathVariable Long id) {
    User user = userRepo.findById(id).orElseThrow();           // MySQL fetch
    List&lt;Order&gt; orders = orderRepo.findByUserId(id);           // MongoDB fetch
    return new UserOrderDTO(user, orders);                     // merge in app layer
}

// Option 2: Parallel fetch with CompletableFuture (faster — both DB calls run simultaneously):
@GetMapping("/users/{id}/orders")
public UserOrderDTO getUserWithOrders(@PathVariable Long id) {
    CompletableFuture&lt;User&gt; userFuture =
        CompletableFuture.supplyAsync(() -&gt; userRepo.findById(id).orElseThrow(), executor);
    CompletableFuture&lt;List&lt;Order&gt;&gt; orderFuture =
        CompletableFuture.supplyAsync(() -&gt; orderRepo.findByUserId(id), executor);

    return userFuture.thenCombine(orderFuture, UserOrderDTO::new).join();
    // Both DB calls happen in parallel → response time = max(userDB, orderDB), not sum
}

// Option 3: Circuit breaker on each DB call:
// If orderDB is down → return user info with empty orders (graceful degradation)
@CircuitBreaker(name="orderDb", fallbackMethod="emptyOrders")
List&lt;Order&gt; fetchOrders(Long userId) { return orderRepo.findByUserId(userId); }
List&lt;Order&gt; emptyOrders(Long userId, Exception ex) { return Collections.emptyList(); }</code></pre></div>

<div class="sec"><h3 style="background:#1e293b;color:#f1f5f9;padding:10px 14px;border-radius:7px;">💻 Coding — Reverse Words in String</h3>
<div class="qa"><div class="q"><span class="qn">CODE1</span>Reverse words without using split() — full walkthrough</div>
<pre><code>// Problem: "hello world" → "world hello"
// Edge cases: null, empty, multiple spaces → clarify with interviewer!
// Key insight: TWO reverses = word order swap:
//   Step 1: Reverse ENTIRE string: "hello world" → "dlrow olleh"
//   Step 2: Reverse EACH word:     "dlrow olleh" → "world hello"

public String reverseWords(String s) {
    if (s == null || s.length() == 0) return s;

    char[] chars = s.toCharArray();
    int n = chars.length;

    // Step 1: Reverse entire array
    reverse(chars, 0, n - 1);           // "hello world" → "dlrow olleh"

    // Step 2: Reverse each individual word
    int start = 0;
    for (int end = 0; end &lt;= n; end++) {
        // Word boundary: space found OR reached end of string
        if (end == n || chars[end] == ' ') {
            reverse(chars, start, end - 1); // reverse word from start to end-1
            start = end + 1;                // next word starts after the space
        }
    }
    return String.valueOf(chars);
}

private void reverse(char[] chars, int left, int right) {
    while (left &lt; right) {
        char temp = chars[left];
        chars[left++] = chars[right];
        chars[right--] = temp;
    }
}

// TRACE for "ab c":
// chars = ['a','b',' ','c']  n=4
// Step 1: reverse(0,3) → ['c',' ','b','a']
// Step 2:
//   end=0: chars[0]='c' ≠ space
//   end=1: chars[1]=' ' → reverse(0,0) ['c',' ','b','a'] → unchanged, start=2
//   end=2: chars[2]='b' ≠ space
//   end=3: chars[3]='a' ≠ space
//   end=4: reached n → reverse(2,3) ['c',' ','a','b']
// Result: "c ab" ✅

// TIME: O(n)  SPACE: O(n) for char array (O(1) if in-place allowed)</code></pre></div>

<div class="sec"><h3>Quick Reference — Common Interview Answers</h3>
<div class="qa"><div class="q"><span class="qn">REF</span>Interface vs Abstract Class — one-line interview answer</div>
<div class="def">Use Interface when unrelated classes need to share a contract (Flyable, Serializable). Use Abstract Class when related classes share code and state (Vehicle with fuel field). Java forces single inheritance but allows multiple interface implementation — interfaces = contracts, abstract classes = partial implementations.</div></div>
<div class="qa"><div class="q"><span class="qn">REF</span>Stream API vs for-loop — performance answer</div>
<div class="def">Single-threaded stream is slightly SLOWER than for-loop due to lambda overhead and boxing. But: streams are lazy (short-circuit on findFirst), readable (declarative), and parallel-ready. Use for-loop for: simple iterations, index access, tight performance loops. Use stream for: transformations, filtering, grouping, parallel processing of large datasets.</div></div>
<div class="qa"><div class="q"><span class="qn">REF</span>How do you write a new REST API — describe your process</div>
<div class="flow">
1. Clarify: what resource? what HTTP method? request/response shape? auth needed?<br>
2. DTO: define request body (with @NotNull/@Valid) and response DTO<br>
3. Controller: @RestController, @RequestMapping, choose GET/POST/PUT/DELETE, @PathVariable/@RequestBody<br>
4. Service: business logic, call repository, @Transactional if modifying data<br>
5. Repository: JpaRepository method or @Query<br>
6. Exception handling: @ControllerAdvice for 404/400/500<br>
7. Security: @PreAuthorize for role check<br>
8. Test: unit test service with Mockito, integration test with @SpringBootTest + TestRestTemplate<br>
9. Document: Swagger/OpenAPI @Operation annotation
</div></div>
</div></div>`},
