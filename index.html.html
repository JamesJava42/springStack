oop:{label:"Day 1 — OOP Fundamentals",content:()=>`<div class="content"><h2>OOP Fundamentals</h2><p class="tagline">Day 1 · Class · Object · 4 Pillars · Polymorphism · Abstract vs Interface · SOLID · Exceptions · Keywords</p>
<div class="sec"><h3>Class, Object &amp; the 4 OOP Pillars</h3>
<div class="qa"><div class="q"><span class="qn">Q</span>What is a class and an object?</div><div class="def">Class = blueprint/template (no memory). Object = real instance created in Heap via new keyword. Each object gets its own copy of instance fields. static fields are shared across all instances.</div>
<pre><code>class Car {
    String brand; int speed;          // instance STATE (each object has own copy)
    static int count = 0;             // static STATE (shared by ALL Car objects)
    void accelerate() { speed+=10; }  // BEHAVIOR
}
Car c1 = new Car(); c1.brand="BMW";   // c1 on Heap
Car c2 = new Car(); c2.brand="Toyota"; // c2 separate object on Heap</code></pre></div>
<div class="qa"><div class="q"><span class="qn">Q</span>The 4 OOP Pillars — interview depth</div>
<div class="g2">
<div class="box blue"><h4>Encapsulation</h4><ul><li>Hide internal state: private fields + public getters/setters</li><li>Control access — setter can validate before setting</li><li>Change internal impl without breaking external API</li><li>Example: private int age; setAge() validates age &gt; 0</li></ul></div>
<div class="box green"><h4>Abstraction</h4><ul><li>Hide HOW, expose WHAT</li><li>Abstract class / Interface defines contract</li><li>User calls List.add() without knowing ArrayList internals</li><li>Reduces complexity — work with concepts not implementations</li></ul></div>
</div>
<div class="g2">
<div class="box amber"><h4>Inheritance</h4><ul><li>IS-A relationship: Dog IS-A Animal</li><li>Child reuses parent code via extends</li><li>super() calls parent constructor</li><li>Java: single inheritance only (one class, many interfaces)</li><li>@Override marks intentional method overriding</li></ul></div>
<div class="box purple"><h4>Polymorphism</h4><ul><li>Same interface, different behavior</li><li>Overloading = compile-time (same name, different params)</li><li>Overriding = runtime (child replaces parent method)</li><li>Animal a = new Dog(); a.speak() → calls Dog's speak()</li><li>Enables pluggable, extensible design</li></ul></div>
</div></div></div>

<div class="sec"><h3>Polymorphism — Interview Deep Dive</h3>
<div class="qa"><div class="q"><span class="qn">Q</span>Overloading vs Overriding — all the rules</div>
<table><tr><th></th><th>Overloading</th><th>Overriding</th></tr>
<tr><td>Where</td><td>Same class (or subclass)</td><td>Subclass replacing parent method</td></tr>
<tr><td>Signature</td><td>Different parameter list (count/type/order)</td><td>Identical signature</td></tr>
<tr><td>Return type</td><td>Can be anything (not enough alone to distinguish)</td><td>Same type or covariant (subtype)</td></tr>
<tr><td>Resolved at</td><td>COMPILE TIME (static dispatch)</td><td>RUNTIME (dynamic dispatch)</td></tr>
<tr><td>Access modifier</td><td>Any</td><td>Cannot reduce visibility (public → protected = illegal)</td></tr>
<tr><td>Cannot override</td><td>N/A</td><td>final, static, private methods</td></tr></table>
<pre><code>// Dynamic dispatch example — WHY this matters in interviews:
Animal a = new Dog();  // reference type = Animal, object type = Dog
a.sound();             // RUNTIME: JVM looks at actual object type (Dog) → calls Dog.sound()
// This is the foundation of OOP — open/closed principle, strategy pattern, etc.

// Covariant return type (Java 5+):
class Animal  { Animal clone() { return new Animal(); } }
class Dog extends Animal { @Override Dog clone() { return new Dog(); } } // Dog IS-A Animal — OK</code></pre></div></div>

<div class="sec"><h3>Abstract Class vs Interface</h3>
<div class="qa"><div class="q"><span class="qn">Q</span>When to use Abstract Class vs Interface?</div>
<table><tr><th>Aspect</th><th>Abstract Class</th><th>Interface</th></tr>
<tr><td>Methods</td><td>Abstract + concrete (shared impl)</td><td>Abstract + default/static (Java 8+)</td></tr>
<tr><td>Fields</td><td>Instance fields (any modifier)</td><td>Only public static final constants</td></tr>
<tr><td>Constructor</td><td>Yes — called via super()</td><td>No constructor</td></tr>
<tr><td>Inheritance</td><td>Single (extends ONE class)</td><td>Multiple (implements MANY interfaces)</td></tr>
<tr><td>Use when</td><td>IS-A + share code between related classes</td><td>CAN-DO contract — unrelated classes share behavior</td></tr>
<tr><td>Example</td><td>Vehicle (has wheels, speed — shared state)</td><td>Flyable, Serializable (unrelated classes can fly/serialize)</td></tr></table>
<pre><code>// Java 8+ interface default methods — avoid breaking changes in APIs:
interface Drawable {
    void draw();                           // abstract — must implement
    default void drawWithBorder() {        // default — optional to override
        System.out.println("=border=");
        draw();
    }
    static Drawable noOp() { return () -> {}; } // static factory method
}

// Diamond problem in interfaces → resolved by explicit override:
interface A { default void hello() { print("A"); } }
interface B { default void hello() { print("B"); } }
class C implements A, B {
    @Override public void hello() { A.super.hello(); } // must explicitly resolve</code></pre></div></div>

<div class="sec"><h3>SOLID Principles — Core Interview Topic</h3>
<div class="qa"><div class="q"><span class="qn">Q</span>SOLID — explain each with a practical example</div>
<div class="g2">
<div class="box blue"><h4>S — Single Responsibility</h4><ul><li>A class should have ONE reason to change</li><li>BAD: UserService handles login + email + PDF generation</li><li>GOOD: UserService (login) + EmailService (email) + ReportService (PDF)</li><li>Easier to test, change, and understand</li></ul></div>
<div class="box green"><h4>O — Open/Closed</h4><ul><li>Open for extension, Closed for modification</li><li>Add new behavior by adding new code, not editing existing</li><li>BAD: if/else chain for each discount type</li><li>GOOD: DiscountStrategy interface + new class per discount type</li></ul></div>
</div>
<div class="g2">
<div class="box amber"><h4>L — Liskov Substitution</h4><ul><li>Subclass must be usable wherever parent is expected</li><li>BAD: Square extends Rectangle — setWidth breaks Square's constraint</li><li>GOOD: Shape interface implemented by Rectangle and Square separately</li><li>Subclass CANNOT strengthen preconditions or weaken postconditions</li></ul></div>
<div class="box purple"><h4>I — Interface Segregation</h4><ul><li>Clients should not be forced to depend on methods they don't use</li><li>BAD: fat interface Worker with work() + eat() + sleep()</li><li>GOOD: Workable + Eatable + Sleepable — classes implement only what they need</li></ul></div>
</div>
<div class="box gray"><h4>D — Dependency Inversion</h4><ul><li>High-level modules should not depend on low-level modules. Both depend on abstractions.</li><li>BAD: OrderService directly creates new MySQLDatabase()</li><li>GOOD: OrderService depends on Database interface → inject MySQLDatabase or MockDatabase</li><li>This is exactly what Spring DI does — inject interface, not concrete class</li></ul></div></div></div>

<div class="sec"><h3>Keywords, Memory &amp; Exceptions</h3>
<div class="qa"><div class="q"><span class="qn">Q</span>final, static, this, super — key behaviors</div>
<pre><code>final int x = 10;           // constant variable — cannot reassign
final class String {}       // cannot extend String (security)
final void method() {}      // cannot override this method in subclass

static int count = 0;       // class-level — shared across ALL instances
static void helper() {}     // call as ClassName.helper() — no object needed
                            // static method CANNOT access instance fields (no 'this')

this.name = name;           // refers to current object's field (disambiguate from param)
this();                     // call another constructor in same class (constructor chaining)

super.method();             // call parent class method
super();                    // call parent constructor (must be first line in child constructor)</code></pre></div>
<div class="qa"><div class="q"><span class="qn">Q</span>String immutability, equals vs ==, String Pool</div>
<pre><code>String s1 = "hello";         // String Pool (Heap) — reuses existing "hello"
String s2 = "hello";         // s1 == s2 is TRUE (same pool object)
String s3 = new String("hello"); // Heap (outside pool) — s1 == s3 is FALSE

s1.equals(s3)               // TRUE — compares content (always use equals() for strings!)

// Why String is immutable:
// 1. String Pool: multiple refs to same object — mutation would corrupt others
// 2. Thread safety: immutable objects are inherently thread-safe
// 3. Security: class names, passwords — cannot be altered mid-process
// 4. HashCode caching: hashCode computed once at creation — reliable HashMap key

// StringBuilder in loops — avoid O(n²) garbage:
// BAD:  String result = ""; for(...) result += item;  // creates new String each iteration
// GOOD: StringBuilder sb = new StringBuilder(); for(...) sb.append(item);</code></pre></div>
<div class="qa"><div class="q"><span class="qn">Q</span>Exception hierarchy — Checked vs Unchecked, throw vs throws vs finally</div>
<pre><code>// Hierarchy:
Throwable
├── Error        → JVM problems (OutOfMemoryError, StackOverflowError) — DON'T catch
└── Exception
    ├── Checked  → Must handle or declare: IOException, SQLException, ClassNotFoundException
    └── RuntimeException (Unchecked) → Optional to handle: NullPointer, ArrayIndexOutOfBounds, ClassCast

throw new IllegalArgumentException("id must be positive");  // ACTION: throw NOW
void read() throws IOException { ... }                       // DECLARATION: caller must handle
try { ... } finally { connection.close(); }                  // ALWAYS runs (even if exception)

// try-with-resources (Java 7+) — auto-close Closeable resources:
try (Connection conn = ds.getConnection(); PreparedStatement ps = conn.prepareStatement(sql)) {
    // conn and ps auto-closed on exit — even if exception thrown
}</code></pre></div></div></div>`},

collections:{label:"Day 2 — Collections",content:()=>`<div class="content"><h2>Collections Framework &amp; Generics</h2><p class="tagline">Day 2 · Generics · List · Set · Queue · Map · HashMap internals · Concurrent Collections · Comparable vs Comparator</p>
<div class="sec"><h3>Collections Hierarchy</h3>
<pre><code>Collection
├── List    — ordered, indexed, duplicates OK
│   ├── ArrayList    — O(1) get by index, O(n) insert middle, backed by resizable array
│   └── LinkedList   — O(1) add/remove at ends, O(n) get by index, doubly-linked list
├── Set     — NO duplicates
│   ├── HashSet      — O(1) add/contains, no order (uses HashMap internally)
│   ├── LinkedHashSet— O(1) add/contains, insertion order maintained
│   └── TreeSet      — O(log n) add/contains, sorted natural order (uses Red-Black Tree)
└── Queue   — FIFO / priority
    ├── PriorityQueue— min-heap by default, O(log n) offer/poll, O(1) peek
    └── ArrayDeque   — O(1) add/remove both ends, use as stack OR queue (faster than Stack class)
Map
├── HashMap      — O(1) avg get/put, no order, allows null key
├── LinkedHashMap— O(1) avg, insertion order OR access order (use for LRU cache!)
└── TreeMap      — O(log n), sorted by key, good for range queries (subMap, headMap)</code></pre></div>

<div class="sec"><h3>HashMap Internals — Deep Dive</h3>
<div class="qa"><div class="q"><span class="qn">Q</span>How does HashMap work internally (Java 8)?</div>
<div class="def">Array of buckets (Node[]). hash(key) determines bucket index. Each bucket is a linked list (collision chain). Java 8: if chain length &gt; 8 AND array size &gt;= 64 → convert to Red-Black Tree (O(n) → O(log n)). Resizes when entries &gt; capacity * loadFactor (default 0.75).</div>
<pre><code>// Step-by-step put(key, value):
// 1. hash(key) — spreads bits to reduce collisions
// 2. bucketIndex = hash &amp; (capacity - 1)   ← faster than % for power-of-2 capacity
// 3. If bucket empty → insert new Node
// 4. If bucket non-empty → walk chain: if key.equals(existingKey) → update; else append
// 5. Chain length &gt; 8 → treeify bucket (Red-Black Tree)
// 6. size &gt; capacity * 0.75 → resize: double capacity, rehash all entries (expensive!)

// CRITICAL: Always override BOTH equals() AND hashCode() together:
// If equals() says two objects are equal, hashCode() MUST return same value.
// If hashCode() is same but equals() false → hash collision (acceptable, just slower).
// If equals() is same but hashCode() differs → HashMap CANNOT find the key! (bug!)

@Override public boolean equals(Object o) { ... }
@Override public int hashCode() { return Objects.hash(field1, field2); }</code></pre></div>
<div class="qa"><div class="q"><span class="qn">Q</span>HashMap vs LinkedHashMap vs ConcurrentHashMap — when to use each?</div>
<table><tr><th></th><th>HashMap</th><th>LinkedHashMap</th><th>ConcurrentHashMap</th></tr>
<tr><td>Thread-safe?</td><td>NO — never use in multi-thread</td><td>NO</td><td>YES — segment locking</td></tr>
<tr><td>Order</td><td>No order</td><td>Insertion or access order</td><td>No order</td></tr>
<tr><td>Null key</td><td>Allows 1 null key</td><td>Allows 1 null key</td><td>NO null keys or values</td></tr>
<tr><td>Use case</td><td>General single-thread cache</td><td>LRU Cache (access order mode)</td><td>Shared cache in multi-thread</td></tr></table>
<pre><code>// LRU Cache using LinkedHashMap:
new LinkedHashMap&lt;K,V&gt;(capacity, 0.75f, true) { // true = access order
    protected boolean removeEldestEntry(Map.Entry&lt;K,V&gt; eldest) {
        return size() &gt; capacity; // auto-evict least recently accessed
    }
};

// ConcurrentHashMap — thread-safe without locking whole map:
// Java 8: uses CAS + synchronized on individual bucket (not whole map)
// Multiple threads can read/write DIFFERENT buckets simultaneously → high throughput
ConcurrentHashMap&lt;String, Integer&gt; map = new ConcurrentHashMap&lt;&gt;();
map.putIfAbsent("key", 1);          // atomic check-then-put
map.computeIfAbsent("key", k -> 0); // atomic compute-and-insert</code></pre></div></div>

<div class="sec"><h3>List &amp; Queue Internals</h3>
<div class="qa"><div class="q"><span class="qn">Q</span>ArrayList vs LinkedList — when to choose?</div>
<table><tr><th>Operation</th><th>ArrayList</th><th>LinkedList</th></tr>
<tr><td>get(index)</td><td>O(1) — direct array access</td><td>O(n) — traverse from head</td></tr>
<tr><td>add(end)</td><td>O(1) amortized (O(n) on resize)</td><td>O(1) — just update tail pointer</td></tr>
<tr><td>add(middle)</td><td>O(n) — shift elements right</td><td>O(n) find + O(1) insert</td></tr>
<tr><td>Memory</td><td>Compact — just array</td><td>Overhead: next/prev pointers per node</td></tr>
<tr><td>Cache performance</td><td>Excellent — contiguous memory</td><td>Poor — nodes scattered in Heap</td></tr></table>
<div class="tip">In practice: use ArrayList for almost everything. LinkedList only if you need O(1) insertions at both ends (use ArrayDeque instead — it's faster even then).</div></div>
<div class="qa"><div class="q"><span class="qn">Q</span>PriorityQueue internals — how does the heap work?</div>
<pre><code>// PriorityQueue = min-heap backed by array. Smallest element always at index 0.
// Parent at i → left child at 2i+1, right child at 2i+2
// poll() = remove min (index 0), move last element to root, "sift down" → O(log n)
// offer() = add at end, "bubble up" → O(log n)
// peek() = view root without removing → O(1)

PriorityQueue&lt;Integer&gt; minHeap = new PriorityQueue&lt;&gt;();            // min-heap
PriorityQueue&lt;Integer&gt; maxHeap = new PriorityQueue&lt;&gt;(Comparator.reverseOrder()); // max-heap
PriorityQueue&lt;int[]&gt; byFreq = new PriorityQueue&lt;&gt;((a,b) -&gt; b[1]-a[1]); // custom comparator</code></pre></div></div>

<div class="sec"><h3>Iterator, Fail-Fast vs Fail-Safe, Comparable vs Comparator</h3>
<div class="qa"><div class="q"><span class="qn">Q</span>ConcurrentModificationException — cause, fix, fail-fast vs fail-safe</div>
<pre><code>// CAUSE: modifying a collection while iterating (for-each) → modCount mismatch → throws CME
List&lt;String&gt; list = new ArrayList&lt;&gt;(List.of("a","b","c"));
for (String s : list) { if(s.equals("b")) list.remove(s); } // throws ConcurrentModificationException!

// FIX 1: Iterator.remove() — safe removal during iteration:
Iterator&lt;String&gt; it = list.iterator();
while (it.hasNext()) { if (it.next().equals("b")) it.remove(); } // safe!

// FIX 2: removeIf (Java 8+) — cleanest:
list.removeIf(s -&gt; s.equals("b"));

// FIX 3: collect to new list then remove:
list = list.stream().filter(s -&gt; !s.equals("b")).collect(Collectors.toList());

// Fail-safe: CopyOnWriteArrayList — iterates a snapshot, never throws CME
// Cost: every write copies entire array — only use for read-heavy, rare-write scenarios</code></pre></div>
<div class="qa"><div class="q"><span class="qn">Q</span>Comparable vs Comparator</div>
<pre><code>// Comparable: natural ordering — class implements it, defines ONE ordering
class Employee implements Comparable&lt;Employee&gt; {
    @Override public int compareTo(Employee o) { return this.salary - o.salary; } // ascending salary
}
Collections.sort(employees); // uses compareTo

// Comparator: external, flexible — define MULTIPLE orderings
Comparator&lt;Employee&gt; byName   = Comparator.comparing(Employee::getName);
Comparator&lt;Employee&gt; bySalary = Comparator.comparingInt(Employee::getSalary).reversed();
Comparator&lt;Employee&gt; complex  = Comparator.comparing(Employee::getDept)
                                            .thenComparingInt(Employee::getSalary); // chain

employees.sort(byName);           // sort by name
employees.sort(bySalary);         // sort by salary descending
TreeSet&lt;Employee&gt; ts = new TreeSet&lt;&gt;(byName); // TreeSet with custom ordering</code></pre></div></div></div>`},

streams:{label:"Day 3 — Streams & Modern Java",content:()=>`<div class="content"><h2>Streams, Lambdas & Modern Java</h2><p class="tagline">Day 3 · Lambda · Functional Interfaces · Stream API · Optional · Java 17/21</p>
<div class="sec"><h3>Lambda & Functional Interfaces</h3>
<div class="qa"><div class="q"><span class="qn">Q</span>Lambda + built-in interfaces</div><div class="def">Lambda = anonymous function (params) → body. Functional interface = exactly ONE abstract method. @FunctionalInterface enforces this at compile time. Java 8+ default/static methods allowed alongside the one abstract method.</div>
<pre><code>Predicate&lt;T&gt;     — boolean test(T t)      — filtering
Function&lt;T,R&gt;    — R apply(T t)           — transforming
Consumer&lt;T&gt;      — void accept(T t)       — side effects (forEach)
Supplier&lt;T&gt;      — T get()               — factory/lazy value
BiFunction&lt;T,U,R&gt;— R apply(T t, U u)     — two inputs → one output</code></pre></div></div>
<div class="sec"><h3>Stream API</h3>
<div class="qa"><div class="q"><span class="qn">Q</span>Intermediate (lazy) vs Terminal (eager)</div>
<pre><code>// Intermediate — return Stream, nothing runs yet:
.filter(n -> n > 4)   .map(String::toUpperCase)   .sorted()   .distinct()   .limit(3)   .skip(1)

// Terminal — triggers pipeline, returns result:
.collect(Collectors.toList())     .forEach(...)     .count()
.reduce(0, Integer::sum)          .findFirst()      .anyMatch(...)
.groupingBy(String::length)       .joining(", ")

// map (1:1) vs flatMap (1:many then flatten):
List.of(List.of(1,2),List.of(3,4)).stream().flatMap(Collection::stream).toList(); // [1,2,3,4]

// stream() — sequential | parallelStream() — multi-core (NOT always faster, benchmark first)</code></pre></div>
<div class="qa"><div class="q"><span class="qn">Q</span>Optional</div><div class="def">Container that may or may not hold a value. Eliminates null returns and NullPointerException.</div>
<pre><code>opt.ifPresent(s -> use(s));                    // run only if present
opt.orElse("default");                          // default always evaluated
opt.orElseGet(() -> compute());                 // lazy — only if empty (prefer this)
opt.orElseThrow(() -> new NotFoundException()); // throw if empty
opt.map(String::toUpperCase);                   // transform if present → new Optional</code></pre></div></div>
<div class="sec"><h3>Java 17 & 21 Features</h3>
<div class="qa"><div class="q"><span class="qn">Q</span>Records, Sealed Classes, Virtual Threads</div>
<pre><code>// Record (Java 16+) — immutable data class, auto-generates everything:
record Point(int x, int y) {}
Point p = new Point(3,4); p.x(); p.y(); // no manual constructor/getters/equals/hashCode

// Sealed class (Java 17) — restricts which classes can extend:
sealed class Shape permits Circle, Rectangle {}
// Compiler knows all subtypes → exhaustive switch (no default needed)

// Virtual threads (Java 21) — millions of lightweight threads:
try (var exec = Executors.newVirtualThreadPerTaskExecutor()) {
    IntStream.range(0,1_000_000).forEach(i -> exec.submit(() -> task(i)));
}</code></pre></div></div></div>`},

threading:{label:"Day 4 — Threading & Concurrency ✅",content:()=>`<div class="content"><h2>Threading & Concurrency</h2><p class="tagline">Day 4 · Thread creation · Lifecycle · Synchronization · CompletableFuture · ForkJoinPool</p>

<div class="sec"><h3>Creating Threads</h3>
<div class="qa"><div class="q"><span class="qn">Q1</span>How to create a Thread? Different ways?</div>
<div class="def">3 main ways: (1) extend Thread class, (2) implement Runnable (recommended), (3) implement Callable (returns result), (4) Lambda (concise Runnable), (5) ExecutorService thread pool (production best practice).</div>
<pre><code>// Way 1: Extend Thread (BAD — wastes inheritance slot)
class MyThread extends Thread {
    public void run() { System.out.println("Thread: " + Thread.currentThread().getName()); }
}
new MyThread().start();

// Way 2: Implement Runnable (GOOD — can still extend another class)
class MyTask implements Runnable {
    public void run() { System.out.println("Runnable running"); }
}
Thread t = new Thread(new MyTask()); t.start();

// Way 3: Lambda (CONCISE)
Thread t = new Thread(() -> System.out.println("Lambda thread"));
t.start();

// Way 4: Callable (returns a value, can throw checked exceptions)
Callable&lt;Integer&gt; task = () -> { return 42; };
Future&lt;Integer&gt; future = executor.submit(task);
int result = future.get(); // blocks until done

// Way 5: ExecutorService (BEST for production)
ExecutorService executor = Executors.newFixedThreadPool(4);
executor.submit(() -> System.out.println("Pool thread"));
executor.shutdown();</code></pre>
<div class="tip">Always prefer ExecutorService over manually creating Thread objects. Thread creation is expensive — thread pools reuse threads and control concurrency.</div></div></div>

<div class="sec"><h3>Thread Lifecycle</h3>
<div class="qa"><div class="q"><span class="qn">Q2</span>Thread Lifecycle states</div>
<div class="def">A thread moves through 6 states: NEW → RUNNABLE → RUNNING → BLOCKED/WAITING/TIMED_WAITING → TERMINATED.</div>
<div class="flow">
<strong>NEW</strong>: Thread t = new Thread(...) — created but not started<br>
<strong>RUNNABLE</strong>: t.start() called — ready to run, waiting for CPU scheduler<br>
<strong>RUNNING</strong>: CPU picked this thread — run() is executing<br>
<strong>BLOCKED</strong>: Waiting to acquire a synchronized lock held by another thread<br>
<strong>WAITING</strong>: wait() / join() — sleeping indefinitely until notified<br>
<strong>TIMED_WAITING</strong>: sleep(ms) / wait(ms) / join(ms) — waiting for specified time<br>
<strong>TERMINATED</strong>: run() completed or exception thrown — thread is dead, cannot restart
</div>
<pre><code>Thread t = new Thread(() -> { ... });
System.out.println(t.getState()); // NEW
t.start();
System.out.println(t.getState()); // RUNNABLE or RUNNING
t.join();                          // current thread waits for t to finish
System.out.println(t.getState()); // TERMINATED</code></pre></div></div>

<div class="sec"><h3>Runnable vs Callable</h3>
<div class="qa"><div class="q"><span class="qn">Q3</span>Difference between Runnable and Callable</div>
<table><tr><th>Aspect</th><th>Runnable</th><th>Callable&lt;V&gt;</th></tr>
<tr><td>Method</td><td>void run()</td><td>V call() throws Exception</td></tr>
<tr><td>Return value</td><td>Nothing (void)</td><td>Returns a value of type V</td></tr>
<tr><td>Exceptions</td><td>Cannot throw checked exceptions</td><td>CAN throw checked exceptions</td></tr>
<tr><td>Result</td><td>No Future</td><td>Returns Future&lt;V&gt; via executor.submit()</td></tr>
<tr><td>Use when</td><td>Fire and forget task</td><td>Need result from async computation</td></tr></table></div></div>

<div class="sec"><h3>Race Condition & Synchronization</h3>
<div class="qa"><div class="q"><span class="qn">Q4–Q6</span>Race condition, synchronization, synchronized block vs method</div>
<div class="def">Race condition = two threads access and modify shared data simultaneously without coordination → unpredictable, corrupted results. Synchronization = only one thread at a time can execute the synchronized code.</div>
<pre><code>// RACE CONDITION — BUG:
int count = 0;
// Thread A: reads count=5, Thread B: reads count=5
// Thread A: writes count=6, Thread B: writes count=6
// Expected: count=7, Actual: count=6 → LOST UPDATE!

// FIX: synchronized METHOD — locks on 'this' object:
public synchronized void increment() { count++; } // entire method locked

// FIX: synchronized BLOCK — finer-grained, better performance:
private final Object lock = new Object();
public void increment() {
    synchronized(lock) { count++; }  // only this critical section locked
    System.out.println(count);        // this line is NOT locked — runs concurrently
}
// Block is preferred: shorter lock duration = less contention = better throughput</code></pre>
<div class="note">synchronized on a static method locks on the CLASS object. synchronized on an instance method locks on 'this' (the instance). They are DIFFERENT locks — concurrent access is still possible between the two!</div></div></div>

<div class="sec"><h3>ReentrantLock & Volatile</h3>
<div class="qa"><div class="q"><span class="qn">Q7–Q8</span>ReentrantLock vs synchronized, and volatile</div>
<div class="def">ReentrantLock provides more control than synchronized: tryLock() (attempt without blocking), lockInterruptibly() (interrupt while waiting), fair lock (FIFO ordering), explicit lock/unlock. volatile guarantees VISIBILITY of changes across threads (no CPU cache) but NOT atomicity.</div>
<pre><code>// ReentrantLock:
private final ReentrantLock lock = new ReentrantLock(true); // fair=true → FIFO
lock.lock();
try { count++; } finally { lock.unlock(); } // ALWAYS unlock in finally!

// tryLock — non-blocking attempt:
if (lock.tryLock(100, TimeUnit.MILLISECONDS)) {
    try { count++; } finally { lock.unlock(); }
} else { System.out.println("Could not acquire lock, skipping"); }

// volatile — visibility only:
private volatile boolean running = true;  // CPU caches bypassed
// All threads see latest value immediately
// But: running++ is still NOT atomic with volatile! Use AtomicInteger for that.</code></pre></div></div>

<div class="sec"><h3>Thread Methods: sleep, wait, yield, join</h3>
<div class="qa"><div class="q"><span class="qn">Q10–Q12</span>sleep vs wait, yield, join, inter-thread communication</div>
<table><tr><th>Method</th><th>Class</th><th>Releases lock?</th><th>Purpose</th></tr>
<tr><td>sleep(ms)</td><td>Thread (static)</td><td>NO — keeps lock</td><td>Pause thread for specified time</td></tr>
<tr><td>wait()</td><td>Object</td><td>YES — releases lock</td><td>Wait for condition (used in synchronized block)</td></tr>
<tr><td>notify()</td><td>Object</td><td>N/A — wakes one waiter</td><td>Wake up ONE waiting thread</td></tr>
<tr><td>notifyAll()</td><td>Object</td><td>N/A — wakes all waiters</td><td>Wake up ALL waiting threads</td></tr>
<tr><td>yield()</td><td>Thread (static)</td><td>NO</td><td>Hint to scheduler to give other threads CPU time</td></tr>
<tr><td>join()</td><td>Thread</td><td>N/A</td><td>Current thread waits until this thread finishes</td></tr></table>
<pre><code>// Producer-Consumer using wait/notify (inter-thread communication):
class SharedBuffer {
    private int data; private boolean hasData = false;

    synchronized void produce(int val) throws InterruptedException {
        while (hasData) wait();     // wait if buffer full — releases lock!
        data = val; hasData = true;
        notify();                   // wake up the consumer
    }
    synchronized int consume() throws InterruptedException {
        while (!hasData) wait();    // wait if buffer empty
        hasData = false;
        notify();                   // wake up the producer
        return data;
    }
}</code></pre>
<div class="warn">wait() MUST be called inside a synchronized block on the same object, and MUST be in a while loop (not if) to handle spurious wakeups. sleep() does NOT release the lock — other threads cannot enter synchronized code while a thread is sleeping with the lock!</div></div></div>

<div class="sec"><h3>Thread Pool & ExecutorService</h3>
<div class="qa"><div class="q"><span class="qn">Q13–Q15</span>Thread pool types, ExecutorService, submit vs execute</div>
<div class="def">A thread pool reuses a fixed set of threads to execute tasks, avoiding the overhead of creating/destroying threads for every task.</div>
<pre><code>// Thread pool types:
ExecutorService fixed  = Executors.newFixedThreadPool(4);      // N threads, reused
ExecutorService cached = Executors.newCachedThreadPool();       // grows/shrinks dynamically
ExecutorService single = Executors.newSingleThreadExecutor();   // 1 thread, tasks queued
ScheduledExecutorService sched = Executors.newScheduledThreadPool(2); // periodic tasks

// execute() vs submit():
executor.execute(() -> task());          // Runnable, void, no result, no checked exceptions
Future&lt;?&gt; f = executor.submit(() -> task()); // Runnable, returns Future (can check completion)
Future&lt;Integer&gt; f = executor.submit(() -> compute()); // Callable, returns Future with value

// Always shutdown to release threads:
executor.shutdown();              // graceful — waits for running tasks to finish
executor.shutdownNow();           // aggressive — tries to stop running tasks
executor.awaitTermination(30, TimeUnit.SECONDS);</code></pre>
<div class="qa"><div class="q"><span class="qn">Q16</span>What is Future?</div>
<div class="def">Future represents the result of an asynchronous computation. You can check if it's done (isDone()), cancel it (cancel()), or block to get the result (get()). Limitation: cannot chain operations, cannot handle exceptions cleanly — use CompletableFuture for that.</div>
<pre><code>Future&lt;Integer&gt; f = executor.submit(() -> heavyComputation());
// ... do other work ...
int result = f.get();            // BLOCKS until result is ready
int result = f.get(5, TimeUnit.SECONDS); // blocks max 5 seconds → TimeoutException if slow
boolean done = f.isDone();       // non-blocking check
f.cancel(true);                  // attempt to cancel</code></pre></div></div></div>

<div class="sec"><h3>AtomicInteger & CAS</h3>
<div class="qa"><div class="q"><span class="qn">Q17–Q18</span>AtomicInteger and Compare-And-Swap</div>
<div class="def">CAS (Compare-And-Swap) is a CPU-level atomic instruction: if current value equals expected, swap to new value — all in one uninterruptible hardware operation. AtomicInteger uses CAS internally for lock-free thread-safe operations.</div>
<pre><code>AtomicInteger counter = new AtomicInteger(0);
counter.incrementAndGet();              // thread-safe increment, no lock needed
counter.getAndAdd(5);                   // adds 5, returns old value
counter.compareAndSet(10, 20);         // CAS: if value==10, set to 20 → returns boolean

// HOW CAS works internally (simplified):
// 1. Read current value from memory
// 2. If current == expected → write new value (atomic!)
// 3. If current != expected → retry (spin loop)
// No lock needed — purely hardware-level atomicity

// AtomicInteger is much faster than synchronized for simple counters
// BUT: CAS spin loop wastes CPU under HIGH contention — use LongAdder in that case</code></pre></div></div>

<div class="sec"><h3>Deadlock</h3>
<div class="qa"><div class="q"><span class="qn">Q19–Q20</span>What is deadlock and how to avoid it?</div>
<div class="def">Deadlock = two or more threads are permanently blocked, each waiting for a lock held by the other. Four conditions must ALL be true: mutual exclusion, hold and wait, no preemption, circular wait. Break any one condition to prevent deadlock.</div>
<pre><code>// DEADLOCK example:
Object lockA = new Object(); Object lockB = new Object();
Thread t1 = new Thread(() -> {
    synchronized(lockA) { sleep(100); synchronized(lockB) { /* work */ } }
});
Thread t2 = new Thread(() -> {
    synchronized(lockB) { sleep(100); synchronized(lockA) { /* work */ } }
});
// t1 holds lockA, wants lockB. t2 holds lockB, wants lockA. DEADLOCK!

// HOW TO AVOID:
// 1. Always acquire locks in the SAME ORDER (break circular wait):
Thread t2Fixed = new Thread(() -> {
    synchronized(lockA) { synchronized(lockB) { /* work */ } } // same order as t1!
});

// 2. Use tryLock with timeout (ReentrantLock):
if (lockA.tryLock(100, MILLISECONDS)) {
    try {
        if (lockB.tryLock(100, MILLISECONDS)) {
            try { /* do work */ } finally { lockB.unlock(); }
        }
    } finally { lockA.unlock(); }
}

// 3. Reduce lock scope — hold locks for shortest time possible
// 4. Use lock-free structures (AtomicInteger, ConcurrentHashMap)</code></pre></div></div></div>

<div class="sec"><h3>CompletableFuture</h3>
<div class="qa"><div class="q"><span class="qn">Q21–Q27</span>CompletableFuture — complete async API</div>
<div class="def">CompletableFuture is a Future that you can complete manually, chain operations on, combine with other futures, and handle exceptions — all in a non-blocking, fluent API.</div>
<pre><code>// runAsync() — runs Runnable, no return value:
CompletableFuture&lt;Void&gt; cf1 = CompletableFuture.runAsync(() -> sendEmail());

// supplyAsync() — runs Callable, returns value:
CompletableFuture&lt;String&gt; cf2 = CompletableFuture.supplyAsync(() -> fetchUserName());

// thenApply() — transform result (returns new CF):
CompletableFuture&lt;Integer&gt; cf3 = cf2.thenApply(name -> name.length()); // String → Integer

// thenAccept() — consume result (void, no return):
cf2.thenAccept(name -> System.out.println("Hello " + name)); // no return value

// thenCompose() — flatten nested CFs (flatMap equivalent — CHAIN dependent async ops):
CompletableFuture&lt;Order&gt; order = fetchUser(id)
    .thenCompose(user -> fetchOrder(user.getOrderId())); // second op depends on first result

// thenCombine() — run TWO independent CFs in parallel, combine results:
CompletableFuture&lt;String&gt; userCF  = fetchUser(id);
CompletableFuture&lt;String&gt; orderCF = fetchOrder(orderId);
CompletableFuture&lt;String&gt; combined = userCF.thenCombine(orderCF, (user, order) -> user + " bought " + order);

// Exception handling:
cf2.exceptionally(ex -> { log.error(ex.getMessage()); return "DEFAULT_USER"; }) // fallback
   .handle((result, ex) -> ex != null ? "error" : result);  // handles both success and failure

// get() vs join():
cf2.get();    // throws CHECKED exceptions (InterruptedException, ExecutionException) — must catch
cf2.join();   // throws UNCHECKED exceptions — cleaner in stream pipelines</code></pre>
<div class="note">thenApply = map (transform value). thenAccept = forEach (consume value, no return). thenCompose = flatMap (chain async ops where second depends on first). thenCombine = zip (combine two independent async results).</div>
<div class="tip">By default CompletableFuture uses ForkJoinPool.commonPool() for async tasks. For production, always provide your own ExecutorService as second arg: CompletableFuture.supplyAsync(() -> task(), customExecutor)</div></div></div>

<div class="sec"><h3>ForkJoinPool & BlockingQueue</h3>
<div class="qa"><div class="q"><span class="qn">Q28</span>ForkJoinPool</div>
<div class="def">ForkJoinPool is a specialized thread pool designed for recursive divide-and-conquer tasks using the fork-join framework. It uses a work-stealing algorithm: idle threads steal tasks from busy threads' queues — maximizes CPU utilization.</div>
<pre><code>// ForkJoinPool — for parallel recursive tasks:
ForkJoinPool pool = ForkJoinPool.commonPool(); // shared pool, used by parallelStream() too

// RecursiveTask example (sum array in parallel):
class SumTask extends RecursiveTask&lt;Long&gt; {
    int[] arr; int start, end;
    SumTask(int[] arr, int start, int end) { this.arr=arr; this.start=start; this.end=end; }

    protected Long compute() {
        if (end - start &lt;= 1000) {           // base case — small enough to compute directly
            long sum = 0;
            for (int i = start; i &lt; end; i++) sum += arr[i];
            return sum;
        }
        int mid = (start + end) / 2;
        SumTask left  = new SumTask(arr, start, mid); left.fork();  // submit to pool
        SumTask right = new SumTask(arr, mid, end);
        return right.compute() + left.join();  // compute right + wait for left
    }
}
Long total = pool.invoke(new SumTask(bigArray, 0, bigArray.length));</code></pre></div>
<div class="qa"><div class="q"><span class="qn">Q29</span>BlockingQueue</div>
<div class="def">BlockingQueue is a thread-safe queue that BLOCKS the producer when full (put() waits) and BLOCKS the consumer when empty (take() waits) — perfect for producer-consumer pattern without manual wait/notify.</div>
<pre><code>BlockingQueue&lt;String&gt; queue = new LinkedBlockingQueue&lt;&gt;(100); // capacity 100

// Producer thread:
queue.put("task1");   // BLOCKS if queue is full — waits until space available

// Consumer thread:
String task = queue.take(); // BLOCKS if queue is empty — waits until item available

// Non-blocking alternatives:
queue.offer("task", 5, TimeUnit.SECONDS); // wait max 5s then return false
queue.poll(5, TimeUnit.SECONDS);          // wait max 5s then return null

// Types:
ArrayBlockingQueue  — fixed capacity, backed by array
LinkedBlockingQueue — optionally bounded, backed by linked nodes
PriorityBlockingQueue — unbounded, priority-ordered
SynchronousQueue   — no capacity! direct handoff: put() blocks until take() called</code></pre></div></div>

<div class="sec"><h3>Quick Reference: Optimistic vs Pessimistic Locking</h3>
<div class="qa"><div class="q"><span class="qn">Q30</span>Optimistic vs Pessimistic (see Day 15 for full JPA details)</div>
<table><tr><th>Aspect</th><th>Optimistic</th><th>Pessimistic</th></tr>
<tr><td>DB lock on read</td><td>NO</td><td>YES (SELECT FOR UPDATE)</td></tr>
<tr><td>Conflict detection</td><td>At save time (version check)</td><td>At read time (blocks others)</td></tr>
<tr><td>Performance</td><td>Better (high concurrency)</td><td>Worse (lock contention)</td></tr>
<tr><td>Deadlock risk</td><td>None</td><td>Possible</td></tr>
<tr><td>Best for</td><td>Read-heavy, low conflict web apps</td><td>High write contention, financial ops</td></tr>
<tr><td>JPA</td><td>@Version on entity field</td><td>LockModeType.PESSIMISTIC_WRITE</td></tr></table></div></div></div>`},

jvm:{label:"Days 5–6 — JVM & Patterns",content:()=>`<div class="content"><h2>JVM Architecture, GC & Design Patterns</h2><p class="tagline">Days 5–6 · ClassLoader · Memory Areas · JIT · GC Types · Singleton · Factory · Builder · HTTP</p>
<div class="sec"><h3>JVM Architecture</h3>
<div class="flow">
<strong>Source (.java) → javac → Bytecode (.class) → ClassLoader → JVM Executes</strong><br><br>
Key components:<br>
1. ClassLoader: Bootstrap (JDK core) → Extension → Application (your classpath) — delegation model<br>
2. Memory: Heap (all objects) · Stack (per-thread: locals, references) · Metaspace (class metadata) · PC Register<br>
3. Execution Engine: Interpreter (slow, first run) + JIT (compiles hot methods to native = fast) + GC
</div>
<div class="qa"><div class="q"><span class="qn">Q</span>JVM Memory Areas</div>
<table><tr><th>Area</th><th>Stores</th><th>Scope</th></tr>
<tr><td>Heap</td><td>ALL objects (new), String Pool (Java 7+). Young Gen (Eden+S0+S1) + Old Gen</td><td>Shared all threads</td></tr>
<tr><td>Stack</td><td>Method frames, locals, references, primitives. LIFO.</td><td>Per-thread, auto-freed</td></tr>
<tr><td>Metaspace</td><td>Class metadata, bytecode. Replaced PermGen Java 8+. Native memory — auto-grows.</td><td>Shared</td></tr></table></div>
<div class="qa"><div class="q"><span class="qn">Q</span>JIT Compiler & GC Types</div>
<div class="def">JIT: Hotspot detection → hot methods compiled to native machine code → faster execution. Minor GC: collect Young Generation (fast, frequent). Major/Full GC: collect Old Gen (slow). GC types: Serial, Parallel, G1GC (default Java 9+, region-based), ZGC (Java 11+, near-zero pause).</div></div></div>

<div class="sec"><h3>Design Patterns</h3>
<div class="qa"><div class="q"><span class="qn">Q</span>Singleton, Factory, Builder, Decorator</div>
<pre><code>// Singleton — one instance, thread-safe double-checked locking:
private static volatile Singleton instance;
public static Singleton getInstance() {
    if (instance == null) { synchronized(Singleton.class) {
        if (instance == null) instance = new Singleton(); } }
    return instance;
}

// Factory — hides creation logic:
Shape shape = ShapeFactory.create("CIRCLE"); // returns Circle, Square, etc.

// Builder — complex object construction (immutable, readable):
Employee emp = Employee.builder().name("Alice").salary(75000).dept("Eng").build();

// Decorator — add behavior by wrapping (Java I/O streams):
InputStream in = new BufferedInputStream(new GZIPInputStream(new FileInputStream("f.gz")));</code></pre></div></div>

<div class="sec"><h3>HTTP Methods & Idempotency</h3>
<table><tr><th>Method</th><th>Action</th><th>Idempotent?</th><th>Body?</th></tr>
<tr><td>GET</td><td>Read</td><td>Yes</td><td>No</td></tr>
<tr><td>POST</td><td>Create</td><td>No</td><td>Yes</td></tr>
<tr><td>PUT</td><td>Replace entire resource</td><td>Yes</td><td>Yes</td></tr>
<tr><td>PATCH</td><td>Partial update</td><td>No</td><td>Yes</td></tr>
<tr><td>DELETE</td><td>Delete</td><td>Yes</td><td>No</td></tr></table></div></div>`},

spring:{label:"Days 7–9 — Spring & REST",content:()=>`<div class="content"><h2>Spring Framework, Boot &amp; REST API</h2><p class="tagline">Days 7–9 · IoC · DI · Bean Scopes · AOP · @Transactional · Exception Handling · REST</p>
<div class="sec"><h3>IoC, DI &amp; Annotations</h3>
<div class="qa"><div class="q"><span class="qn">Q</span>IoC &amp; Dependency Injection — 3 injection types, which is best?</div>
<div class="def">IoC = Spring creates/manages beans. DI = Spring injects dependencies. Three types: Constructor (recommended), Setter, Field (@Autowired). Constructor injection is best: immutable fields, required deps are explicit, easy to unit test (just pass mock in constructor).</div>
<pre><code>// Constructor injection (RECOMMENDED):
@Service
public class OrderService {
    private final PaymentService paymentService; // final — immutable after construction
    public OrderService(PaymentService paymentService) { this.paymentService = paymentService; }
}

// Field injection (AVOID in production — hard to test, hidden deps):
@Service public class OrderService {
    @Autowired PaymentService paymentService; // Cannot make final, can't test without Spring
}

// When multiple implementations exist — use @Qualifier or @Primary:
@Service @Qualifier("stripe") public class StripePaymentService implements PaymentService {}
@Service @Qualifier("paypal") public class PaypalPaymentService implements PaymentService {}
// Inject specific one:
public OrderService(@Qualifier("stripe") PaymentService paymentService) {...}</code></pre></div>
<div class="qa"><div class="q"><span class="qn">Q</span>Key annotations</div>
<table><tr><th>Annotation</th><th>Purpose</th></tr>
<tr><td>@Component / @Service / @Repository</td><td>Generic / Business logic / Data layer beans. @Repository also translates SQL exceptions to Spring DataAccessException.</td></tr>
<tr><td>@Controller / @RestController</td><td>MVC / REST. @RestController = @Controller + @ResponseBody on every method.</td></tr>
<tr><td>@Configuration + @Bean</td><td>Java config class. @Bean factory methods produce managed beans.</td></tr>
<tr><td>@Qualifier / @Primary</td><td>Resolve ambiguity when multiple beans of same type. @Primary = default if no @Qualifier specified.</td></tr>
<tr><td>@Value / @ConfigurationProperties</td><td>Inject single property vs bind entire prefix to a POJO (type-safe).</td></tr>
<tr><td>@Profile</td><td>Activate bean only in specific environment: @Profile("prod"), run with --spring.profiles.active=prod</td></tr></table></div></div>

<div class="sec"><h3>Bean Scopes — Interview Favorite</h3>
<div class="qa"><div class="q"><span class="qn">Q</span>What are Bean Scopes? Singleton vs Prototype — when to use which?</div>
<table><tr><th>Scope</th><th>Instances</th><th>When created</th><th>Use case</th></tr>
<tr><td>singleton (default)</td><td>ONE per ApplicationContext</td><td>At startup (eager) or first use (lazy)</td><td>Stateless services, repositories — vast majority of beans</td></tr>
<tr><td>prototype</td><td>NEW instance per injection/getBean()</td><td>Each time requested</td><td>Stateful beans, mutable objects that should not be shared</td></tr>
<tr><td>request</td><td>ONE per HTTP request</td><td>Each HTTP request</td><td>Web: user-request-specific data</td></tr>
<tr><td>session</td><td>ONE per HTTP session</td><td>Per user session</td><td>Web: user session data (shopping cart)</td></tr></table>
<div class="warn">Injecting prototype bean into singleton = only ONE prototype created (injected at startup). Fix: inject ApplicationContext and call getBean() each time, or use @Lookup method injection.</div>
<pre><code>@Bean @Scope("prototype")
public ReportBuilder reportBuilder() { return new ReportBuilder(); }

// Correct way to use prototype from singleton:
@Service public class ReportService {
    @Autowired ApplicationContext ctx;
    public Report generate() {
        ReportBuilder builder = ctx.getBean(ReportBuilder.class); // NEW instance each call
        return builder.build();
    }
}</code></pre></div></div>

<div class="sec"><h3>@Transactional — Complete Guide</h3>
<div class="qa"><div class="q"><span class="qn">Q</span>@Transactional — propagation levels, readOnly, common pitfalls</div>
<div class="def">@Transactional wraps a method in a database transaction. Opens connection before, commits on success, rolls back on RuntimeException (by default). Works via Spring AOP proxy — calling from same class bypasses the proxy!</div>
<table><tr><th>Propagation</th><th>Behavior</th><th>Use case</th></tr>
<tr><td>REQUIRED (default)</td><td>Join existing TX; create new if none</td><td>Most service methods</td></tr>
<tr><td>REQUIRES_NEW</td><td>Always create new TX; suspend existing</td><td>Audit logs, must commit independently</td></tr>
<tr><td>SUPPORTS</td><td>Join if exists; run non-transactionally if none</td><td>Read-only methods that can run either way</td></tr>
<tr><td>NOT_SUPPORTED</td><td>Always run without TX; suspend existing</td><td>Methods that must NOT run in a TX</td></tr>
<tr><td>MANDATORY</td><td>Must join existing TX; throws if none</td><td>Internal methods that require caller's TX</td></tr>
<tr><td>NEVER</td><td>Must NOT be in TX; throws if one exists</td><td>Methods that should never run in TX</td></tr></table>
<pre><code>@Transactional(
    propagation = Propagation.REQUIRED,    // default
    isolation = Isolation.READ_COMMITTED,  // override DB default
    readOnly = true,                       // skip dirty-checking → faster reads
    rollbackFor = Exception.class,         // also rollback on checked exceptions
    timeout = 30                           // rollback if takes > 30 seconds
)
public List&lt;Employee&gt; findAll() { ... }

// PITFALL 1 — Self-invocation bypasses proxy:
@Service public class OrderService {
    public void process() {
        this.save();  // calls directly — @Transactional on save() is IGNORED!
    }
    @Transactional public void save() { ... }
}
// FIX: inject self, or move save() to another @Service

// PITFALL 2 — Only rolls back on RuntimeException by default:
@Transactional public void transfer() throws IOException {
    // If IOException thrown → NO rollback by default!
    // Fix: @Transactional(rollbackFor = IOException.class)
}</code></pre></div></div>

<div class="sec"><h3>AOP &amp; Exception Handling</h3>
<div class="qa"><div class="q"><span class="qn">Q</span>AOP — how it works, advice types</div>
<div class="def">AOP wraps beans with proxy classes. Aspect = concern class (@Aspect). JoinPoint = method call. Pointcut = expression that selects which JoinPoints. Spring AOP uses JDK Dynamic Proxy (interface-based) or CGLIB (class-based).</div>
<pre><code>@Aspect @Component
public class TimingAspect {
    // @Around intercepts method call — can run code before AND after, modify result
    @Around("execution(* com.app.service.*.*(..))")
    public Object time(ProceedingJoinPoint pjp) throws Throwable {
        long start = System.currentTimeMillis();
        Object result = pjp.proceed();  // calls actual method
        log.info("{} took {}ms", pjp.getSignature(), System.currentTimeMillis() - start);
        return result;
    }
    // @Before — runs before method, cannot modify return value
    @Before("@annotation(com.app.annotation.Audited)")
    public void audit(JoinPoint jp) { auditLog.record(jp.getSignature().getName()); }
    // @AfterThrowing — runs only when method throws
    @AfterThrowing(pointcut="execution(* com.app..*.*(..))", throwing="ex")
    public void logError(Exception ex) { alertService.send(ex); }
}</code></pre></div>
<div class="qa"><div class="q"><span class="qn">Q</span>Global Exception Handling — @ControllerAdvice</div>
<pre><code>@RestControllerAdvice  // handles exceptions across ALL @RestController classes
public class GlobalExceptionHandler {

    @ExceptionHandler(EntityNotFoundException.class)
    @ResponseStatus(HttpStatus.NOT_FOUND)
    public ErrorResponse handleNotFound(EntityNotFoundException ex) {
        return new ErrorResponse(404, ex.getMessage());
    }

    @ExceptionHandler(MethodArgumentNotValidException.class)
    @ResponseStatus(HttpStatus.BAD_REQUEST)
    public ErrorResponse handleValidation(MethodArgumentNotValidException ex) {
        List&lt;String&gt; errors = ex.getBindingResult().getFieldErrors()
            .stream().map(e -&gt; e.getField() + ": " + e.getDefaultMessage()).toList();
        return new ErrorResponse(400, errors.toString());
    }

    @ExceptionHandler(Exception.class) // catch-all
    @ResponseStatus(HttpStatus.INTERNAL_SERVER_ERROR)
    public ErrorResponse handleGeneral(Exception ex) {
        log.error("Unexpected error", ex);
        return new ErrorResponse(500, "Internal server error");
    }
}</code></pre></div></div>

<div class="sec"><h3>Spring MVC &amp; REST API</h3>
<div class="qa"><div class="q"><span class="qn">Q</span>Spring MVC request flow — full journey</div>
<div class="flow">
HTTP Request → DispatcherServlet (front controller) → HandlerMapping (find @RequestMapping method)<br>
→ HandlerInterceptor.preHandle() → Controller method runs → Service → Repository → DB<br>
← Repository ← Service ← Controller returns ResponseEntity ←<br>
HandlerInterceptor.postHandle() → MessageConverter (Jackson: Java → JSON) → HTTP Response
</div></div>
<pre><code>@RestController @RequestMapping("/api/employees")
public class EmployeeController {
    @GetMapping("/{id}")    ResponseEntity&lt;Employee&gt; get(@PathVariable Long id) {...}
    @GetMapping             List&lt;Employee&gt; getAll(@RequestParam(required=false) String dept) {...}
    @PostMapping            ResponseEntity&lt;?&gt; create(@RequestBody @Valid EmployeeDTO dto) {...}
    @PutMapping("/{id}")    Employee update(@PathVariable Long id, @RequestBody EmployeeDTO dto) {...}
    @PatchMapping("/{id}")  Employee patch(@PathVariable Long id, @RequestBody Map&lt;?,?&gt; changes) {...}
    @DeleteMapping("/{id}") @ResponseStatus(HttpStatus.NO_CONTENT) void delete(@PathVariable Long id) {...}
}
// Validation:
record EmployeeDTO(@NotBlank String name, @Email String email, @Min(0) double salary) {}</code></pre>
<div class="qa"><div class="q"><span class="qn">Q</span>Spring Boot Auto-Configuration — how does it work?</div>
<div class="def">@SpringBootApplication = @Configuration + @EnableAutoConfiguration + @ComponentScan. Auto-configuration scans spring.factories / META-INF/spring/AutoConfiguration.imports for configuration classes. Each class has @Conditional annotations — only activates if certain classes are on classpath or properties are set.</div>
<pre><code>// Example: DataSourceAutoConfiguration activates only if:
// 1. HikariCP is on classpath (@ConditionalOnClass(HikariDataSource.class))
// 2. No DataSource bean already defined (@ConditionalOnMissingBean)
// 3. spring.datasource.url is set in application.properties

// You override auto-config by defining your own @Bean — Spring backs off automatically
@Configuration public class MyConfig {
    @Bean DataSource dataSource() { return ...; } // Spring's auto-config sees this and steps back
}</code></pre></div></div></div>`},

reflection:{label:"Days 10–11 — Reflection & Concurrency",content:()=>`<div class="content"><h2>Reflection, Concurrency & Proxy</h2><p class="tagline">Days 10–11 · Reflection · Volatile vs Synchronized · Locks · AtomicInteger · Proxy</p>
<div class="sec"><h3>Reflection</h3>
<div class="qa"><div class="q"><span class="qn">Q</span>What is Reflection?</div><div class="def">Inspect/manipulate classes, methods, fields at RUNTIME. Spring uses it for DI, AOP, @Transactional, Jackson. getMethods() = all PUBLIC (including inherited). getDeclaredMethods() = all methods in THIS class (any visibility).</div>
<pre><code>Class&lt;?&gt; c = Class.forName("com.app.Employee");
Object obj = c.getDeclaredConstructor().newInstance();
Field f = c.getDeclaredField("salary");
f.setAccessible(true);  // bypasses private — dangerous in prod!
f.set(obj, 75000.0);</code></pre></div></div>

<div class="sec"><h3>Java Memory Model & Synchronization</h3>
<div class="qa"><div class="q"><span class="qn">Q</span>Visibility problem, volatile, synchronized</div><div class="def">Visibility problem: changes by Thread A to a variable may not be seen by Thread B immediately (CPU cache). volatile fixes visibility (forces CPU to flush/read from main memory). synchronized fixes both visibility AND atomicity.</div>
<pre><code>volatile boolean running = true;    // visibility only — changes seen immediately
// But: running++ is NOT atomic even with volatile!

synchronized void increment() { count++; }  // visibility + atomicity

// ReentrantLock — more control:
ReentrantLock lock = new ReentrantLock(true); // fair mode
lock.lock(); try { count++; } finally { lock.unlock(); } // ALWAYS in finally!</code></pre></div></div>

<div class="sec"><h3>Proxy Pattern</h3>
<div class="qa"><div class="q"><span class="qn">Q</span>Dynamic Proxy (how Spring AOP works)</div><div class="def">Spring wraps your beans with JDK Dynamic Proxy (interface-based) or CGLIB (class-based). When you call a @Transactional method, you're actually calling the proxy which runs the advice (@Before/@After) then delegates to your real method.</div>
<pre><code>// JDK Dynamic Proxy (Spring uses for @Transactional beans):
Object proxy = Proxy.newProxyInstance(target.getClass().getClassLoader(),
    target.getClass().getInterfaces(),
    (proxyObj, method, args) -> {
        // open transaction
        Object result = method.invoke(target, args); // call real method
        // commit transaction
        return result;
    });</code></pre></div></div></div>`},

sql_basics:{label:"Days 12–14 — SQL",content:()=>`<div class="content"><h2>SQL — Basics to Advanced</h2><p class="tagline">Days 12–14 · Queries · Joins · Window Functions · Indexes · B+Tree · ACID</p>
<div class="sec"><h3>Core SQL</h3>
<pre><code>-- SELECT, WHERE, ORDER BY, LIMIT:
SELECT name, salary FROM employee WHERE dept = 'Eng' ORDER BY salary DESC LIMIT 10 OFFSET 20;

-- Aggregate + GROUP BY + HAVING:
SELECT dept, COUNT(*) cnt, MAX(salary), AVG(salary)
FROM employee GROUP BY dept HAVING COUNT(*) > 3;
-- WHERE = before grouping | HAVING = after grouping

-- Nth highest salary (DENSE_RANK — best approach):
SELECT name, salary FROM (
    SELECT name, salary, DENSE_RANK() OVER (ORDER BY salary DESC) rk FROM employee
) t WHERE rk = N;

-- RANK: 1,1,3 (skips) | DENSE_RANK: 1,1,2 (no skip)</code></pre></div>
<div class="sec"><h3>JOINs & Set Operations</h3>
<pre><code>-- INNER JOIN: only matching rows in BOTH tables
-- LEFT JOIN: all from left + NULLs where no right match
-- LEFT JOIN + WHERE right.id IS NULL → rows WITHOUT match (find employees without dept)
-- CROSS JOIN: cartesian product (every combination)
-- UNION: combine + remove duplicates | UNION ALL: combine + keep duplicates (faster)
-- INTERSECT: rows in BOTH queries | EXCEPT/MINUS: rows in first NOT in second</code></pre></div>
<div class="sec"><h3>Indexes, B+Tree & Query Optimization</h3>
<div class="qa"><div class="q"><span class="qn">Q</span>B-Tree vs B+ Tree</div><div class="def">B+ Tree stores data ONLY in leaf nodes (internal nodes = keys only for navigation). Leaves linked as doubly-linked list → perfect for range scans. B-Tree stores data in all nodes — slower range queries. Use B+ Tree for: equality, range queries, ORDER BY.</div></div>
<div class="qa"><div class="q"><span class="qn">Q</span>ACID & Isolation Levels</div>
<table><tr><th>Isolation Level</th><th>Dirty Read</th><th>Non-repeat</th><th>Phantom</th></tr>
<tr><td>Read Uncommitted</td><td>Yes</td><td>Yes</td><td>Yes</td></tr>
<tr><td>Read Committed</td><td>No</td><td>Yes</td><td>Yes</td></tr>
<tr><td>Repeatable Read (MySQL default)</td><td>No</td><td>No</td><td>Yes</td></tr>
<tr><td>Serializable</td><td>No</td><td>No</td><td>No</td></tr></table></div></div></div>`},

orm_jpa:{label:"Days 15–16 — JPA & ORM",content:()=>`<div class="content"><h2>JPA/Hibernate & ORM</h2><p class="tagline">Days 15–16 · Optimistic Locking · @OneToMany · Lazy/Eager · N+1 · Spring Data JPA · SQL Injection</p>
<div class="sec"><h3>Optimistic Locking</h3>
<div class="qa"><div class="q"><span class="qn">Q</span>@Version annotation</div><div class="def">Optimistic locking = no DB lock on read, version check at save. Hibernate: UPDATE ... SET salary=?, version=version+1 WHERE id=? AND version=? → 0 rows updated = OptimisticLockException (someone else changed it).</div>
<pre><code>@Entity public class Employee {
    @Id Long id; String name; double salary;
    @Version Integer version;  // never set manually — Hibernate manages this
}
// Handle conflict:
try { employeeService.update(id, newSalary); }
catch (OptimisticLockException e) { return ResponseEntity.status(409).body("Conflict — retry"); }</code></pre></div></div>

<div class="sec"><h3>JPA Relationships</h3>
<div class="qa"><div class="q"><span class="qn">Q</span>@OneToMany, @ManyToOne, mappedBy</div>
<pre><code>@Entity public class Department {
    // INVERSE side — uses mappedBy (no FK here, uses FK in Employee table)
    @OneToMany(mappedBy="department", fetch=FetchType.LAZY, cascade=CascadeType.ALL)
    private List&lt;Employee&gt; employees;
}
@Entity public class Employee {
    // OWNING side — FK column lives here
    @ManyToOne(fetch=FetchType.LAZY)    // override EAGER default!
    @JoinColumn(name="department_id")
    private Department department;
}</code></pre>
<div class="warn">@ManyToOne defaults to EAGER — always override to LAZY. mappedBy without @JoinColumn on @OneToMany would create an unnecessary join table!</div></div>
<div class="qa"><div class="q"><span class="qn">Q</span>N+1 Problem & Fixes</div>
<pre><code>// N+1 BUG: 1 query for 100 depts + 100 queries for each dept's employees = 101 queries!
List&lt;Department&gt; depts = repo.findAll();
for (Department d : depts) d.getEmployees(); // FIRES N queries here!!

// FIX 1 — JOIN FETCH (1 query):
@Query("SELECT DISTINCT d FROM Department d LEFT JOIN FETCH d.employees")
List&lt;Department&gt; findAllWithEmployees();

// FIX 2 — @EntityGraph:
@EntityGraph(attributePaths={"employees"}) List&lt;Department&gt; findAll();

// FIX 3 — @BatchSize (N/batch queries instead of N):
@BatchSize(size=20) @OneToMany private List&lt;Employee&gt; employees;</code></pre></div></div>

<div class="sec"><h3>ORM, Spring Data JPA & SQL Injection</h3>
<pre><code>// Spring Data JPA — auto-generated queries:
public interface EmployeeRepo extends JpaRepository&lt;Employee, Long&gt; {
    List&lt;Employee&gt; findByDepartmentName(String name);      // auto from method name
    @Query("SELECT e FROM Employee e WHERE e.salary > :min") // JPQL
    List&lt;Employee&gt; findHighEarners(@Param("min") Double min);
}

// SQL Injection — NEVER concatenate user input:
// BAD: "SELECT * FROM users WHERE name='" + userInput + "'"
// GOOD: PreparedStatement with ? params, or JPQL with :namedParams — always parameterized

// @Transactional:
@Transactional           // opens TX before, commits/rolls back after
@Transactional(readOnly=true)  // skip dirty checking — faster reads
// WARNING: only works on public methods via Spring proxy. Calling from SAME class bypasses proxy!</code></pre></div></div>`},
